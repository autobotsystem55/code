<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>联系方式自动填写 + 一键注册 — 3 种交互对比</title>
<link rel="stylesheet" href="css/styles.css?v=20260621e">
<style>
  :root{
    --wine:#82213E;--wine-deep:#6A1A32;--pink:#E9C9CC;--pink-soft:#F6E4E6;
    --pink-border:#DAB0B7;--cream:#FFFAF1;--cream-2:#FAF6F3;--line:#ECD9D6;
    --ink:#1C1C1C;--muted:#6F635C;--white:#fff;--green:#2F7D4F;--green-bg:#E3F1E8;
  }
  *{box-sizing:border-box}
  body{background:var(--cream-2);margin:0;padding:24px 16px 60px;font-family:'DM Sans',system-ui,sans-serif;color:var(--ink)}
  .head{max-width:1180px;margin:0 auto 26px;text-align:center}
  .head h1{font-family:'DM Serif Display',serif;color:var(--wine);font-size:24px;margin:0 0 6px}
  .head p{font-size:13.5px;color:var(--muted);margin:0;line-height:1.6}
  .head .tip{display:inline-block;margin-top:10px;font-size:12.5px;background:#FBF0DA;color:var(--wine-deep);border-radius:8px;padding:7px 14px}

  .grid{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:980px){.grid{grid-template-columns:1fr;max-width:420px}}

  .col{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:0;overflow:hidden;display:flex;flex-direction:column}
  .col__tag{background:var(--wine);color:#fff;padding:11px 16px}
  .col__tag b{display:block;font-size:14px;letter-spacing:.02em}
  .col__tag span{display:block;font-size:11.5px;opacity:.85;margin-top:2px;line-height:1.4}
  .col__body{padding:16px}

  fieldset{border:1px solid var(--line);border-radius:10px;margin:0 0 14px;padding:13px 13px 14px;background:var(--white)}
  legend{font-family:'DM Serif Display',serif;font-size:15px;color:var(--wine);padding:0 6px;display:flex;align-items:center;gap:8px}
  .legend-row{display:flex;justify-content:space-between;align-items:center;width:100%}

  .field{margin:9px 0 0}
  .field:first-child{margin-top:2px}
  label{display:block;font-size:11px;color:var(--muted);margin:0 0 3px;letter-spacing:.02em}
  input{width:100%;padding:9px 10px;border:1px solid var(--pink-border);border-radius:7px;background:var(--white);font-size:13px;outline:none;font-family:inherit;color:var(--ink);transition:border-color .15s,box-shadow .15s,background .4s}
  input:focus{border-color:var(--wine);box-shadow:0 0 0 3px rgba(130,33,62,.1)}
  .row2{display:flex;gap:9px}
  .row2 .field{flex:1}

  /* auto-fill flash */
  @keyframes flash{0%{background:#FFF6D9;border-color:#E7C66A}100%{background:#fff;border-color:var(--pink-border)}}
  input.autofilled{animation:flash 1.1s ease}

  .btn{font-family:inherit;border:none;border-radius:8px;cursor:pointer;font-size:12.5px;font-weight:600;letter-spacing:.02em;transition:.15s;padding:8px 14px}
  .btn--wine{background:var(--wine);color:#fff}
  .btn--wine:hover{background:var(--wine-deep)}
  .btn--wine:disabled{background:#D8C3C8;color:#fff;cursor:not-allowed}
  .btn--ghost{background:transparent;color:var(--wine);border:1px solid var(--pink-border)}
  .btn--ghost:hover{background:var(--pink-soft)}
  .btn--block{width:100%;padding:11px;font-size:13.5px}
  .btn--sm{padding:6px 11px;font-size:11.5px}

  .place{width:100%;padding:12px;background:#3A3A3A;color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:600;margin-top:2px;cursor:default}

  .muted{font-size:11.5px;color:var(--muted);line-height:1.5}
  .hide{display:none!important}

  /* smart card (Demo B) */
  .smartcard{border:1.5px solid var(--green);background:var(--green-bg);border-radius:10px;padding:13px;margin:0 0 14px;animation:slidein .35s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .smartcard__title{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--green);margin:0 0 7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 10px}
  .chip{background:#fff;border:1px solid #BFE0CC;border-radius:30px;padding:3px 10px;font-size:11.5px;color:#234;display:flex;align-items:center;gap:5px}
  .chip i{font-style:normal;color:var(--muted);font-size:10px}

  /* checkbox row (Demo C) */
  .checkrow{display:flex;align-items:flex-start;gap:9px;margin:10px 0 0;padding:10px;border:1px dashed var(--pink-border);border-radius:9px;background:var(--pink-soft);cursor:pointer}
  .checkrow input{width:17px;height:17px;flex:0 0 auto;margin-top:1px;accent-color:var(--wine)}
  .checkrow .t b{font-size:12.5px;color:var(--wine-deep);display:block}
  .checkrow .t span{font-size:11px;color:var(--muted)}

  .success{background:var(--green-bg);border:1px solid #BFE0CC;border-radius:9px;padding:11px 13px;font-size:12.5px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:8px;animation:slidein .3s ease}
  .ok-dot{width:18px;height:18px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex:0 0 auto}
</style>
</head>
<body>
  <div class="head">
    <h1>联系方式自动填写 + 一键注册</h1>
    <p>顾客填「收货地址」时，姓名 / 邮箱 / 电话会自动同步到上方「联系方式」，<br>没注册的客人资料已齐，点一下就能注册，无需重填。</p>
    <span class="tip">👉 试试看：在任意一栏的「收货地址」里打字，看上方联系方式自动填上 ✨</span>
  </div>

  <div class="grid" id="grid"></div>

<script>
/* ---------- shared field markup ---------- */
function shippingFields(p){
  return ''+
    '<fieldset><legend>收货地址</legend>'+
      '<div class="row2">'+
        '<div class="field"><label>名</label><input data-k="first" placeholder="Maggie"></div>'+
        '<div class="field"><label>姓</label><input data-k="last" placeholder="Puah"></div>'+
      '</div>'+
      '<div class="field"><label>邮箱</label><input data-k="email" type="email" placeholder="you@email.com"></div>'+
      '<div class="field"><label>电话</label><input data-k="phone" placeholder="60123456789"></div>'+
      '<div class="field"><label>详细地址</label><input data-k="address" placeholder="21 Jalan Alam Indah 1"></div>'+
    '</fieldset>';
}
function placeBtn(){ return '<button class="place">提交订单 — RM 168.00</button>'; }

/* ---------- DEMO A: 联系方式区 3 栏 + 旁边「注册」按钮 ---------- */
function demoA(root){
  root.querySelector('.col__body').innerHTML =
    '<fieldset><legend><div class="legend-row"><span>联系方式</span>'+
      '<button class="btn btn--ghost btn--sm" data-reg disabled>注册账号 →</button></div></legend>'+
      '<div class="field"><label>姓名</label><input data-k="cname" placeholder="自动填写"></div>'+
      '<div class="field"><label>邮箱</label><input data-k="cemail" type="email" placeholder="自动填写"></div>'+
      '<div class="field"><label>电话</label><input data-k="cphone" placeholder="自动填写"></div>'+
      '<div class="field hide" data-pwbox><label>设置密码（注册用）</label><input data-k="pw" type="password" placeholder="至少 6 位">'+
        '<button class="btn btn--wine btn--block" data-dosignup style="margin-top:9px">完成注册</button></div>'+
      '<div class="success hide" data-done><span class="ok-dot">✓</span>注册成功！下次结账资料会自动带出</div>'+
    '</fieldset>'+
    shippingFields()+ placeBtn();

  var c={ cname:f('cname'), cemail:f('cemail'), cphone:f('cphone') };
  function f(k){ return root.querySelector('[data-k="'+k+'"]'); }
  function sync(){
    setVal(c.cname, [f('first').value, f('last').value].filter(Boolean).join(' '));
    setVal(c.cemail, f('email').value);
    setVal(c.cphone, f('phone').value);
    root.querySelector('[data-reg]').disabled = !(c.cname.value && c.cemail.value);
  }
  ['first','last','email','phone'].forEach(function(k){ f(k).addEventListener('input', sync); });
  root.querySelector('[data-reg]').addEventListener('click', function(){
    root.querySelector('[data-pwbox]').classList.remove('hide'); f('pw').focus();
  });
  root.querySelector('[data-dosignup]').addEventListener('click', function(){
    if(f('pw').value.length<6){ f('pw').focus(); return; }
    root.querySelector('[data-pwbox]').classList.add('hide');
    root.querySelector('[data-reg]').classList.add('hide');
    root.querySelector('[data-done]').classList.remove('hide');
  });
}

/* ---------- DEMO B: 填完地址后浮现「智能卡片」---------- */
function demoB(root){
  root.querySelector('.col__body').innerHTML =
    '<fieldset><legend>联系方式</legend>'+
      '<div class="field"><label>邮箱</label><input data-k="cemail" type="email" placeholder="自动填写"></div>'+
    '</fieldset>'+
    '<div class="smartcard hide" data-card>'+
      '<div class="smartcard__title">✓ 已自动获取你的资料</div>'+
      '<div class="chips"><span class="chip"><i>姓名</i><b data-chip="name"></b></span>'+
        '<span class="chip"><i>邮箱</i><b data-chip="email"></b></span>'+
        '<span class="chip"><i>电话</i><b data-chip="phone"></b></span></div>'+
      '<p class="muted" style="margin:0 0 9px">设置密码即可创建账号，下次结账免填 👇</p>'+
      '<div class="row2"><input data-k="pw" type="password" placeholder="设置密码（≥6位）" style="flex:1">'+
        '<button class="btn btn--wine" data-dosignup>创建账号</button></div>'+
      '<div class="success hide" data-done style="margin-top:9px"><span class="ok-dot">✓</span>账号已创建！</div>'+
    '</div>'+
    shippingFields()+ placeBtn();

  function f(k){ return root.querySelector('[data-k="'+k+'"]'); }
  function sync(){
    setVal(f('cemail'), f('email').value);
    var ready = f('first').value && f('email').value && f('phone').value;
    var card = root.querySelector('[data-card]');
    if(ready){
      card.classList.remove('hide');
      root.querySelector('[data-chip="name"]').textContent=[f('first').value,f('last').value].filter(Boolean).join(' ');
      root.querySelector('[data-chip="email"]').textContent=f('email').value;
      root.querySelector('[data-chip="phone"]').textContent=f('phone').value;
    } else card.classList.add('hide');
  }
  ['first','last','email','phone'].forEach(function(k){ f(k).addEventListener('input', sync); });
  root.querySelector('[data-dosignup]').addEventListener('click', function(){
    if(f('pw').value.length<6){ f('pw').focus(); return; }
    root.querySelector('[data-done]').classList.remove('hide');
    root.querySelector('[data-dosignup]').classList.add('hide'); f('pw').classList.add('hide');
  });
}

/* ---------- DEMO C: Shopify 风格 勾选框 ---------- */
function demoC(root){
  root.querySelector('.col__body').innerHTML =
    '<fieldset><legend>联系方式</legend>'+
      '<div class="field"><label>姓名</label><input data-k="cname" placeholder="自动填写"></div>'+
      '<div class="field"><label>邮箱</label><input data-k="cemail" type="email" placeholder="自动填写"></div>'+
      '<div class="field"><label>电话</label><input data-k="cphone" placeholder="自动填写"></div>'+
      '<label class="checkrow"><input type="checkbox" data-chk>'+
        '<span class="t"><b>创建账号，下次结账更快</b><span>用上面的资料注册，只需再设一个密码</span></span></label>'+
      '<div class="field hide" data-pwbox style="margin-top:10px"><label>设置密码</label>'+
        '<div class="row2"><input data-k="pw" type="password" placeholder="≥6位" style="flex:1">'+
          '<button class="btn btn--wine" data-dosignup>注册</button></div></div>'+
      '<div class="success hide" data-done style="margin-top:10px"><span class="ok-dot">✓</span>已注册，随订单一起提交</div>'+
    '</fieldset>'+
    shippingFields()+ placeBtn();

  function f(k){ return root.querySelector('[data-k="'+k+'"]'); }
  function sync(){
    setVal(f('cname'), [f('first').value,f('last').value].filter(Boolean).join(' '));
    setVal(f('cemail'), f('email').value);
    setVal(f('cphone'), f('phone').value);
  }
  ['first','last','email','phone'].forEach(function(k){ f(k).addEventListener('input', sync); });
  root.querySelector('[data-chk]').addEventListener('change', function(e){
    root.querySelector('[data-pwbox]').classList.toggle('hide', !e.target.checked);
  });
  root.querySelector('[data-dosignup]').addEventListener('click', function(){
    if(f('pw').value.length<6){ f('pw').focus(); return; }
    root.querySelector('[data-pwbox]').classList.add('hide');
    root.querySelector('[data-done]').classList.remove('hide');
  });
}

/* ---------- helper: set value + flash if changed ---------- */
function setVal(input, v){
  if(input.value===v) return;
  input.value=v;
  if(v){ input.classList.remove('autofilled'); void input.offsetWidth; input.classList.add('autofilled'); }
}

/* ---------- build the 3 columns ---------- */
var DEMOS=[
  {t:'方案 A', s:'联系方式 3 栏 + 旁边「注册」按钮（最贴近你的描述）', fn:demoA},
  {t:'方案 B', s:'填完地址后浮现「智能卡片」，只需设密码', fn:demoB},
  {t:'方案 C', s:'Shopify 风格：勾选「创建账号」才展开密码框', fn:demoC},
];
var grid=document.getElementById('grid');
DEMOS.forEach(function(d){
  var col=document.createElement('div'); col.className='col';
  col.innerHTML='<div class="col__tag"><b>'+d.t+'</b><span>'+d.s+'</span></div><div class="col__body"></div>';
  grid.appendChild(col); d.fn(col);
});
</script>
</body>
</html>
