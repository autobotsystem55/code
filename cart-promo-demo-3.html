<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物袋 · 优惠横幅 (Demo C) · Code Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFFAF1; --cream2:#FAF6F3; --blush:#F2E4D9; --pink:#E9C9CC;
    --pink-soft:#F6E4E6; --pink-border:#DAB0B7; --wine:#82213E; --wine-deep:#6A1A32;
    --ink:#1C1C1C; --ink-soft:#3E3E3E; --muted:#6F635C; --line:#ECD9D6;
    --green:#2F7D4F; --green-bg:#E3F1E8; --amber:#9A6B12; --amber-bg:#FBF0DA; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:"DM Sans",system-ui,sans-serif;
    background:
      radial-gradient(1100px 600px at 80% -10%, var(--blush), transparent 60%),
      var(--cream);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:"DM Serif Display",Georgia,serif;font-weight:400;}

  /* faux storefront behind drawer */
  .bg-hint{
    position:fixed;inset:0;padding:46px 56px;color:var(--muted);
    user-select:none;
  }
  .bg-hint .logo{font-family:"DM Serif Display",Georgia,serif;font-size:30px;color:var(--wine);letter-spacing:.5px;}
  .bg-hint .tag{font-size:13px;margin-top:4px;letter-spacing:3px;text-transform:uppercase;}

  /* overlay */
  .overlay{
    position:fixed;inset:0;background:rgba(40,18,24,.42);
    backdrop-filter:blur(2px);
    display:flex;justify-content:flex-end;
    z-index:10;
  }

  /* drawer */
  .drawer{
    width:420px;max-width:100%;height:100vh;background:var(--cream);
    display:flex;flex-direction:column;
    box-shadow:-24px 0 60px rgba(60,20,30,.22);
    animation:slide .42s cubic-bezier(.22,.9,.3,1);
  }
  @keyframes slide{from{transform:translateX(36px);opacity:.4;}to{transform:translateX(0);opacity:1;}}

  .d-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 22px 16px;border-bottom:1px solid var(--line);
    background:var(--cream);
  }
  .d-head h1{font-size:25px;display:flex;align-items:baseline;gap:10px;}
  .d-head .count{font-family:"DM Sans";font-size:12px;color:var(--muted);transform:translateY(-2px);}
  .close{
    background:none;border:none;cursor:pointer;color:var(--ink-soft);
    font-size:14px;display:flex;align-items:center;gap:6px;padding:6px 4px;
  }
  .close:hover{color:var(--wine);}

  .d-body{flex:1;overflow-y:auto;padding:18px 18px 8px;}

  /* ===== PROMO BANNER ===== */
  .banner{
    background:linear-gradient(160deg,var(--pink-soft),var(--blush));
    border:1px solid var(--pink-border);
    border-radius:14px;padding:16px 16px 18px;margin-bottom:20px;
    position:relative;overflow:hidden;
  }
  .banner::after{
    content:"";position:absolute;right:-30px;top:-30px;width:110px;height:110px;
    background:radial-gradient(circle, rgba(130,33,62,.10), transparent 70%);
  }
  .banner .b-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .banner .b-top .spark{font-size:15px;}
  .banner .b-title{font-family:"DM Serif Display",Georgia,serif;font-size:17px;color:var(--wine-deep);}
  .banner .b-nudge{font-size:12.5px;color:var(--wine);font-weight:600;margin-left:auto;}

  /* milestones row */
  .miles{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:7px;position:relative;z-index:1;}
  .mile{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;text-align:center;line-height:1.25;}
  .mile .dot{
    width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:10px;border:2px solid var(--pink-border);background:var(--white);color:var(--muted);
  }
  .mile.done .dot{background:var(--green);border-color:var(--green);color:#fff;}
  .mile.next .dot{background:var(--wine);border-color:var(--wine);color:#fff;}
  .mile .lbl{color:var(--ink-soft);font-weight:600;}
  .mile.done .lbl{color:var(--green);}
  .mile .amt{color:var(--muted);font-size:10.5px;}

  /* progress bar */
  .track{
    height:9px;border-radius:99px;background:rgba(130,33,62,.13);
    position:relative;overflow:hidden;margin:4px 2px 9px;z-index:1;
  }
  .fill{
    height:100%;border-radius:99px;
    background:linear-gradient(90deg,var(--green),var(--wine));
    width:98%;transition:width .6s cubic-bezier(.3,.8,.4,1);
  }
  .progress-note{
    display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--wine-deep);
    background:rgba(255,255,255,.55);border-radius:8px;padding:7px 10px;position:relative;z-index:1;
  }
  .progress-note b{color:var(--wine);}

  /* ===== ITEMS ===== */
  .item{display:flex;gap:13px;padding:15px 2px;border-bottom:1px solid var(--line);}
  .item:last-of-type{border-bottom:none;}
  .thumb{
    width:74px;height:92px;border-radius:9px;flex-shrink:0;position:relative;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.05);
  }
  .thumb.camel{background:linear-gradient(150deg,#C8A06A,#A6783F);}
  .thumb.cream{background:linear-gradient(150deg,#F3EAD8,#DCCBB0);}
  .thumb span{
    position:absolute;bottom:7px;left:7px;font-size:9px;letter-spacing:1px;
    color:rgba(255,255,255,.85);text-transform:uppercase;
  }
  .thumb.cream span{color:rgba(80,60,40,.7);}

  .info{flex:1;min-width:0;display:flex;flex-direction:column;}
  .name{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.3;}
  .variant{font-size:12px;color:var(--muted);margin-top:2px;}

  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .badge{
    font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;
    display:inline-flex;align-items:center;gap:4px;line-height:1.4;
  }
  .badge.applied{background:var(--green-bg);color:var(--green);}
  .badge.avail{background:var(--amber-bg);color:var(--amber);border:1px dashed #D9B873;}

  .row{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--white);}
  .stepper button{
    width:28px;height:28px;border:none;background:none;cursor:pointer;
    font-size:15px;color:var(--wine);line-height:1;
  }
  .stepper button:hover{background:var(--pink-soft);}
  .stepper button:disabled{color:var(--pink-border);cursor:not-allowed;background:none;}
  .stepper .qty{width:30px;text-align:center;font-size:13px;font-weight:600;}

  .price-col{text-align:right;}
  .price{font-size:14.5px;font-weight:700;color:var(--ink);}
  .remove{background:none;border:none;cursor:pointer;font-size:11.5px;color:var(--muted);text-decoration:underline;margin-top:4px;}
  .remove:hover{color:var(--wine);}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;}

  /* ===== FOOTER ===== */
  .d-foot{
    border-top:1px solid var(--line);padding:15px 18px 18px;
    background:var(--cream2);
  }
  .saved{
    display:flex;align-items:center;justify-content:space-between;
    font-size:13px;color:var(--green);font-weight:600;
    background:var(--green-bg);border-radius:8px;padding:8px 11px;margin-bottom:11px;
  }
  .saved .s-ico{display:flex;align-items:center;gap:6px;}
  .totals{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:4px;}
  .totals .t-lbl{font-size:13px;color:var(--ink-soft);}
  .totals .t-val{text-align:right;}
  .totals .was{font-size:12px;color:var(--muted);text-decoration:line-through;margin-right:7px;}
  .totals .now{font-family:"DM Serif Display",Georgia,serif;font-size:23px;color:var(--wine-deep);}
  .fineprint{font-size:11px;color:var(--muted);margin:2px 0 13px;}

  .checkout{
    width:100%;border:none;border-radius:0;background:var(--wine);color:var(--cream);
    font-family:"DM Sans";font-size:15px;font-weight:600;letter-spacing:1px;
    padding:15px;cursor:pointer;transition:background .2s;
  }
  .checkout:hover{background:var(--wine-deep);}

  .demo-note{
    position:fixed;left:16px;bottom:14px;z-index:20;
    font-size:11px;color:var(--muted);background:rgba(255,255,255,.7);
    border:1px solid var(--line);border-radius:99px;padding:4px 12px;letter-spacing:.5px;
  }

  @media(max-width:440px){
    .drawer{width:100%;}
    .bg-hint{padding:30px;}
  }
</style>
</head>
<body>

  <div class="bg-hint">
    <div class="logo">Code Official</div>
    <div class="tag">Boutique · KL</div>
  </div>

  <div class="overlay">
    <aside class="drawer" role="dialog" aria-label="购物袋">

      <header class="d-head">
        <h1>购物袋 <span class="count" id="count">2 件</span></h1>
        <button class="close" onclick="this.closest('.overlay').style.display='none'">关闭 <span aria-hidden="true">✕</span></button>
      </header>

      <div class="d-body" id="body">

        <!-- PROMO BANNER -->
        <div class="banner">
          <div class="b-top">
            <span class="spark">✨</span>
            <span class="b-title">再加一点，解锁全单 9 折</span>
            <span class="b-nudge" id="nudgeTag">差 RM7</span>
          </div>

          <div class="miles">
            <div class="mile done">
              <div class="dot">✓</div>
              <div class="lbl">免运费</div>
              <div class="amt">RM200</div>
            </div>
            <div class="mile next">
              <div class="dot">🎁</div>
              <div class="lbl">全单 9 折</div>
              <div class="amt">RM400</div>
            </div>
            <div class="mile">
              <div class="dot">★</div>
              <div class="lbl">送限量帆布袋</div>
              <div class="amt">RM600</div>
            </div>
          </div>

          <div class="track"><div class="fill" id="fill" style="width:98%"></div></div>

          <div class="progress-note">
            <span>🎉</span>
            <span>再加 <b id="needAmt">RM7</b> 即可解锁 <b>全单 9 折</b>，太划算啦！</span>
          </div>
        </div>

        <!-- ITEMS -->
        <div id="items"></div>

      </div>

      <footer class="d-foot">
        <div class="saved">
          <span class="s-ico">🏷️ 已省</span>
          <span id="savedVal">RM 81</span>
        </div>
        <div class="totals">
          <span class="t-lbl">预计小计</span>
          <span class="t-val">
            <span class="was" id="wasVal">RM 393</span>
            <span class="now" id="nowVal">RM 321</span>
          </span>
        </div>
        <div class="fineprint">运费与税费将在结账时计算。</div>
        <button class="checkout">去结账</button>
      </footer>

    </aside>
  </div>

  <div class="demo-note">设计 Demo</div>

<script>
(function(){
  // internally-consistent model. unit prices in RM.
  // savings = "第二件半价" on coat (half off the 2nd unit when qty>=2)
  const items = [
    {
      id:'coat', name:'羊毛混纺大衣', variant:'Camel · S', price:248, qty:1, thumb:'camel', th:'WOOL',
      badge:{type:'applied', text:'第二件半价 适用'},
      // discount applies per extra pair (every 2nd unit at 50%)
      promo:(it)=> Math.floor(it.qty/2) * (it.price*0.5)
    },
    {
      id:'cardi', name:'罗纹针织开衫', variant:'Cream · XS', price:145, qty:1, thumb:'cream', th:'KNIT',
      badge:{type:'avail', text:'买一送一 · 再加 1 件'},
      promo:(it)=> 0   // not yet triggered (needs 2)
    }
  ];

  const FREE_SHIP = 200, NINE_OFF = 400, GIFT = 600;

  const elItems = document.getElementById('items');
  const elCount = document.getElementById('count');
  const elWas = document.getElementById('wasVal');
  const elNow = document.getElementById('nowVal');
  const elSaved = document.getElementById('savedVal');
  const elFill = document.getElementById('fill');
  const elNeed = document.getElementById('needAmt');
  const elNudge = document.getElementById('nudgeTag');
  const elBody = document.getElementById('body');

  function render(){
    elItems.innerHTML = '';
    if(items.length === 0){
      elItems.innerHTML = '<div class="empty">购物袋是空的 🤍<br>去逛逛新品吧</div>';
    }
    items.forEach(it=>{
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <div class="thumb ${it.thumb}"><span>${it.th}</span></div>
        <div class="info">
          <div class="name">${it.name}</div>
          <div class="variant">${it.variant}</div>
          <div class="badges">
            <span class="badge ${it.badge.type}">${it.badge.type==='applied'?'✓':'＋'} ${it.badge.text}</span>
          </div>
          <div class="row">
            <div class="stepper" data-id="${it.id}">
              <button class="dec" ${it.qty<=1?'disabled':''}>−</button>
              <span class="qty">${it.qty}</span>
              <button class="inc">＋</button>
            </div>
            <div class="price-col">
              <div class="price">RM ${(it.price*it.qty).toFixed(0)}</div>
              <button class="remove" data-id="${it.id}">移除</button>
            </div>
          </div>
        </div>`;
      elItems.appendChild(div);
    });
    bind();
    recalc();
  }

  function bind(){
    elItems.querySelectorAll('.inc').forEach(b=>{
      b.onclick = e=>{ const id = e.target.closest('.stepper').dataset.id; const it = items.find(x=>x.id===id); it.qty++; render(); };
    });
    elItems.querySelectorAll('.dec').forEach(b=>{
      b.onclick = e=>{ const id = e.target.closest('.stepper').dataset.id; const it = items.find(x=>x.id===id); if(it.qty>1){it.qty--; render();} };
    });
    elItems.querySelectorAll('.remove').forEach(b=>{
      b.onclick = e=>{ const id = e.target.dataset.id; const i = items.findIndex(x=>x.id===id); items.splice(i,1); render(); };
    });
  }

  function recalc(){
    let subtotal = 0, saved = 0;
    items.forEach(it=>{
      subtotal += it.price * it.qty;
      saved += it.promo(it);
    });
    const now = subtotal - saved;

    elCount.textContent = items.reduce((s,i)=>s+i.qty,0) + ' 件';
    elWas.textContent = 'RM ' + subtotal.toFixed(0);
    elNow.textContent = 'RM ' + now.toFixed(0);
    elSaved.textContent = 'RM ' + saved.toFixed(0);
    elWas.style.display = saved>0 ? 'inline' : 'none';

    // progress toward NINE_OFF (next reward), based on subtotal
    let pct, need;
    if(subtotal >= NINE_OFF){
      pct = 100; need = 0;
    } else {
      // fill from FREE_SHIP baseline to NINE_OFF
      pct = Math.max(4, Math.min(100, (subtotal / NINE_OFF) * 100));
      need = NINE_OFF - subtotal;
    }
    elFill.style.width = pct.toFixed(0) + '%';

    if(need > 0){
      elNeed.textContent = 'RM' + need.toFixed(0);
      elNudge.textContent = '差 RM' + need.toFixed(0);
      elNudge.style.display = '';
    } else {
      elNeed.textContent = '已解锁';
      elNudge.textContent = '已解锁 9 折 🎉';
    }
  }

  render();
})();
</script>
</body>
</html>
