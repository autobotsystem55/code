<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存管理 · Code Official</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFFAF1; --cream2:#FAF6F3; --white:#fff;
    --wine:#82213E; --wine-deep:#6A1A32; --pink:#E9C9CC; --blush:#F2E4D9;
    --ink:#1C1C1C; --ink2:#3E3E3E; --muted:#6F635C; --line:#ECD9D6; --line2:#E2DCD8;
    --green:#2F7D4F; --amber:#9A6A1E; --red:#B23A48; --blue:#3A5C9A;
    --amber-bg:#FBF1DD; --amber-line:#EAD7AE; --red-bg:#FBE7E5; --red-line:#F0C4C0;
    --serif:'DM Serif Display',Georgia,serif; --sans:'DM Sans',-apple-system,Segoe UI,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);font-size:15px;line-height:1.6}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;color:inherit}
  img{display:block;max-width:100%}
  h1,h2,h3{font-family:var(--serif);font-weight:400;line-height:1.1}
  .muted{color:var(--muted)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--wine);color:var(--cream);
    padding:11px 20px;font-size:13px;font-weight:500;letter-spacing:.02em;border:1px solid var(--wine);transition:.25s;border-radius:4px}
  .btn:hover{background:var(--wine-deep);border-color:var(--wine-deep)}
  .btn--ghost{background:transparent;color:var(--wine)}
  .btn--ghost:hover{background:var(--wine);color:var(--cream)}
  .btn--sm{padding:7px 13px;font-size:12px}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  /* ---------- shell ---------- */
  .shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .side{background:var(--cream2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .brand{font-family:var(--serif);font-size:24px;padding:24px 24px 20px}
  .side .brand sup{font-size:.42em;color:var(--wine)}
  .nav{display:flex;flex-direction:column;padding:6px 12px;gap:2px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 14px;font-size:14px;color:var(--ink2);border-radius:6px;transition:.18s}
  .nav button:hover{background:var(--blush)}
  .nav button.on{background:var(--wine);color:var(--cream)}
  .nav button.on svg{stroke:var(--cream)}
  .nav svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.6}
  .side-foot{margin-top:auto;padding:16px 16px 22px;border-top:1px solid var(--line);font-size:13px}
  .side-foot a,.side-foot button{display:block;color:var(--muted);padding:6px 8px}
  .side-foot a:hover,.side-foot button:hover{color:var(--wine)}

  .main{min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 30px;border-bottom:1px solid var(--line);background:var(--cream)}
  .topbar h1{font-size:30px}
  .topbar .sub{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:2px}
  .topbar .who{font-size:13px;color:var(--muted)}
  .view{padding:24px 30px 80px}

  /* ---------- stat cards ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .stat{background:var(--white);border:1px solid var(--line);padding:16px 18px;border-radius:6px;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--pink)}
  .stat.amber::before{background:var(--amber)}
  .stat.red::before{background:var(--red)}
  .stat.blue::before{background:var(--blue)}
  .stat .n{font-family:var(--serif);font-size:32px;line-height:1}
  .stat.amber .n{color:var(--amber)}
  .stat.red .n{color:var(--red)}
  .stat .l{font-size:11.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:7px}
  .stat .l b{color:var(--ink2);font-weight:600;text-transform:none;letter-spacing:0}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .search{position:relative;flex:1;min-width:220px;max-width:360px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.7}
  .search input{width:100%;padding:10px 12px 10px 36px;background:var(--white);border:1px solid var(--line2);outline:none;border-radius:5px;transition:.2s}
  .search input:focus{border-color:var(--wine)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:var(--white)}
  .seg button{padding:9px 15px;font-size:13px;color:var(--ink2);position:relative}
  .seg button+button{border-left:1px solid var(--line2)}
  .seg button.on{background:var(--wine);color:var(--cream)}
  .seg button .c{font-size:11px;opacity:.7;margin-left:5px}
  .seg button.on .c{opacity:.85}
  .sortwrap{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--muted)}
  .sortwrap select{padding:9px 11px;background:var(--white);border:1px solid var(--line2);border-radius:5px;outline:none;cursor:pointer}
  .sortwrap select:focus{border-color:var(--wine)}

  .layout{display:grid;grid-template-columns:1fr 308px;gap:18px;align-items:start}

  /* ---------- bulk toolbar ---------- */
  .bulkbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--wine);color:var(--cream);
    padding:10px 16px;border-radius:6px 6px 0 0;margin-bottom:-1px;position:relative;z-index:2}
  .bulkbar.hide{display:none}
  .bulkbar .sel{font-size:13px;font-weight:500}
  .bulkbar .sel b{font-family:var(--serif);font-size:16px;margin-right:3px}
  .bulkbar .spacer{flex:1}
  .bulkbar input.qf{width:64px;padding:6px 8px;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.12);
    color:var(--cream);border-radius:4px;text-align:center;outline:none}
  .bulkbar input.qf::placeholder{color:rgba(255,250,241,.65)}
  .bulkbar .bbtn{font-size:12.5px;padding:7px 12px;border:1px solid rgba(255,255,255,.45);border-radius:4px;color:var(--cream);transition:.18s;white-space:nowrap}
  .bulkbar .bbtn:hover{background:var(--cream);color:var(--wine);border-color:var(--cream)}
  .bulkbar .bbtn.x{border:none;opacity:.85}
  .bulkbar .bbtn.x:hover{background:transparent;color:var(--cream);text-decoration:underline}

  /* ---------- table ---------- */
  .tablewrap{background:var(--white);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  thead th{text-align:left;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600;
    padding:11px 12px;border-bottom:1px solid var(--line);background:var(--cream2);white-space:nowrap;position:sticky;top:0;z-index:1}
  thead th.sortable{cursor:pointer;user-select:none}
  thead th.sortable:hover{color:var(--wine)}
  thead th .arr{font-size:9px;margin-left:3px;color:var(--wine)}
  td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr.low{background:var(--amber-bg)}
  tbody tr.out{background:var(--red-bg)}
  tbody tr.sel{box-shadow:inset 3px 0 0 var(--wine)}
  tbody tr:hover{background:var(--blush)}
  tbody tr.low:hover{background:#F8EACB}
  tbody tr.out:hover{background:#F8DAD6}
  .col-chk{width:38px;text-align:center}
  .col-chk input,.col-allchk{width:15px;height:15px;accent-color:var(--wine);cursor:pointer}

  .prodcell{display:flex;align-items:center;gap:11px;min-width:210px}
  .thumb{width:42px;height:54px;object-fit:cover;background:var(--blush);border-radius:3px;flex-shrink:0;
    display:grid;place-items:center;font-family:var(--serif);font-size:18px;color:var(--wine)}
  .prodcell .nm{font-weight:500;line-height:1.25}
  .prodcell .en{font-size:11.5px;color:var(--muted)}
  .sizetag{display:inline-grid;place-items:center;min-width:34px;height:26px;padding:0 8px;border:1px solid var(--line2);
    border-radius:4px;font-size:12.5px;font-weight:600;background:var(--cream2)}
  .sku{font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums;letter-spacing:.02em}

  /* stepper */
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:5px;overflow:hidden;background:var(--white)}
  .stepper button{width:28px;height:30px;font-size:16px;color:var(--wine);display:grid;place-items:center;transition:.15s}
  .stepper button:hover{background:var(--blush)}
  .stepper button:active{background:var(--pink)}
  .stepper input{width:48px;height:30px;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);
    text-align:center;outline:none;font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .stepper input:focus{background:#FFF8E9}
  tr.low .stepper input{color:var(--amber)}
  tr.out .stepper input{color:var(--red)}

  .badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:.02em;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .badge.in{background:#E3F1E8;color:var(--green)}
  .badge.low{background:#F6EAD3;color:var(--amber)}
  .badge.out{background:#FAD8D5;color:var(--red)}
  .badge.off{background:var(--line2);color:var(--muted)}

  .savedot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-left:8px;
    opacity:0;transform:scale(.4);transition:.3s}
  .savedot.show{opacity:1;transform:scale(1)}

  /* product group header row */
  tr.grouphead td{background:var(--cream2);padding:8px 12px;border-bottom:1px solid var(--line)}
  .ghead{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .ghead .gname{font-weight:600;font-size:13.5px}
  .ghead .gmeta{font-size:11.5px;color:var(--muted)}
  .ghead .gctl{display:flex;align-items:center;gap:14px;margin-left:auto;flex-wrap:wrap}
  .toggle{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--ink2);cursor:pointer;user-select:none}
  .sw{width:32px;height:18px;border-radius:999px;background:var(--line2);position:relative;transition:.2s;flex-shrink:0}
  .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle input{display:none}
  .toggle input:checked+.sw{background:var(--wine)}
  .toggle input:checked+.sw::after{left:16px}
  .thresh{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2)}
  .thresh input{width:40px;padding:3px 5px;border:1px solid var(--line2);border-radius:4px;text-align:center;outline:none;font-size:12px}
  .thresh input:focus{border-color:var(--wine)}

  /* ---------- side: restock list ---------- */
  .aside{position:sticky;top:18px;display:flex;flex-direction:column;gap:16px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .card .ch{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .card .ch h3{font-size:17px}
  .card .ch .cnt{font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px}
  .card.alarm .ch{background:var(--amber-bg);border-bottom-color:var(--amber-line)}
  .card.alarm .ch .cnt{background:var(--amber);color:#fff}
  .restock{max-height:360px;overflow:auto}
  .ritem{display:flex;align-items:center;gap:11px;padding:11px 16px;border-bottom:1px solid var(--line)}
  .ritem:last-child{border-bottom:none}
  .ritem:hover{background:var(--blush)}
  .ritem .rt{width:32px;height:40px;border-radius:3px;background:var(--blush);display:grid;place-items:center;
    font-family:var(--serif);font-size:14px;color:var(--wine);flex-shrink:0}
  .ritem .ri{flex:1;min-width:0}
  .ritem .ri .rn{font-size:13px;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ritem .ri .rs{font-size:11.5px;color:var(--muted)}
  .ritem .rq{font-size:12px;font-weight:600;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .ritem .rq.low{background:#F6EAD3;color:var(--amber)}
  .ritem .rq.out{background:#FAD8D5;color:var(--red)}
  .restock-empty{padding:26px 16px;text-align:center;color:var(--muted);font-size:13px}
  .card .cf{padding:12px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.5}
  .card .cf b{color:var(--ink2)}

  .tip{display:flex;gap:10px;padding:13px 15px;font-size:12.5px;color:var(--ink2);line-height:1.55}
  .tip .ic{width:22px;height:22px;border-radius:50%;background:var(--blush);display:grid;place-items:center;flex-shrink:0;color:var(--wine);font-size:13px}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);
    padding:11px 20px;font-size:13px;border-radius:6px;opacity:0;pointer-events:none;transition:.3s;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .footnote{margin-top:18px;font-size:11.5px;color:var(--muted);text-align:center;letter-spacing:.02em}

  @media(max-width:1080px){ .layout{grid-template-columns:1fr} .aside{position:static} }
  @media(max-width:860px){
    .shell{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;border-right:none;border-bottom:1px solid var(--line)}
    .side .brand{padding:16px 18px;font-size:20px}
    .nav{flex-direction:row;flex-wrap:wrap;flex:1}
    .nav button{padding:8px 11px}
    .side-foot{margin:0;border-top:none;padding:10px 16px;display:flex;gap:12px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .topbar,.view{padding-left:18px;padding-right:18px}
    .topbar h1{font-size:24px}
    .ghead .gctl{width:100%;margin-left:0}
    .tablewrap{overflow-x:auto}
    table{min-width:680px}
  }
</style>
</head>
<body>
<div class="shell">
  <!-- sidebar -->
  <aside class="side">
    <div class="brand">Code Official<sup>®</sup></div>
    <nav class="nav">
      <button><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>仪表盘</button>
      <button><svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>订单</button>
      <button><svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><path d="M3 6h18M16 10a4 4 0 0 1-8 0"/></svg>商品</button>
      <button class="on"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.3 7 8.7 5 8.7-5M12 22V12"/></svg>库存</button>
      <button><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>客户</button>
      <button><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 14H4a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6 8.4l-.07-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 11 4.6V4a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 11H20a2 2 0 0 1 0 4h-.6z"/></svg>设置</button>
    </nav>
    <div class="side-foot">
      <a href="#">查看店铺 →</a>
      <button>退出登录</button>
    </div>
  </aside>

  <!-- main -->
  <div class="main">
    <div class="topbar">
      <div>
        <h1>库存管理</h1>
        <div class="sub">Inventory</div>
      </div>
      <div class="who">Lina · 店主</div>
    </div>

    <div class="view">
      <!-- summary -->
      <div class="stats">
        <div class="stat"><div class="n" id="s-units">0</div><div class="l">总库存件数 <b>Total units</b></div></div>
        <div class="stat amber"><div class="n" id="s-low">0</div><div class="l">低库存 <b>Low stock</b></div></div>
        <div class="stat red"><div class="n" id="s-out">0</div><div class="l">缺货 <b>Out of stock</b></div></div>
        <div class="stat blue"><div class="n" id="s-sku">0</div><div class="l">SKU 数 <b>Variants</b></div></div>
      </div>

      <!-- toolbar -->
      <div class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="text" placeholder="搜索商品名称或 SKU…">
        </div>
        <div class="seg" id="filters">
          <button data-f="all" class="on">全部 <span class="c" id="f-all">0</span></button>
          <button data-f="low">低库存 <span class="c" id="f-low">0</span></button>
          <button data-f="out">缺货 <span class="c" id="f-out">0</span></button>
        </div>
        <div class="sortwrap">
          <span>排序</span>
          <select id="sort">
            <option value="name">商品名称</option>
            <option value="qty-asc">库存 少→多</option>
            <option value="qty-desc">库存 多→少</option>
            <option value="sku">SKU</option>
          </select>
        </div>
      </div>

      <div class="layout">
        <div>
          <!-- bulk toolbar -->
          <div class="bulkbar hide" id="bulkbar">
            <span class="sel"><b id="bulk-n">0</b>个变体已选</span>
            <span class="spacer"></span>
            <input class="qf" id="bulk-qty" type="number" min="0" placeholder="数量">
            <button class="bbtn" data-act="set">设为</button>
            <button class="bbtn" data-act="add">＋ 增加</button>
            <button class="bbtn" data-act="sub">－ 减少</button>
            <button class="bbtn x" id="bulk-clear">取消选择</button>
          </div>

          <div class="tablewrap">
            <table>
              <thead>
                <tr>
                  <th class="col-chk"><input type="checkbox" class="col-allchk" id="all-chk"></th>
                  <th class="sortable" data-sort="name">商品 / 尺码</th>
                  <th>SKU</th>
                  <th class="sortable" data-sort="qty-asc">可售 Available</th>
                  <th>状态</th>
                </tr>
              </thead>
              <tbody id="tbody"></tbody>
            </table>
          </div>
          <div class="footnote">设计样稿 · 数据为示意 · 选定此版式后将连接 Supabase 实时库存</div>
        </div>

        <!-- aside -->
        <aside class="aside">
          <div class="card alarm">
            <div class="ch"><h3>低库存 / 缺货</h3><span class="cnt" id="alarm-cnt">0</span></div>
            <div class="restock" id="restock"></div>
            <div class="cf">阈值可在每个商品行单独设置 · 默认 <b>≤ 5</b> 件提醒</div>
          </div>
          <div class="card">
            <div class="tip"><div class="ic">i</div><div>勾选多行后使用顶部工具栏可<b>批量设为 / 增减</b>库存。点击 ＋ / － 或直接输入数字即时更新，汇总卡片随之变化。</div></div>
          </div>
        </aside>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- mock data ---------- */
const PRODUCTS = [
  { id:'p1', name:'羊毛混纺大衣', en:'Wool-Blend Overcoat', sku:'WBO', init:'大', track:true, oversell:false, threshold:5,
    sizes:[['XS',6],['S',3],['M',0],['L',8],['XL',12]] },
  { id:'p2', name:'羊绒圆领毛衣', en:'Cashmere Crewneck', sku:'CCN', init:'羊', track:true, oversell:false, threshold:6,
    sizes:[['XS',14],['S',9],['M',5],['L',2],['XL',0]] },
  { id:'p3', name:'真丝吊带连衣裙', en:'Silk Slip Dress', sku:'SSD', init:'丝', track:true, oversell:true, threshold:4,
    sizes:[['XS',0],['S',1],['M',3],['L',7],['XL',5]] },
  { id:'p4', name:'有机棉T恤', en:'Organic Cotton Tee', sku:'OCT', init:'棉', track:true, oversell:false, threshold:8,
    sizes:[['XS',22],['S',31],['M',18],['L',26],['XL',14]] },
  { id:'p5', name:'高腰阔腿西裤', en:'High-Waist Trousers', sku:'HWT', init:'裤', track:true, oversell:false, threshold:5,
    sizes:[['XS',4],['S',0],['M',2],['L',9],['XL',11]] },
  { id:'p6', name:'亚麻衬衫', en:'Linen Shirt', sku:'LNS', init:'麻', track:false, oversell:false, threshold:5,
    sizes:[['S',7],['M',13],['L',6],['XL',3]] },
  { id:'p7', name:'针织开衫', en:'Knit Cardigan', sku:'KCG', init:'针', track:true, oversell:false, threshold:6,
    sizes:[['XS',1],['S',5],['M',0],['L',4],['XL',2]] },
];

/* flatten into variant rows */
let ROWS = [];
PRODUCTS.forEach(p=>{
  p.sizes.forEach(([sz,q])=>{
    ROWS.push({ pid:p.id, name:p.name, en:p.en, init:p.init,
      sku:`${p.sku}-${sz}`, size:sz, qty:q,
      rid:`${p.id}-${sz}` });
  });
});

let state = { filter:'all', search:'', sort:'name', selected:new Set() };
const $ = s=>document.querySelector(s);
const $$ = s=>[...document.querySelectorAll(s)];

function prodOf(pid){ return PRODUCTS.find(p=>p.id===pid); }
function statusOf(row){
  const p = prodOf(row.pid);
  if(!p.track) return 'off';
  if(row.qty<=0) return 'out';
  if(row.qty<=p.threshold) return 'low';
  return 'in';
}
const STATUS_LABEL = { off:'未追踪', out:'缺货', low:'低库存', in:'有货' };

/* ---------- summary ---------- */
function updateSummary(){
  let units=0, low=0, out=0;
  ROWS.forEach(r=>{
    units += Math.max(0,r.qty);
    const st = statusOf(r);
    if(st==='low') low++;
    if(st==='out') out++;
  });
  $('#s-units').textContent = units.toLocaleString();
  $('#s-low').textContent = low;
  $('#s-out').textContent = out;
  $('#s-sku').textContent = ROWS.length;
  $('#f-all').textContent = ROWS.length;
  $('#f-low').textContent = low;
  $('#f-out').textContent = out;
}

/* ---------- filtering + sorting ---------- */
function visibleRows(){
  let rows = ROWS.filter(r=>{
    const st = statusOf(r);
    if(state.filter==='low' && st!=='low') return false;
    if(state.filter==='out' && st!=='out') return false;
    if(state.search){
      const q = state.search.toLowerCase();
      if(!(r.name.toLowerCase().includes(q) || r.en.toLowerCase().includes(q) || r.sku.toLowerCase().includes(q)))
        return false;
    }
    return true;
  });
  const s = state.sort;
  rows.sort((a,b)=>{
    if(s==='qty-asc') return a.qty-b.qty || a.name.localeCompare(b.name,'zh');
    if(s==='qty-desc') return b.qty-a.qty || a.name.localeCompare(b.name,'zh');
    if(s==='sku') return a.sku.localeCompare(b.sku);
    return a.name.localeCompare(b.name,'zh') || a.sku.localeCompare(b.sku);
  });
  return rows;
}

/* ---------- render table ---------- */
const SIZE_ORDER = {XS:0,S:1,M:2,L:3,XL:4};
function render(){
  const rows = visibleRows();
  const tb = $('#tbody');
  tb.innerHTML = '';

  if(rows.length===0){
    tb.innerHTML = `<tr><td colspan="5" style="padding:40px;text-align:center;color:var(--muted)">没有符合条件的变体</td></tr>`;
    renderAside(); syncBulk(); return;
  }

  // group by product, keep sort order of first appearance
  const order = [];
  const groups = {};
  rows.forEach(r=>{ if(!groups[r.pid]){ groups[r.pid]=[]; order.push(r.pid); } groups[r.pid].push(r); });

  order.forEach(pid=>{
    const p = prodOf(pid);
    const grp = groups[pid];
    const gUnits = grp.reduce((s,r)=>s+Math.max(0,r.qty),0);
    // group header row
    const ghr = document.createElement('tr');
    ghr.className = 'grouphead';
    ghr.innerHTML = `<td></td><td colspan="4">
      <div class="ghead">
        <div>
          <span class="gname">${p.name}</span>
          <span class="gmeta"> · ${p.en} · 共 ${gUnits} 件</span>
        </div>
        <div class="gctl">
          <label class="toggle" title="追踪库存">
            <input type="checkbox" data-tog="track" data-pid="${pid}" ${p.track?'checked':''}><span class="sw"></span>追踪库存
          </label>
          <label class="toggle" title="售罄后仍可购买">
            <input type="checkbox" data-tog="oversell" data-pid="${pid}" ${p.oversell?'checked':''}><span class="sw"></span>售罄仍可买
          </label>
          <span class="thresh" title="低库存阈值">低库存阈值 ≤
            <input type="number" min="0" data-thresh="${pid}" value="${p.threshold}">
          </span>
        </div>
      </div></td>`;
    tb.appendChild(ghr);

    grp.forEach(r=>{
      const st = statusOf(r);
      const tr = document.createElement('tr');
      tr.className = (st==='out'?'out':st==='low'?'low':'') + (state.selected.has(r.rid)?' sel':'');
      tr.dataset.rid = r.rid;
      tr.innerHTML = `
        <td class="col-chk"><input type="checkbox" class="rowchk" data-rid="${r.rid}" ${state.selected.has(r.rid)?'checked':''}></td>
        <td>
          <div class="prodcell">
            <div class="thumb">${p.init}</div>
            <div>
              <div class="nm">${r.name} <span class="sizetag">${r.size}</span></div>
              <div class="en">${r.en}</div>
            </div>
          </div>
        </td>
        <td><span class="sku">${r.sku}</span></td>
        <td>
          <div class="stepper">
            <button data-step="-1" data-rid="${r.rid}" aria-label="减少">−</button>
            <input type="number" min="0" class="qin" data-rid="${r.rid}" value="${r.qty}">
            <button data-step="1" data-rid="${r.rid}" aria-label="增加">＋</button>
          </div>
          <span class="savedot" data-dot="${r.rid}"></span>
        </td>
        <td><span class="badge ${st}">${STATUS_LABEL[st]}</span></td>`;
      tb.appendChild(tr);
    });
  });

  bindRowEvents();
  renderAside();
  syncBulk();
  syncAllChk();
}

/* ---------- aside restock list ---------- */
function renderAside(){
  const need = ROWS.filter(r=>{ const s=statusOf(r); return s==='low'||s==='out'; })
    .sort((a,b)=>a.qty-b.qty);
  $('#alarm-cnt').textContent = need.length;
  const wrap = $('#restock');
  if(need.length===0){
    wrap.innerHTML = `<div class="restock-empty">太好了，没有需要补货的变体 🎉</div>`;
    return;
  }
  wrap.innerHTML = need.map(r=>{
    const p = prodOf(r.pid);
    const out = r.qty<=0;
    return `<div class="ritem">
      <div class="rt">${p.init}</div>
      <div class="ri">
        <div class="rn">${r.name}</div>
        <div class="rs">${r.size} · ${r.sku}</div>
      </div>
      <span class="rq ${out?'out':'low'}">${out?'缺货':r.qty+' 件'}</span>
    </div>`;
  }).join('');
}

/* ---------- mutate qty ---------- */
function setQty(rid, val){
  const r = ROWS.find(x=>x.rid===rid);
  if(!r) return;
  r.qty = Math.max(0, val|0);
  updateSummary();
  // re-render affected rows' visuals without full rebuild when possible
  const tr = document.querySelector(`tr[data-rid="${rid}"]`);
  if(tr){
    const st = statusOf(r);
    tr.classList.toggle('out', st==='out');
    tr.classList.toggle('low', st==='low');
    const inp = tr.querySelector('.qin'); if(inp) inp.value = r.qty;
    const badge = tr.querySelector('.badge');
    if(badge){ badge.className='badge '+st; badge.textContent=STATUS_LABEL[st]; }
    const dot = tr.querySelector(`[data-dot="${rid}"]`);
    if(dot){ dot.classList.add('show'); setTimeout(()=>dot.classList.remove('show'),900); }
  }
  renderAside();
  // if a filter is active, row may need to drop out — soft refresh
  if(state.filter!=='all'){ scheduleRefilter(); }
}
let reTimer=null;
function scheduleRefilter(){ clearTimeout(reTimer); reTimer=setTimeout(render,650); }

/* ---------- row events ---------- */
function bindRowEvents(){
  $$('.stepper button').forEach(b=> b.onclick = ()=>{
    const rid=b.dataset.rid, r=ROWS.find(x=>x.rid===rid);
    setQty(rid, r.qty + (+b.dataset.step));
  });
  $$('.qin').forEach(inp=>{
    inp.onchange = ()=> setQty(inp.dataset.rid, +inp.value);
    inp.onkeydown = e=>{ if(e.key==='Enter') inp.blur(); };
  });
  $$('.rowchk').forEach(c=> c.onchange = ()=>{
    if(c.checked) state.selected.add(c.dataset.rid); else state.selected.delete(c.dataset.rid);
    const tr=c.closest('tr'); tr.classList.toggle('sel',c.checked);
    syncBulk(); syncAllChk();
  });
  $$('[data-tog]').forEach(t=> t.onchange = ()=>{
    const p=prodOf(t.dataset.pid); p[t.dataset.tog]=t.checked;
    updateSummary(); render();
    toast(t.checked? (t.dataset.tog==='track'?'已开启库存追踪':'已允许售罄后购买')
                   : (t.dataset.tog==='track'?'已关闭库存追踪':'已禁止售罄后购买'));
  });
  $$('[data-thresh]').forEach(t=> t.onchange = ()=>{
    const p=prodOf(t.dataset.thresh); p.threshold=Math.max(0,+t.value|0); t.value=p.threshold;
    updateSummary(); render(); toast('低库存阈值已更新为 ≤ '+p.threshold);
  });
}

/* ---------- bulk ---------- */
function syncBulk(){
  // prune selections no longer visible? keep selection across filters but show count
  const n = state.selected.size;
  $('#bulk-n').textContent = n;
  $('#bulkbar').classList.toggle('hide', n===0);
}
function syncAllChk(){
  const vis = visibleRows().map(r=>r.rid);
  const all = $('#all-chk');
  if(vis.length===0){ all.checked=false; all.indeterminate=false; return; }
  const selVis = vis.filter(r=>state.selected.has(r));
  all.checked = selVis.length===vis.length;
  all.indeterminate = selVis.length>0 && selVis.length<vis.length;
}
function applyBulk(act){
  const v = parseInt($('#bulk-qty').value,10);
  if(isNaN(v)){ toast('请先输入数量'); $('#bulk-qty').focus(); return; }
  const ids=[...state.selected];
  ids.forEach(rid=>{
    const r=ROWS.find(x=>x.rid===rid); if(!r) return;
    if(act==='set') r.qty=Math.max(0,v);
    if(act==='add') r.qty=Math.max(0,r.qty+v);
    if(act==='sub') r.qty=Math.max(0,r.qty-v);
  });
  updateSummary(); render();
  const verb = act==='set'?'设为':act==='add'?'增加':'减少';
  toast(`已为 ${ids.length} 个变体${verb} ${v} 件`);
}

/* ---------- toast ---------- */
let tTimer=null;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(tTimer); tTimer=setTimeout(()=>t.classList.remove('show'),1900);
}

/* ---------- global controls ---------- */
$('#search').oninput = e=>{ state.search=e.target.value.trim(); render(); };
$('#sort').onchange = e=>{ state.sort=e.target.value; render(); };
$$('#filters button').forEach(b=> b.onclick = ()=>{
  $$('#filters button').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); state.filter=b.dataset.f; render();
});
$('#all-chk').onchange = e=>{
  const vis = visibleRows().map(r=>r.rid);
  if(e.target.checked) vis.forEach(r=>state.selected.add(r));
  else vis.forEach(r=>state.selected.delete(r));
  render();
};
$('#bulk-clear').onclick = ()=>{ state.selected.clear(); render(); };
$$('.bulkbar [data-act]').forEach(b=> b.onclick = ()=>applyBulk(b.dataset.act));

/* ---------- init ---------- */
updateSummary();
render();
</script>
</body>
</html>
