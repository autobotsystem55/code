<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Code Official</title>
  <meta name="description" content="Product admin.">
  <meta name="robots" content="noindex,nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/pixel.js"></script>

  <style>
    .adm-row { display:grid; grid-template-columns:54px 1fr auto auto; gap:14px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line); }
    .adm-row img { width:54px; height:68px; object-fit:cover; border-radius:var(--radius); background:var(--blush); }
    .adm-row .nm { font-weight:500; }
    .adm-row .meta { font-size:12px; color:var(--muted); }
    .adm-actions button { font-size:11px; letter-spacing:.1em; text-transform:uppercase; padding:7px 12px; border:1px solid var(--pink-border); border-radius:var(--radius); margin-left:6px; }
    .adm-actions button:hover { border-color:var(--wine); color:var(--wine); }
    .adm-off { opacity:.5; }
    .pill { font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border-radius:99px; background:var(--blush); color:var(--ink-soft); }
    .pill.sale { background:var(--wine); color:var(--cream); }
    .editor { background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:clamp(20px,3vw,30px); margin-bottom:34px; }
    .editor h3 { font-size:24px; margin-bottom:18px; }
    .chips { display:flex; gap:8px; flex-wrap:wrap; }
    .chips label { border:1px solid var(--pink-border); border-radius:var(--radius); padding:8px 14px; font-size:13px; cursor:pointer; }
    .chips input { margin-right:6px; }
    .color-row { display:grid; grid-template-columns:1fr 52px; gap:10px; margin-bottom:8px; }
    .color-row input[type=color] { width:100%; height:44px; border:1px solid var(--pink-border); border-radius:var(--radius); padding:2px; background:var(--white); }
    .adm-msg { font-size:13px; margin-top:12px; }
    textarea.fld { width:100%; padding:12px 14px; background:var(--white); border:1px solid var(--pink-border); border-radius:var(--radius); outline:none; min-height:74px; resize:vertical; }
    textarea.fld:focus { border-color:var(--wine); }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="wrap">
    <div class="page-head" style="text-align:left">
      <span class="eyebrow">Admin</span>
      <h1>商品后台</h1>
    </div>
    <div id="admin" style="padding-bottom:90px"></div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/products.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/store.js"></script>
  <script>
    (function () {
      var root = document.getElementById('admin');
      var SIZES = ['XS', 'S', 'M', 'L', 'XL', 'One Size'];
      var CATS = (window.CATEGORIES || ['Outerwear']).filter(function (c) { return c !== 'All'; });
      var cache = [];     // current products
      var editingId = null;

      if (!window.Auth || !Auth.enabled) {
        root.innerHTML = '<p class="muted" style="padding:40px 0">' + t('acc.disabled') + '</p>';
        return;
      }

      Auth.getUser().then(function (res) {
        var user = res && res.data && res.data.user;
        if (!user) {
          root.innerHTML = '<p class="muted" style="margin-bottom:20px">请先用<strong>管理员账号</strong>登录，才能管理商品。</p>' +
            '<a class="btn" href="account.html">去登录 / 注册</a>';
          return;
        }
        DB.isAdmin().then(function (ok) {
          if (ok) { renderShell(user); loadList(); return; }
          root.innerHTML = '<div style="padding:24px 0;max-width:520px">' +
            '<p class="muted" style="margin-bottom:8px">当前登录：' + esc(user.email) + '</p>' +
            '<h2 style="font-size:30px;margin-bottom:12px">无管理权限</h2>' +
            '<p class="muted" style="margin-bottom:26px">这个账号不是管理员，无法管理商品。请用管理员账号登录。</p>' +
            '<a class="btn" href="account.html">切换账号</a> &nbsp; <a class="link-underline" href="index.html">回首页</a>' +
          '</div>';
        });
      });

      function esc(s) { return String(s == null ? '' : s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
      function slug(s) {
        return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 28) ||
          ('item-' + String(Date.now()).slice(-5));
      }

      function renderShell(user) {
        root.innerHTML =
          '<div style="display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:24px">' +
            '<div class="muted" style="font-size:13px">管理员：' + esc(user.email) + '</div>' +
            '<button class="btn" id="newBtn">+ 新建商品</button>' +
          '</div>' +
          '<div id="editorWrap"></div>' +
          '<div id="list"><p class="muted" style="padding:14px 0">载入中…</p></div>';
        document.getElementById('newBtn').addEventListener('click', function () { openEditor(null); });
      }

      function loadList() {
        DB.allProducts().then(function (r) {
          var box = document.getElementById('list');
          if (r.error) { box.innerHTML = '<p style="color:var(--wine)">读取失败：' + esc(r.error.message) + '</p>'; return; }
          cache = r.data || [];
          if (!cache.length) {
            box.innerHTML = '<p class="muted" style="padding:14px 0">数据库里还没有商品。点「新建商品」添加，或先在 Supabase 跑 seed.sql 导入示例 12 件。</p>';
            return;
          }
          box.innerHTML = '<div style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">共 ' + cache.length + ' 件</div>' +
            cache.map(function (p) {
              var img = (p.images && p.images[0]) ? imgUrl(p.images[0], 120) : 'images/placeholder.svg';
              var badge = p.compare_at ? '<span class="pill sale">SALE</span>' : (p.badge ? '<span class="pill">' + esc(p.badge) + '</span>' : '');
              return '<div class="adm-row ' + (p.active ? '' : 'adm-off') + '">' +
                '<img src="' + img + '" alt="" onerror="this.onerror=null;this.src=\'images/placeholder.svg\'">' +
                '<div><div class="nm">' + esc(p.name) + (p.name_zh ? ' · ' + esc(p.name_zh) : '') + '</div>' +
                  '<div class="meta">' + esc(p.category) + ' · ' + (STORE_CONFIG.currencySymbol || '') + p.price + (p.active ? '' : ' · 已下架') + ' ' + badge + '</div></div>' +
                '<div></div>' +
                '<div class="adm-actions"><button data-edit="' + esc(p.id) + '">编辑</button><button data-del="' + esc(p.id) + '">删除</button></div>' +
              '</div>';
            }).join('');
          box.querySelectorAll('[data-edit]').forEach(function (b) {
            b.addEventListener('click', function () { openEditor(b.getAttribute('data-edit')); });
          });
          box.querySelectorAll('[data-del]').forEach(function (b) {
            b.addEventListener('click', function () { del(b.getAttribute('data-del')); });
          });
        });
      }

      function openEditor(id) {
        editingId = id;
        var p = id ? cache.filter(function (x) { return x.id === id; })[0] : null;
        p = p || { sizes: [], colors: [], images: [], active: true };
        var sizesArr = p.sizes || [], colorsArr = p.colors || [], imgs = p.images || [];

        var sizeChips = SIZES.map(function (s) {
          return '<label><input type="checkbox" class="sz" value="' + s + '"' + (sizesArr.indexOf(s) >= 0 ? ' checked' : '') + '>' + s + '</label>';
        }).join('');
        var colorRows = [0, 1, 2, 3].map(function (i) {
          var c = colorsArr[i] || {};
          return '<div class="color-row"><input class="fld cname" placeholder="颜色名 (如 Camel)" value="' + esc(c.name) + '">' +
            '<input type="color" class="chex" value="' + (c.hex || '#cccccc') + '"></div>';
        }).join('');
        var catOpts = CATS.map(function (c) { return '<option' + (p.category === c ? ' selected' : '') + '>' + c + '</option>'; }).join('');
        var badges = ['', 'New', 'Sale'].map(function (b) { return '<option value="' + b + '"' + (p.badge === b ? ' selected' : '') + '>' + (b || '无') + '</option>'; }).join('');

        document.getElementById('editorWrap').innerHTML =
          '<div class="editor"><h3>' + (id ? '编辑商品' : '新建商品') + '</h3>' +
            '<div class="row2">' +
              '<div class="field"><label>商品 ID' + (id ? '（不可改）' : '（留空自动生成）') + '</label><input class="fld" id="f_id" ' + (id ? 'readonly' : '') + ' value="' + esc(p.id) + '"></div>' +
              '<div class="field"><label>分类 Category</label><select class="fld" id="f_cat">' + catOpts + '</select></div>' +
            '</div>' +
            '<div class="row2">' +
              '<div class="field"><label>商品名 (English) *</label><input class="fld" id="f_name" value="' + esc(p.name) + '"></div>' +
              '<div class="field"><label>商品名 (中文)</label><input class="fld" id="f_name_zh" value="' + esc(p.name_zh) + '"></div>' +
            '</div>' +
            '<div class="row2">' +
              '<div class="field"><label>价格 Price *</label><input class="fld" id="f_price" type="number" step="0.01" value="' + (p.price != null ? p.price : '') + '"></div>' +
              '<div class="field"><label>原价 Compare-at（打折时填，可空）</label><input class="fld" id="f_cmp" type="number" step="0.01" value="' + (p.compare_at != null ? p.compare_at : '') + '"></div>' +
            '</div>' +
            '<div class="row2">' +
              '<div class="field"><label>标签 Badge</label><select class="fld" id="f_badge">' + badges + '</select></div>' +
              '<div class="field"><label>排序 Sort（越小越靠前）</label><input class="fld" id="f_sort" type="number" value="' + (p.sort != null ? p.sort : 0) + '"></div>' +
            '</div>' +
            '<div class="field"><label>尺码 Sizes</label><div class="chips">' + sizeChips + '</div></div>' +
            '<div class="field"><label>颜色 Colours（名称 + 颜色，最多 4 个）</label>' + colorRows + '</div>' +
            '<div class="row2">' +
              '<div class="field"><label>主图 Image 1（Unsplash ID 或图片网址）</label><input class="fld" id="f_img1" value="' + esc(imgs[0]) + '"></div>' +
              '<div class="field"><label>备用图 Image 2（可空）</label><input class="fld" id="f_img2" value="' + esc(imgs[1]) + '"></div>' +
            '</div>' +
            '<div class="field"><label>描述 (English)</label><textarea class="fld" id="f_desc">' + esc(p.description) + '</textarea></div>' +
            '<div class="field"><label>描述 (中文)</label><textarea class="fld" id="f_desc_zh">' + esc(p.description_zh) + '</textarea></div>' +
            '<div class="field"><label><input type="checkbox" id="f_active"' + (p.active !== false ? ' checked' : '') + '> 上架（取消勾选 = 下架，顾客看不到）</label></div>' +
            '<div style="display:flex;gap:12px;margin-top:8px">' +
              '<button class="btn" id="saveBtn">保存</button>' +
              '<button class="btn btn--ghost" id="cancelBtn">取消</button>' +
            '</div>' +
            '<p class="adm-msg" id="adm_msg"></p>' +
          '</div>';

        document.getElementById('cancelBtn').addEventListener('click', function () { document.getElementById('editorWrap').innerHTML = ''; });
        document.getElementById('saveBtn').addEventListener('click', save);
        document.getElementById('editorWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }

      function save() {
        var msg = document.getElementById('adm_msg');
        msg.style.color = 'var(--wine)';
        var name = val('f_name');
        var price = parseFloat(val('f_price'));
        if (!name) { msg.textContent = '请填写商品名 (English)。'; return; }
        if (isNaN(price)) { msg.textContent = '请填写有效价格。'; return; }

        var sizes = [].map.call(document.querySelectorAll('.sz:checked'), function (c) { return c.value; });
        var colors = [];
        var names = document.querySelectorAll('.cname'), hexes = document.querySelectorAll('.chex');
        for (var i = 0; i < names.length; i++) {
          var n = names[i].value.trim();
          if (n) colors.push({ name: n, hex: hexes[i].value });
        }
        var images = [val('f_img1'), val('f_img2')].filter(Boolean);
        var cmp = val('f_cmp');

        var row = {
          id: editingId || (val('f_id') || slug(name)),
          name: name, name_zh: val('f_name_zh') || null,
          category: val('f_cat'),
          price: price,
          compare_at: cmp ? parseFloat(cmp) : null,
          badge: val('f_badge') || null,
          sizes: sizes, colors: colors, images: images,
          description: val('f_desc') || null, description_zh: val('f_desc_zh') || null,
          active: document.getElementById('f_active').checked,
          sort: parseInt(val('f_sort'), 10) || 0
        };

        document.getElementById('saveBtn').disabled = true;
        DB.upsertProduct(row).then(function (r) {
          document.getElementById('saveBtn').disabled = false;
          if (r && r.error) {
            msg.textContent = '保存失败：' + r.error.message + '　（如果提示权限/policy，请确认已运行 admin.sql 且用管理员邮箱登录）';
            return;
          }
          document.getElementById('editorWrap').innerHTML = '';
          toast('已保存：' + name);
          loadList();
        }, function () {
          document.getElementById('saveBtn').disabled = false;
          msg.textContent = '保存失败，请重试。';
        });
      }

      function del(id) {
        if (!window.confirm('确定删除这个商品？此操作不可恢复。')) return;
        DB.deleteProduct(id).then(function (r) {
          if (r && r.error) { alert('删除失败：' + r.error.message); return; }
          toast('已删除');
          loadList();
        });
      }
    })();
  </script>
</body>
</html>
