<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台 · Code Official</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root{
      --cream:#FFFAF1; --cream2:#FAF6F3; --white:#fff;
      --wine:#82213E; --wine-deep:#6A1A32; --pink:#E9C9CC; --blush:#F2E4D9;
      --ink:#1C1C1C; --ink2:#3E3E3E; --muted:#6F635C; --line:#ECD9D6; --line2:#E2DCD8;
      --green:#2F7D4F; --amber:#9A6A1E; --blue:#3A5C9A; --red:#B23A3A; --pink-soft:#F3E2E4; --radius:6px;
      --green-bg:#E3F1E8; --amber-bg:#F6EAD3; --red-bg:#F7E3E0;
      --serif:'DM Serif Display',Georgia,serif; --sans:'DM Sans',-apple-system,Segoe UI,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);color:var(--ink);background:var(--cream);font-size:15px;line-height:1.6}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,select,textarea{font-family:inherit;font-size:14px;color:inherit}
    img{display:block;max-width:100%}
    h1,h2,h3{font-family:var(--serif);font-weight:400;line-height:1.1}
    .muted{color:var(--muted)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--wine);color:var(--cream);
      padding:11px 20px;font-size:13px;font-weight:500;letter-spacing:.02em;border:1px solid var(--wine);transition:.25s}
    .btn:hover{background:var(--wine-deep);border-color:var(--wine-deep)}
    .btn--ghost{background:transparent;color:var(--wine)}
    .btn--ghost:hover{background:var(--wine);color:var(--cream)}
    .btn--sm{padding:7px 13px;font-size:12px}
    .btn[disabled]{opacity:.5;cursor:not-allowed}

    /* ---------- 购物金 (store credit) ---------- */
    .screg{display:flex;align-items:flex-start;gap:13px;padding:14px 0;border-top:1px solid var(--line)}
    .screg:first-of-type{border-top:none;padding-top:6px}
    .screg-tx{flex:1}
    .screg-tx b{font-size:14px}
    .screg-tx span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
    .scfields{margin:6px 0 4px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:13.5px}
    .scfields.off{opacity:.4;pointer-events:none}
    .scseg{display:inline-flex;border:1px solid var(--line2);border-radius:999px;overflow:hidden}
    .scseg button{padding:7px 13px;font-size:12.5px;color:var(--muted);font-weight:600;background:var(--white)}
    .scseg button.on{background:var(--wine);color:#fff}
    .switch{position:relative;flex-shrink:0;width:46px;height:25px;border-radius:999px;background:var(--line2);cursor:pointer;padding:0;transition:background .2s ease}
    .switch .knob{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:var(--white);box-shadow:0 1px 3px rgba(0,0,0,.22);transition:transform .2s ease}
    .switch.on{background:var(--wine)}
    .switch.on .knob{transform:translateX(21px)}

    /* ---------- login ---------- */
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:100%;max-width:380px;background:var(--white);border:1px solid var(--line);padding:38px 32px;text-align:center}
    .login-card .logo{font-family:var(--serif);font-size:30px;margin-bottom:4px}
    .login-card .logo sup{font-size:.42em;color:var(--wine)}
    .login-card .sub{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
    .field{text-align:left;margin-bottom:14px}
    .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;padding:11px 13px;background:var(--white);border:1px solid var(--line2);outline:none;transition:.2s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--wine)}
    .field textarea{min-height:70px;resize:vertical}
    .msg{font-size:13px;color:var(--wine);margin-top:10px;min-height:18px}

    /* ---------- shell ---------- */
    .shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
    .side{background:var(--cream2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
    .side .brand{font-family:var(--serif);font-size:24px;padding:24px 24px 20px}
    .side .brand sup{font-size:.42em;color:var(--wine)}
    .nav{display:flex;flex-direction:column;padding:6px 12px;gap:2px}
    .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 14px;font-size:14px;color:var(--ink2);border-radius:6px;transition:.18s}
    .nav button:hover{background:var(--blush)}
    .nav button.on{background:var(--wine);color:var(--cream)}
    .nav button.on svg{stroke:var(--cream)}
    .nav svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.6}
    .side-foot{margin-top:auto;padding:16px 16px 22px;border-top:1px solid var(--line);font-size:13px}
    .side-foot a,.side-foot button{display:block;color:var(--muted);padding:6px 8px}
    .side-foot a:hover,.side-foot button:hover{color:var(--wine)}

    .main{min-width:0}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 30px;border-bottom:1px solid var(--line);background:var(--cream)}
    .topbar h1{font-size:30px}
    .topbar .who{font-size:13px;color:var(--muted)}
    .view{padding:26px 30px 70px}

    /* ---------- cards / tables ---------- */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
    .stat{background:var(--white);border:1px solid var(--line);padding:18px 20px}
    .stat .n{font-family:var(--serif);font-size:34px;line-height:1}
    .stat .l{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:8px}
    .panel{background:var(--white);border:1px solid var(--line);padding:22px 24px;margin-bottom:22px}
    .panel h2{font-size:22px;margin-bottom:16px}
    .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .panel-head h2{margin:0}

    table{width:100%;border-collapse:collapse;font-size:14px}
    th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:10px 10px;border-bottom:1px solid var(--line)}
    td{padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .thumb{width:46px;height:58px;object-fit:cover;background:var(--blush)}
    .pill{display:inline-block;font-size:11px;letter-spacing:.04em;padding:3px 9px;border-radius:999px;background:var(--blush);color:var(--ink2);white-space:nowrap}
    .pill.sale{background:var(--wine);color:var(--cream)}
    .pill.new{background:var(--ink);color:var(--cream)}
    .pill.off{background:var(--line2);color:var(--muted)}
    .pill.green{background:#E3F1E8;color:var(--green)}
    .pill.amber{background:#F6EAD3;color:var(--amber)}
    .pill.blue{background:#E2E9F6;color:var(--blue)}
    .tbl-actions button{font-size:12px;color:var(--muted);padding:6px 9px;border:1px solid var(--line2);border-radius:5px;margin-left:6px}
    .tbl-actions button:hover{border-color:var(--wine);color:var(--wine)}
    .empty{padding:40px 0;text-align:center;color:var(--muted)}

    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .chips{display:flex;gap:7px;flex-wrap:wrap}
    .chips label{border:1px solid var(--line2);padding:7px 13px;font-size:13px;cursor:pointer;border-radius:5px}
    .chips input{margin-right:6px}
    .color-row{display:grid;grid-template-columns:1fr 50px;gap:8px;margin-bottom:7px}
    .color-row input[type=color]{height:42px;padding:2px;border:1px solid var(--line2)}
    .seg{display:inline-flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden}
    .seg button{padding:9px 16px;font-size:13px;background:var(--white)}
    .seg button.on{background:var(--wine);color:var(--cream)}
    .bars{display:flex;align-items:flex-end;gap:10px;height:120px;padding-top:8px}
    .bars .bar{flex:1;background:var(--pink);border-radius:4px 4px 0 0;position:relative;min-height:3px}
    .bars .bar span{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted)}

    /* ---------- hamburger ---------- */
    .mob-bar{display:none}
    .ham{width:40px;height:40px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;border:1px solid var(--line2);border-radius:6px;background:var(--white);cursor:pointer;flex-shrink:0}
    .ham span{display:block;width:18px;height:2px;background:var(--ink2);border-radius:2px;transition:.2s}
    .ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .ham.open span:nth-child(2){opacity:0}
    .ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    .mob-drawer{display:none;position:fixed;inset:0;z-index:200}
    .mob-overlay{position:absolute;inset:0;background:rgba(0,0,0,.35)}
    .mob-panel{position:absolute;top:0;left:0;bottom:0;width:260px;background:var(--cream2);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .22s ease;box-shadow:4px 0 24px rgba(0,0,0,.12)}
    .mob-panel.slide-in{transform:translateX(0)}
    .mob-panel .mpbrand{font-family:var(--serif);font-size:22px;padding:22px 20px 18px;border-bottom:1px solid var(--line)}
    .mob-panel .mpbrand sup{font-size:.42em;color:var(--wine)}
    .mob-panel .mpnav{display:flex;flex-direction:column;padding:8px 12px;gap:2px;flex:1;overflow-y:auto}
    .mob-panel .mpnav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:13px 14px;font-size:15px;color:var(--ink2);border-radius:6px;transition:.18s}
    .mob-panel .mpnav button:hover{background:var(--blush)}
    .mob-panel .mpnav button.on{background:var(--wine);color:var(--cream)}
    .mob-panel .mpnav button.on svg{stroke:var(--cream)}
    .mob-panel .mpnav svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.6}
    .mob-panel .mpfoot{padding:14px 16px 28px;border-top:1px solid var(--line);font-size:13px;display:flex;gap:14px}
    .mob-panel .mpfoot a,.mob-panel .mpfoot button{color:var(--muted)}
    .mob-panel .mpfoot a:hover,.mob-panel .mpfoot button:hover{color:var(--wine)}

    @media(max-width:860px){
      .shell{grid-template-columns:1fr}
      .side{display:none}
      .mob-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--cream2);border-bottom:1px solid var(--line);position:fixed;top:0;left:0;right:0;z-index:100}
      .shell{padding-top:69px}
      .mob-bar .mb-brand{font-family:var(--serif);font-size:20px}
      .mob-bar .mb-brand sup{font-size:.42em;color:var(--wine)}
      .stats{grid-template-columns:repeat(2,1fr)}
      .row2{grid-template-columns:1fr}
      .topbar{display:none}
      .view{padding-left:16px;padding-right:16px;padding-top:18px}
      .panel table th:last-child,.panel table td:last-child{display:none}
      .panel{padding:16px 14px}
      /* 库存 */
      .istats{grid-template-columns:repeat(2,1fr)}
      .console{grid-template-columns:1fr}
      .rail{position:static}
      /* 设置 */
      .setpage .grid{grid-template-columns:1fr}
      .setpage .cards{columns:1}
      .setpage .card{padding:16px 14px}
      /* 商品列表隐藏额外列 */
      .plist .ecat,.plist .eprice,.plist .estatus{display:none}
      /* 库存展开行 — flexbox 布局，stepper 完整显示 */
      .srow{display:flex;align-items:center;gap:8px;padding:8px 10px}
      .srow>div:first-child{flex:1;min-width:0}
      .srow .sku{display:none}
      .srow .stepper{flex-shrink:0}
      .srow .sstat{flex-shrink:0;font-size:11px;min-width:30px}
      /* 全局防横向滑动（body 级不截断内部内容） */
      html,body{overflow-x:hidden;max-width:100%}
    }

    /* ===== inventory console (design C) ===== */
    .console{display:grid;grid-template-columns:1fr 296px;gap:22px;align-items:start}
    .istats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
    .istat{background:var(--white);border:1px solid var(--line);padding:16px 18px;position:relative}
    .istat .n{font-family:var(--serif);font-size:32px;line-height:1}
    .istat .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:7px}
    .istat .ico{position:absolute;top:14px;right:14px;width:18px;height:18px;fill:none;stroke:var(--pink);stroke-width:1.6}
    .istat.warn .n{color:var(--amber)} .istat.warn .ico{stroke:var(--amber)}
    .istat.bad .n{color:var(--red)} .istat.bad .ico{stroke:var(--red)}
    .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .search{position:relative;flex:1;min-width:200px}
    .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:none;stroke:var(--muted);stroke-width:1.7}
    .search input{width:100%;padding:10px 12px 10px 36px;background:var(--white);border:1px solid var(--line2);outline:none}
    .search input:focus{border-color:var(--wine)}
    .iseg{display:inline-flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--white)}
    .iseg button{padding:9px 14px;font-size:13px;color:var(--ink2)}
    .iseg button.on{background:var(--wine);color:var(--cream)}
    .iseg button:not(.on):hover{background:var(--blush)}
    .iseg .badge{display:inline-block;min-width:18px;margin-left:6px;padding:0 5px;font-size:11px;line-height:16px;text-align:center;border-radius:999px;background:var(--blush);color:var(--ink2)}
    .iseg button.on .badge{background:rgba(255,255,255,.25);color:var(--cream)}
    .bulkbar{display:none;align-items:center;gap:12px;flex-wrap:wrap;background:var(--wine);color:var(--cream);padding:10px 16px;margin-bottom:12px}
    .bulkbar.show{display:flex}
    .bulkbar .cnt{font-weight:600}
    .bulkbar input[type=number]{width:64px;padding:6px 8px;border:none;outline:none;text-align:center}
    .bulkbar .bbtn{background:rgba(255,255,255,.14);color:var(--cream);padding:7px 12px;font-size:12px;border:1px solid rgba(255,255,255,.3)}
    .bulkbar .bbtn:hover{background:rgba(255,255,255,.26)}
    .bulkbar .x{margin-left:auto;font-size:13px;opacity:.85}
    .ptable{background:var(--white);border:1px solid var(--line)}
    .ph{display:grid;grid-template-columns:38px 1fr 116px 132px 150px 70px;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
    .prow{border-bottom:1px solid var(--line)} .prow:last-child{border-bottom:none}
    .psum{display:grid;grid-template-columns:38px 1fr 116px 132px 150px 70px;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
    .psum:hover{background:var(--cream2)}
    .ck{width:16px;height:16px;accent-color:var(--wine);cursor:pointer}
    .pcell{display:flex;align-items:center;gap:12px;min-width:0}
    .ithumb{width:42px;height:54px;object-fit:cover;background:var(--blush);flex-shrink:0;border:1px solid var(--line)}
    .pname{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pen{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pmeta{font-size:11px;color:var(--muted);margin-top:1px}
    .totbox{font-family:var(--serif);font-size:21px;line-height:1}
    .totbox small{font-family:var(--sans);font-size:11px;color:var(--muted)}
    .badge2{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:500;white-space:nowrap}
    .badge2.ok{background:var(--green-bg);color:var(--green)} .badge2.low{background:var(--amber-bg);color:var(--amber)} .badge2.out{background:var(--red-bg);color:var(--red)}
    .badge2 .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .sizemini{display:flex;gap:4px;flex-wrap:wrap}
    .smchip{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--blush);color:var(--ink2);white-space:nowrap}
    .smchip.low{background:var(--amber-bg);color:var(--amber)} .smchip.out{background:var(--red-bg);color:var(--red)}
    .caret{width:16px;height:16px;fill:none;stroke:var(--muted);stroke-width:2;transition:.2s;justify-self:end}
    .prow.open .caret{transform:rotate(90deg);stroke:var(--wine)} .prow.open .psum{background:var(--cream2)}
    .pexp{display:none;padding:4px 16px 20px;background:var(--cream2);border-top:1px dashed var(--line)}
    .prow.open .pexp{display:block}
    .exp-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:20px;padding-top:16px}
    .exp-h{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}
    .sizes{background:var(--white);border:1px solid var(--line)}
    .srow{display:grid;grid-template-columns:64px 1fr 132px 78px;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--line)}
    .srow:last-child{border-bottom:none}
    .srow .sz{font-weight:600;font-size:14px} .srow .sku{font-size:11px;color:var(--muted)}
    .stepper{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:var(--white)}
    .stepper button{width:30px;height:32px;font-size:17px;color:var(--wine);background:var(--white)} .stepper button:hover{background:var(--blush)}
    .stepper input{width:46px;height:32px;text-align:center;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);outline:none;font-size:14px;font-weight:600;background:var(--white)}
    .srow.low input{color:var(--amber)} .srow.out input{color:var(--red)}
    .srow.low{background:#FFFCF5} .srow.out{background:#FFF8F6}
    .sstat{font-size:11px;text-align:right;white-space:nowrap}
    .sstat.low{color:var(--amber)} .sstat.out{color:var(--red)} .sstat.ok{color:var(--green)}
    .ctrls{background:var(--white);border:1px solid var(--line);padding:16px 16px 6px}
    .ctrl{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
    .ctrl:last-child{border-bottom:none}
    .ctrl .lab{font-size:13px;font-weight:500}
    .ctrl .lab small{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:1px}
    .sw{position:relative;width:42px;height:23px;border-radius:999px;background:var(--line2);transition:.2s;flex-shrink:0;cursor:pointer}
    .sw::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:.2s}
    .sw.on{background:var(--wine)} .sw.on::after{transform:translateX(19px)}
    .thr{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:var(--white)}
    .thr button{width:28px;height:30px;color:var(--wine)} .thr button:hover{background:var(--blush)}
    .thr input{width:40px;height:30px;text-align:center;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);outline:none;font-weight:600}
    .exp-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
    .saved{font-size:12px;color:var(--green);opacity:0;transition:.3s;margin-right:auto;align-self:center} .saved.show{opacity:1}
    .rail{position:sticky;top:0;display:flex;flex-direction:column;gap:16px}
    .rcard{background:var(--white);border:1px solid var(--line)}
    .rcard .rh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
    .rcard .rh h3{font-size:17px}
    .rcard .rh .cn{font-size:11px;font-weight:600;color:var(--cream);background:var(--red);border-radius:999px;padding:2px 8px}
    .rcard .rh .cn.amb{background:var(--amber)}
    .rbody{padding:6px 0}
    .alert{display:flex;align-items:center;gap:11px;padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
    .alert:last-child{border-bottom:none} .alert:hover{background:var(--cream2)}
    .alert .at{width:34px;height:44px;object-fit:cover;background:var(--blush);border:1px solid var(--line);flex-shrink:0}

    .bw .rev-line{display:flex;justify-content:space-between;gap:10px;font-size:14px;padding:5px 0} .bw .rev-line .k{color:var(--muted)} .bw .rev-line .v{font-weight:500;text-align:right}

    /* ===== settings page (design A · grouped cards) ===== */
    .setpage{max-width:1760px}
    .setpage .cards{columns:2;column-gap:20px}
    .setpage .cards .card{break-inside:avoid;-webkit-column-break-inside:avoid}
    @media(max-width:1024px){.setpage .cards{columns:1}}
    .setpage .page-head{margin-bottom:24px}
    .setpage .page-head h1{font-family:var(--serif);font-size:clamp(24px,3vw,30px);color:var(--ink);line-height:1.1}
    .setpage .page-head p{color:var(--muted);font-size:14px;margin-top:7px}
    .setpage .card{background:var(--white);border:1px solid var(--line);border-radius:8px;box-shadow:0 1px 2px rgba(130,33,62,.04),0 4px 16px rgba(130,33,62,.03);padding:24px 26px;margin-bottom:18px}
    .setpage .card-head{display:flex;align-items:center;gap:11px;padding-bottom:14px;margin-bottom:20px;border-bottom:1px solid var(--line)}
    .setpage .card-head .ic{width:32px;height:32px;border-radius:7px;background:var(--pink-soft);color:var(--wine);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .setpage .card-head .ic svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
    .setpage .card-head h2{font-family:var(--serif);font-size:20px;color:var(--ink);line-height:1.15}
    .setpage .card-head .cardhead-en{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--muted)}
    .setpage .card-head .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
    .setpage .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px 22px}
    .setpage .field{display:flex;flex-direction:column;gap:7px}
    .setpage .field.full{grid-column:1/-1}
    .setpage label.lbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted)}
    .setpage input[type=text],.setpage input[type=number],.setpage select{width:100%;height:44px;background:var(--white);border:1px solid var(--line2);border-radius:5px;padding:0 12px;font-family:var(--sans);font-size:14.5px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
    .setpage input::placeholder{color:#B9ADA6}
    .setpage input:focus,.setpage select:focus{outline:none;border-color:var(--wine);box-shadow:0 0 0 3px rgba(130,33,62,.10)}
    .setpage select{appearance:none;-webkit-appearance:none;cursor:pointer;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2382213E' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:36px}
    .setpage .input-affix{position:relative}
    .setpage .input-affix .pre{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}
    .setpage .input-affix input{padding-left:34px}
    .setpage .help{font-size:12.5px;color:var(--muted);line-height:1.5;margin-top:1px}
    .setpage .seg2{display:inline-flex;background:var(--cream2);border:1px solid var(--line2);border-radius:7px;padding:4px;gap:4px;width:100%;max-width:430px}
    .setpage .seg2 button{flex:1;border:none;background:transparent;cursor:pointer;font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink2);padding:9px 10px;border-radius:5px;transition:background .15s,color .15s,box-shadow .15s}
    .setpage .seg2 button:hover:not(.active){color:var(--wine-deep)}
    .setpage .seg2 button.active{background:var(--wine);color:var(--white);box-shadow:0 1px 3px rgba(130,33,62,.22)}
    .setpage .pay-link{margin-top:18px}
    .setpage .pay-link.hidden{display:none}
    .setpage .demo-note{margin-top:16px;display:flex;align-items:center;gap:9px;background:var(--cream2);border:1px dashed var(--line2);border-radius:5px;padding:11px 14px;font-size:13px;color:var(--muted)}
    .setpage .demo-note svg{width:16px;height:16px;color:var(--wine);flex-shrink:0;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    .setpage .toggle-row{display:flex;align-items:center;gap:18px;background:var(--cream2);border:1px solid var(--line2);border-radius:8px;padding:16px 18px}
    .setpage .toggle-row+.toggle-row{margin-top:12px}
    .setpage .toggle-row .tr-text{flex:1;min-width:0}
    .setpage .toggle-row .tr-title{font-size:14.5px;font-weight:600;color:var(--ink)}
    .setpage .toggle-row .tr-help{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5}
    .setpage .switch{position:relative;flex-shrink:0;width:46px;height:25px;border-radius:999px;background:var(--line2);border:none;cursor:pointer;padding:0;transition:background .2s ease}
    .setpage .switch .knob{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:var(--white);box-shadow:0 1px 3px rgba(0,0,0,.22);transition:transform .2s ease}
    .setpage .switch.on{background:var(--green)}
    .setpage .switch.on .knob{transform:translateX(21px)}
    .setpage .bundle-note{margin-top:16px;font-size:12.5px;color:var(--muted);line-height:1.6}
    .setpage .savebar{position:sticky;bottom:0;background:var(--white);border:1px solid var(--line);box-shadow:0 -2px 12px rgba(130,33,62,.06);border-radius:8px;margin-top:8px}
    .setpage .savebar-inner{padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .setpage .save-hint{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
    .setpage .saved-pill{display:none;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);font-size:13px;font-weight:600;padding:7px 13px;border-radius:999px}
    .setpage .saved-pill.show{display:inline-flex}
    .setpage .saved-pill svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
    .setpage .btn-primary{background:var(--wine);color:var(--white);border:none;border-radius:5px;font-family:var(--sans);font-size:14.5px;font-weight:600;letter-spacing:.3px;padding:13px 30px;cursor:pointer;transition:background .15s,transform .05s}
    .setpage .btn-primary:hover{background:var(--wine-deep)}
    .setpage .btn-primary:active{transform:translateY(1px)}
    .setpage .msg2{font-size:13px}
    @media(max-width:720px){.setpage .grid{grid-template-columns:1fr}.setpage .seg2{max-width:100%}.setpage .savebar-inner{flex-direction:column-reverse;align-items:stretch}.setpage .btn-primary{width:100%}.setpage .save-hint{justify-content:center}}

    /* ===== shipping (运费 & 自提) ===== */
    .sh-wrap{max-width:920px}
    .sh-mstats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px}
    .sh-mstat{background:var(--white);border:1px solid var(--line);padding:14px 18px}
    .sh-mstat .n{font-family:var(--serif);font-size:26px;line-height:1;color:var(--wine)}
    .sh-mstat .l{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:6px}
    .sh-acc{background:var(--white);border:1px solid var(--line);margin-bottom:14px;transition:.2s;overflow:hidden}
    .sh-acc:hover{border-color:var(--pink)}
    .sh-acc.open{border-color:var(--wine)}
    .sh-acc .head{display:grid;grid-template-columns:auto 1fr auto auto auto;gap:18px;align-items:center;padding:18px 22px;cursor:pointer;transition:.18s}
    .sh-acc .head:hover{background:var(--cream2)}
    .sh-acc.open .head{background:var(--cream2);border-bottom:1px solid var(--line)}
    .sh-flag{width:36px;height:24px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;letter-spacing:0;flex-shrink:0}
    .sh-flag.my{background:#cc0001}
    .sh-flag.sg{background:linear-gradient(180deg,#ED2939 50%,#fff 50%);color:#ED2939;border:1px solid var(--line2)}
    .sh-flag.world{background:var(--blush);color:var(--wine)}
    .sh-acc .nm{font-weight:500;font-size:15px}
    .sh-acc .nm .en{font-size:12px;color:var(--muted);font-weight:400;margin-left:6px}
    .sh-acc .nm .sub{font-size:12px;color:var(--muted);margin-top:2px}
    .sh-acc .fee{font-family:var(--serif);font-size:22px;color:var(--wine);text-align:right;min-width:90px}
    .sh-acc .fee small{font-family:var(--sans);font-size:11px;color:var(--muted);display:block;margin-top:1px;letter-spacing:.04em}
    .sh-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:4px 10px;border-radius:999px;background:var(--green-bg);color:var(--green);font-weight:500}
    .sh-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
    .sh-pill.off{background:var(--line2);color:var(--muted)}
    .sh-pill.off::before{background:var(--muted)}
    .sh-caret{width:18px;height:18px;fill:none;stroke:var(--muted);stroke-width:2;transition:.2s}
    .sh-acc.open .sh-caret{transform:rotate(180deg);stroke:var(--wine)}
    .sh-acc .body{display:none;padding:22px 22px 24px}
    .sh-acc.open .body{display:block}
    .sh-bgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
    .sh-h{font-size:12px;font-weight:600;color:var(--ink2);margin:0 0 8px;letter-spacing:.04em}
    .sh-fld{margin-bottom:12px}
    .sh-fld label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:600}
    .sh-fld input[type=text],.sh-fld input[type=number]{width:100%;padding:10px 12px;background:var(--white);border:1px solid var(--line2);outline:none}
    .sh-fld input[type=text]:focus,.sh-fld input[type=number]:focus{border-color:var(--wine)}
    .sh-rate{position:relative}
    .sh-rate .cur{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-weight:500}
    .sh-rate input{padding-left:48px!important}
    .sh-sub{display:grid;grid-template-columns:1fr 1fr;gap:6px 18px;padding:4px 0}
    .sh-sub label{display:flex;align-items:center;gap:9px;font-size:13px;padding:4px 0;cursor:pointer;color:var(--ink2)}
    .sh-sub label.dim{color:var(--muted)}
    .sh-sub input{width:15px;height:15px;accent-color:var(--wine);cursor:pointer}
    .sh-tg{display:flex;align-items:flex-start;gap:9px;padding:7px 0;font-size:13px;cursor:pointer}
    .sh-tg input{margin-top:3px;accent-color:var(--wine);width:15px;height:15px;cursor:pointer}
    .sh-tg .ts{display:block;font-size:11px;color:var(--muted);margin-top:1px}
    .sh-foot{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);flex-wrap:wrap;gap:10px}
    .sh-foot .del{font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:6px;background:none;border:none;padding:6px 8px;cursor:pointer}
    .sh-foot .del:hover{color:var(--wine)}
    .sh-foot .right{display:flex;gap:8px}
    .sh-add{margin-top:6px;display:flex;justify-content:center}
    .sh-add button{display:inline-flex;align-items:center;gap:7px;padding:11px 22px;border:1px dashed var(--line2);color:var(--muted);background:var(--white);font-size:13px;transition:.2s;border-radius:4px;cursor:pointer}
    .sh-add button:hover{border-color:var(--wine);color:var(--wine);background:var(--cream2)}
    .sh-saved{display:none;align-items:center;gap:6px;background:var(--green-bg);color:var(--green);font-size:13px;font-weight:600;padding:6px 12px;border-radius:999px;margin-left:8px}
    .sh-saved.show{display:inline-flex}
    @media(max-width:720px){.sh-bgrid{grid-template-columns:1fr}.sh-mstats{grid-template-columns:1fr}.sh-acc .head{grid-template-columns:auto 1fr auto;gap:12px}.sh-acc .head .sh-pill,.sh-acc .head .sh-caret{display:none}}

    /* ===== size chart editor (settings card) ===== */
    .sc-units-row{display:flex;gap:18px;margin:0 0 14px;flex-wrap:wrap}
    .sc-units-row label{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink2);cursor:pointer}
    .sc-units-row input{accent-color:var(--wine);width:15px;height:15px;cursor:pointer}
    .sc-units-pill{font-size:11px;font-weight:600;color:var(--wine);background:var(--pink-soft);border:1px solid var(--pink);padding:3px 10px;border-radius:30px;margin-left:auto}
    .sc-unit-block{margin-top:18px}
    .sc-unit-head{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--wine);margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .sc-unit-head .badge{background:var(--pink-soft);color:var(--wine);padding:2px 8px;border-radius:4px;font-size:10px;letter-spacing:.05em}
    .sc-tblwrap{border:1px solid var(--line2);border-radius:6px;overflow-x:auto;background:var(--white)}
    .sc-tbl{min-width:100%;border-collapse:collapse;font-size:12.5px}
    .sc-tbl th{background:var(--cream2);color:var(--wine);font-weight:600;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;padding:8px 6px;text-align:center;border-bottom:1px solid var(--line2);position:relative}
    .sc-tbl td{padding:3px;border-bottom:1px solid var(--line2);background:var(--white)}
    .sc-tbl tr:last-child td{border-bottom:none}
    .sc-tbl input{width:100%;height:34px;border:none;background:transparent;padding:0 8px;text-align:center;font-size:13px;font-family:var(--sans);color:var(--ink2);box-shadow:none}
    .sc-tbl input:focus{outline:1px solid var(--pink-border);background:var(--cream);border-radius:3px}
    .sc-tbl td:first-child input{font-weight:600;color:var(--ink)}
    .sc-tbl th .col-head{display:flex;align-items:center;gap:6px;justify-content:center}
    .sc-tbl th .col-head input{height:24px;background:transparent;border:none;text-align:center;width:80px;color:var(--wine);font-weight:600;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase}
    .sc-tbl th .col-del,.sc-tbl .row-del{border:none;background:none;color:var(--muted);cursor:pointer;width:22px;height:22px;border-radius:4px;font-size:13px;line-height:1;font-family:inherit;padding:0}
    .sc-tbl th .col-del:hover,.sc-tbl .row-del:hover{background:var(--pink-soft);color:var(--wine)}
    .sc-add-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .sc-add-row button{flex:1;min-width:140px;background:var(--white);border:1px dashed var(--pink-border);color:var(--wine);font-family:var(--sans);font-size:12.5px;font-weight:600;padding:9px;border-radius:5px;cursor:pointer;transition:.15s}
    .sc-add-row button:hover{background:var(--pink-soft)}
    .sc-textarea{width:100%;min-height:60px;border:1px solid var(--line2);border-radius:5px;padding:10px 12px;font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--white);resize:vertical}
    .sc-textarea:focus{outline:none;border-color:var(--wine);box-shadow:0 0 0 3px rgba(130,33,62,.10)}
    /* product-level size chart editor */
    .psc-section{border:1.5px solid var(--pink-border);border-radius:10px;overflow:hidden;margin-top:18px}
    .psc-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--pink-soft);border-bottom:1.5px solid var(--pink-border)}
    .psc-icon{width:26px;height:26px;border-radius:50%;background:var(--wine);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex:none}
    .psc-ttl{font-size:13.5px;font-weight:600;color:var(--ink)}.psc-sub{font-size:11.5px;color:var(--muted);margin-top:1px}
    .psc-body{padding:14px 16px 16px}
    .psc-tglrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;background:var(--cream2);border:1px solid var(--line);border-radius:7px;margin-bottom:12px}
    .psc-tglrow b{font-size:13px;display:block;color:var(--ink)}.psc-tglrow small{color:var(--muted);font-size:11.5px}
    .psc-seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:12px}
    .psc-seg button{flex:1;background:transparent;border:none;padding:9px 8px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s;line-height:1.4;text-align:center}
    .psc-seg button:first-child{border-right:1px solid var(--line)}
    .psc-seg button.on{background:var(--wine);color:#fff}
    .psc-defnote{background:#E3F1E8;border:1px solid #cbe4d4;border-radius:6px;padding:9px 12px;font-size:12.5px;color:#1C3C28;line-height:1.5}
    .psc-units-row{display:flex;gap:14px;margin-bottom:10px}
    .psc-units-row label{display:flex;align-items:center;gap:6px;font-size:12.5px;cursor:pointer;color:var(--ink2)}
    .psc-units-row input{accent-color:var(--wine)}

    /* ===== 手机端覆盖（放在所有静态规则之后才能生效）===== */
    @media(max-width:860px){
      .srow{display:flex!important;align-items:center;gap:8px;padding:8px 10px}
      .srow>div:first-child{flex:1;min-width:0}
      .srow .sku{display:none!important}
      .srow .stepper{flex-shrink:0}
      .srow .sstat{flex-shrink:0;font-size:11px;min-width:28px}
      .istats{grid-template-columns:repeat(2,1fr)!important}
      .console{grid-template-columns:1fr!important}
      .rail{position:static!important}
      .ph{display:none!important}
      .psum{grid-template-columns:24px 1fr 60px 22px!important}
      .psum .col-status,.psum .col-sizes{display:none!important}
      .exp-grid{grid-template-columns:1fr!important}
      .setpage .grid{grid-template-columns:1fr!important}
      .setpage .cards{columns:1!important}
    }

    /* ===== email page ===== */
    .em-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:22px;flex-wrap:wrap}
    .em-tab{padding:11px 20px;font-size:14px;color:var(--muted);font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.2s;display:inline-flex;align-items:center;gap:8px;background:none;border-left:none;border-right:none;border-top:none;cursor:pointer}
    .em-tab:hover{color:var(--wine)}
    .em-tab.on{color:var(--wine);border-bottom-color:var(--wine);font-weight:600}
    .em-tab svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8}
    .em-pane{display:none}
    .em-pane.on{display:block}

    /* auto rules */
    .em-rules{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
    .em-rule{background:var(--white);border:1px solid var(--line);padding:18px 20px;border-radius:5px;position:relative;overflow:hidden}
    .em-rule::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--wine)}
    .em-rule .rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .em-rule .rttl{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600}
    .em-rule .ric{width:30px;height:30px;background:var(--blush);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .em-rule .ric svg{width:14px;height:14px;fill:none;stroke:var(--wine);stroke-width:1.8}
    .em-rule .rflow{display:flex;align-items:center;gap:10px;margin-top:8px;font-size:12px;color:var(--ink2);flex-wrap:wrap}
    .em-rule .rflow .step{background:var(--cream2);padding:5px 10px;border-radius:4px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line)}
    .em-rule .rflow .step svg{width:11px;height:11px;fill:none;stroke:var(--muted);stroke-width:2}
    .em-rule .rflow .arr{color:var(--wine);font-weight:700}
    .em-rule .rdesc{font-size:12px;color:var(--muted);margin-top:8px}
    .em-sw{position:relative;width:36px;height:20px;background:var(--line);border-radius:999px;cursor:pointer;transition:.2s;flex-shrink:0;border:none;padding:0}
    .em-sw::after{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;background:var(--white);border-radius:50%;transition:.22s;box-shadow:0 1px 3px rgba(0,0,0,.18)}
    .em-sw.on{background:var(--green)}
    .em-sw.on::after{left:18px}

    /* manual email order list */
    .em-olist{list-style:none}
    .em-olist li{padding:13px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;background:var(--white)}
    .em-olist li:last-child{border-bottom:none}
    .em-olist .ono{font-family:var(--serif);font-size:15px;flex:0 0 auto;min-width:110px;max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .em-olist .ocust{flex:1 1 auto;min-width:120px;max-width:260px;overflow:hidden}
    .em-olist .oname{font-size:14px;font-weight:600;line-height:1.3;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .em-olist .oem{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .em-olist .oamt{font-family:var(--serif);font-size:14px;flex:0 0 auto;min-width:78px;text-align:right;color:var(--wine)}
    .em-olist .ost{flex:0 0 78px;text-align:center}
    .em-olist .oact{flex:0 0 auto;text-align:right;margin-left:auto}
    .em-mailbtn{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;font-size:12px;color:var(--wine);border:1px solid var(--pink-soft);border-radius:5px;background:var(--white);transition:.18s;cursor:pointer;font-weight:500}
    .em-mailbtn:hover{background:var(--wine);color:var(--cream);border-color:var(--wine)}
    .em-mailbtn svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:1.8}

    /* template editor */
    .em-ed-grid{display:grid;grid-template-columns:220px 1fr 1fr;gap:14px;align-items:stretch}
    .em-tplitems{padding:4px 0}
    .em-tpli{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;transition:.18s}
    .em-tpli:hover{background:var(--cream2)}
    .em-tpli.on{background:var(--cream2);border-left-color:var(--wine)}
    .em-tpli .ico{width:26px;height:26px;border-radius:4px;background:var(--blush);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .em-tpli .ico svg{width:13px;height:13px;fill:none;stroke:var(--wine);stroke-width:1.8}
    .em-tpli .nm{font-size:13px;font-weight:600}
    .em-tpli .meta{font-size:11px;color:var(--muted);margin-top:1px}
    .em-new-tpl{margin:8px 14px 12px;padding:8px 0;border:1px dashed var(--line2);border-radius:5px;text-align:center;font-size:12px;color:var(--wine);background:var(--cream);cursor:pointer;width:calc(100% - 28px)}
    .em-new-tpl:hover{background:var(--blush)}
    .em-etb{display:flex;align-items:center;gap:3px;padding:6px 8px;background:var(--cream2);border:1px solid var(--line2);border-bottom:none;border-radius:4px 4px 0 0;flex-wrap:wrap}
    .em-etb button{width:27px;height:27px;border-radius:3px;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .em-etb button:hover{background:var(--white);color:var(--wine)}
    .em-etb svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:1.8}
    .em-etb .sep{width:1px;height:16px;background:var(--line);margin:0 2px}
    .em-etb-var{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)}
    .em-etb-var select{font-size:11px;padding:3px 6px;border:1px solid var(--line);border-radius:3px;background:var(--white)}
    .em-ed-area{border:1px solid var(--line2);border-top:none;border-radius:0 0 4px 4px;width:100%;min-height:220px;padding:10px 12px;font-family:var(--sans);font-size:13.5px;line-height:1.65;resize:vertical;outline:none;transition:border-color .2s}
    .em-ed-area:focus{border-color:var(--wine)}
    .em-pv-stage{padding:16px;background:var(--cream2);overflow-y:auto}
    .em-pv-frame{max-width:480px;margin:0 auto;background:var(--white);border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.04)}
    .em-pv-mhead{padding:12px 18px;border-bottom:1px solid var(--line);background:var(--cream)}
    .em-pv-from{font-size:11px;color:var(--muted)}
    .em-pv-sub{font-family:var(--serif);font-size:17px;margin-top:4px}
    .em-pv-banner{padding:28px 20px;background:linear-gradient(135deg,var(--wine) 0%,var(--wine-deep) 100%);color:var(--cream);text-align:center}
    .em-pv-banner .logo{font-family:var(--serif);font-size:22px;letter-spacing:.04em}
    .em-pv-banner .tag{font-size:10px;letter-spacing:.16em;text-transform:uppercase;margin-top:4px;opacity:.75}
    .em-pv-msg{padding:22px 20px;font-size:13.5px;line-height:1.7;color:var(--ink2);white-space:pre-wrap}
    .em-pv-foot{padding:14px 20px;background:var(--cream2);border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);text-align:center;line-height:1.5}
    .em-sendbar{margin-top:12px;background:var(--white);border:1px solid var(--line);border-radius:5px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .em-sendbar .l{font-size:12px;color:var(--muted)}
    .em-sendbar .l b{color:var(--ink2)}

    /* broadcast */
    .em-bc-grid{display:grid;grid-template-columns:1fr 360px;gap:16px}
    .em-b-sec{padding:16px 18px;border-bottom:1px solid var(--line)}
    .em-b-sec:last-child{border-bottom:none}
    .em-b-sec h4{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}
    .em-rule-row{display:grid;grid-template-columns:120px 120px 1fr 28px;gap:7px;align-items:center;margin-bottom:8px}
    .em-rule-row select,.em-rule-row input{padding:7px 9px;border:1px solid var(--line2);border-radius:4px;background:var(--white);outline:none;font-size:13px;font-family:var(--sans);color:var(--ink)}
    .em-rule-row select:focus,.em-rule-row input:focus{border-color:var(--wine)}
    .em-rule-row .del{width:26px;height:26px;color:var(--muted);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:none;border:none}
    .em-rule-row .del:hover{background:var(--red-bg);color:var(--red)}
    .em-pickbtn{display:flex;flex-wrap:wrap;gap:6px}
    .em-pickbtn label{padding:6px 11px;border:1px solid var(--line2);border-radius:4px;font-size:12px;cursor:pointer;color:var(--muted);transition:.18s}
    .em-pickbtn label:hover{border-color:var(--wine);color:var(--wine)}
    .em-pickbtn input{display:none}
    .em-pickbtn label:has(input:checked){background:var(--wine);color:var(--cream);border-color:var(--wine)}
    .em-match-card{padding:13px 16px;background:var(--cream2);border-radius:5px;text-align:center;margin:12px 18px}
    .em-match-card .n{font-family:var(--serif);font-size:32px;color:var(--wine);line-height:1}
    .em-match-card .l{font-size:12px;color:var(--muted);margin-top:5px}
    .em-match-list{margin:0 18px 16px;border:1px solid var(--line);border-radius:5px;background:var(--white);max-height:200px;overflow-y:auto}
    .em-match-list .mli{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--line);font-size:12px}
    .em-match-list .mli:last-child{border-bottom:none}
    .em-match-list .mli .em{color:var(--muted);font-size:11px}
    .em-send-card{background:var(--white);border:1px solid var(--line);border-radius:6px;padding:16px 18px;position:sticky;top:20px}
    .em-send-card h3{font-size:18px;margin-bottom:12px}
    .em-send-card .row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
    .em-send-card .row .k{color:var(--muted)}
    .em-send-card .row .v{color:var(--ink2);font-weight:600;text-align:right}
    .em-send-card .row.big{padding:12px 0;border-bottom:1px solid var(--line);font-size:15px}
    .em-send-card .row.big .v{font-family:var(--serif);font-size:20px;color:var(--wine);font-weight:400}
    .em-send-card .send-btn{width:100%;margin-top:12px;padding:12px;font-size:14px}
    .em-send-card .test-btn{width:100%;margin-top:6px;padding:8px;font-size:12px;color:var(--muted);border:1px solid var(--line);background:var(--white);border-radius:5px;cursor:pointer;font-family:var(--sans)}
    .em-send-card .test-btn:hover{color:var(--wine);border-color:var(--wine);background:var(--cream)}

    /* mail send modal */
    .em-mask{position:fixed;inset:0;background:rgba(28,28,28,.5);display:none;align-items:flex-start;justify-content:center;padding:50px 20px;z-index:50;overflow-y:auto}
    .em-mask.on{display:flex}
    .em-modal{background:var(--white);border:1px solid var(--line);width:100%;max-width:620px;border-radius:6px;overflow:hidden;animation:emPop .22s ease}
    @keyframes emPop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .em-modal .mh{padding:15px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--cream2)}
    .em-modal .mh h2{font-size:18px}
    .em-modal .mh .x{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--muted);cursor:pointer;background:none;border:none}
    .em-modal .mh .x:hover{background:var(--cream)}
    .em-modal .mh .x svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2}
    .em-modal .mb{padding:16px 20px;max-height:65vh;overflow-y:auto;display:grid;grid-template-columns:200px 1fr;gap:14px}
    .em-modal .ml{background:var(--cream2);border-right:1px solid var(--line);padding:14px;margin:-16px -20px -16px 0;border-radius:0}
    .em-modal .ml .ono{font-family:var(--serif);font-size:16px}
    .em-modal .ml .oem{font-size:11px;color:var(--muted);margin-top:2px;word-break:break-all}
    .em-modal .ml .oamt{font-family:var(--serif);font-size:15px;margin-top:6px;color:var(--wine)}
    .em-modal .ml h3{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin:12px 0 6px}
    .em-tplbtn{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid var(--line2);border-radius:4px;background:var(--white);cursor:pointer;transition:.16s;width:100%;text-align:left;margin-bottom:5px}
    .em-tplbtn:hover{border-color:var(--wine)}
    .em-tplbtn.on{background:var(--wine);color:var(--cream);border-color:var(--wine)}
    .em-tplbtn .ti{width:24px;height:24px;border-radius:4px;background:var(--blush);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .em-tplbtn.on .ti{background:rgba(255,255,255,.18)}
    .em-tplbtn .ti svg{width:12px;height:12px;fill:none;stroke:var(--wine);stroke-width:1.8}
    .em-tplbtn.on .ti svg{stroke:var(--cream)}
    .em-tplbtn .tn{font-size:12px;font-weight:600}
    .em-tplbtn .td{font-size:10.5px;opacity:.7;margin-top:1px}
    .em-modal .mr{display:flex;flex-direction:column;gap:10px}
    .em-fld label{display:block;font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:5px}
    .em-fld input,.em-fld textarea{width:100%;padding:9px 11px;border:1px solid var(--line2);border-radius:4px;outline:none;font-family:var(--sans);font-size:13.5px;transition:.2s}
    .em-fld input:focus,.em-fld textarea:focus{border-color:var(--wine)}
    .em-fld textarea{min-height:180px;resize:vertical;line-height:1.6}
    .em-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
    .em-chip{font-size:11px;padding:3px 7px;background:var(--blush);border-radius:3px;cursor:pointer;color:var(--ink2);transition:.16s;border:none;font-family:var(--sans)}
    .em-chip:hover{background:var(--wine);color:var(--cream)}
    .em-modal .mf{padding:12px 20px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--cream2)}
    .em-modal .mf .auto-note{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
    .em-modal .mf .auto-note svg{width:12px;height:12px;fill:none;stroke:var(--green);stroke-width:2}

    @media(max-width:900px){
      .em-rules{grid-template-columns:1fr}
      .em-ed-grid{grid-template-columns:1fr}
      .em-bc-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div id="root"><div class="login-wrap"><p class="muted">载入中…</p></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/products.js"></script>
  <script src="js/supabase.js"></script>
  <script>
  (function(){
    var root=document.getElementById('root');
    var CFG=window.STORE_CONFIG||{};
    var CATS=(window.CATEGORIES||['Outerwear','Knitwear','Shirts','Tops','Trousers','Dresses','Accessories']).filter(function(c){return c!=='All';});
    var SIZES=['XS','S','M','L','XL','One Size'];
    var data={products:[],orders:[],customers:[]};
    var view; // #view element

    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
    function money(n){var sym=(window.STORE_CONFIG&&window.STORE_CONFIG.currencySymbol)||'RM';var v=Math.round((+n||0)*100)/100;return sym+(Number.isInteger(v)?v:v.toFixed(2));}
    function fdate(s){try{return new Date(s).toLocaleDateString();}catch(e){return '';}}
    function slug(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,28)||('item-'+String(Date.now()).slice(-5));}
    var ICON={
      dash:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
      box:'<svg viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/></svg>',
      bag:'<svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7L6 7zM9 7a3 3 0 0 1 6 0"/></svg>',
      user:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>',
      gear:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>',
      tag:'<svg viewBox="0 0 24 24"><path d="M20.6 13.4l-7.2 7.2a2 2 0 0 1-2.8 0L3 13V4h9l8.6 8.6a1 1 0 0 1 0 .8z"/><circle cx="7.5" cy="7.5" r="1.4"/></svg>',
      inv:'<svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4-9-4zM3 7v10l9 4 9-4V7M3 12l9 4 9-4"/></svg>',
      gift:'<svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="4"/><path d="M5 12v9h14v-9M12 8v13"/><path d="M12 8S10 3 7.5 4.5 9 8 12 8zM12 8s2-5 4.5-3.5S15 8 12 8z"/></svg>',
      truck:'<svg viewBox="0 0 24 24"><path d="M3 7h11v9H3zM14 10h5l2 3v3h-7zM7 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM17 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/></svg>',
      coin:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9.5A2.5 2.5 0 0 1 14.5 9M9 14.5A2.5 2.5 0 0 0 14.5 15M12 6.5v11"/></svg>',
      mail:'<svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M4 4l8 8 8-8"/></svg>'
    };

    // ---------- boot / auth ----------
    if(!window.Auth||!Auth.enabled){ root.innerHTML='<div class="login-wrap"><div class="login-card"><p class="muted">Supabase 未连接。</p></div></div>'; return; }
    Auth.getUser().then(function(res){
      var u=res&&res.data&&res.data.user;
      if(!u){ renderLogin(); return; }
      DB.isAdmin().then(function(ok){ ok?renderApp(u):renderNoAccess(u); });
    });

    function renderLogin(){
      root.innerHTML='<div class="login-wrap"><div class="login-card">'+
        '<div class="logo">'+esc(CFG.brand||'Code Official')+'</div>'+
        '<div class="sub">Admin</div>'+
        '<form id="lf">'+
          '<div class="field"><label>邮箱 Email</label><input type="email" name="email" required></div>'+
          '<div class="field"><label>密码 Password</label><input type="password" name="password" required></div>'+
          '<button class="btn" style="width:100%" id="lb">登录</button>'+
          '<p class="msg" id="lm"></p>'+
        '</div></form>'+
        '<p class="muted" style="font-size:12px;margin-top:6px">用管理员账号登录。</p>'+
      '</div></div>';
      var f=document.getElementById('lf'),m=document.getElementById('lm');
      f.addEventListener('submit',function(e){e.preventDefault();
        m.textContent='';document.getElementById('lb').disabled=true;
        Auth.signIn(f.email.value.trim(),f.password.value).then(function(r){
          if(r&&r.error){document.getElementById('lb').disabled=false;m.textContent=r.error.message;return;}
          DB.isAdmin().then(function(ok){
            if(ok){Auth.getUser().then(function(x){renderApp(x.data.user);});}
            else{document.getElementById('lb').disabled=false;m.textContent='此账号不是管理员。';Auth.signOut();}
          });
        },function(){document.getElementById('lb').disabled=false;m.textContent='登录失败，请重试。';});
      });
    }

    function renderNoAccess(u){
      root.innerHTML='<div class="login-wrap"><div class="login-card">'+
        '<div class="logo">无权限</div>'+
        '<p class="muted" style="margin:10px 0 20px">当前登录：'+esc(u.email)+'<br>这个账号不是管理员。</p>'+
        '<button class="btn btn--ghost" id="so">退出登录</button> '+
        '<a class="btn" href="index.html">回店面</a>'+
      '</div></div>';
      document.getElementById('so').addEventListener('click',function(){Auth.signOut().then(function(){location.reload();});});
    }

    // ---------- app shell ----------
    var NAV=[['dash','概览',ICON.dash],['products','商品',ICON.box],['inventory','库存',ICON.inv],['orders','订单',ICON.bag],['customers','顾客',ICON.user],['discounts','优惠券',ICON.tag],['credit','积分・礼券',ICON.coin],['emails','邮件通知',ICON.mail],['shipping','运费 & 自提',ICON.truck],['settings','设置',ICON.gear]];
    function renderApp(u){
      var brandName=esc(CFG.brand||'Code Official');
      var navHTML=NAV.map(function(n){return '<button data-s="'+n[0]+'">'+n[2]+'<span>'+n[1]+'</span></button>';}).join('');
      root.innerHTML=
        '<div class="mob-bar">'+
          '<div class="mb-brand">'+brandName+'</div>'+
          '<button class="ham" id="ham"><span></span><span></span><span></span></button>'+
        '</div>'+
        '<div class="mob-drawer" id="mob-drawer">'+
          '<div class="mob-overlay" id="mob-overlay"></div>'+
          '<div class="mob-panel" id="mob-panel">'+
            '<div class="mpbrand">'+brandName+'</div>'+
            '<nav class="mpnav" id="mob-nav">'+navHTML+'</nav>'+
            '<div class="mpfoot"><a href="index.html" target="_blank">↗ 查看店面</a><button id="mob-signout">退出登录</button></div>'+
          '</div>'+
        '</div>'+
        '<div class="shell">'+
          '<aside class="side">'+
            '<div class="brand">'+brandName+'</div>'+
            '<nav class="nav" id="nav">'+navHTML+'</nav>'+

    // ---------- 概览 ----------
    function secDash(){
      Promise.all([DB.allProducts(),DB.allOrders(),DB.allCustomers()]).then(function(r){
        data.products=(r[0]&&r[0].data)||[]; data.orders=(r[1]&&r[1].data)||[]; data.customers=(r[2]&&r[2].data)||[];
        var revenue=data.orders.reduce(function(s,o){return s+(+o.total||0);},0);
        var pending=data.orders.filter(function(o){return (o.status||'pending')==='pending';}).length;
        // last 7 days revenue bars
        var days=[];for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push({key:d.toISOString().slice(0,10),label:(d.getMonth()+1)+'/'+d.getDate(),v:0});}
        data.orders.forEach(function(o){var k=(o.created_at||'').slice(0,10);var hit=days.filter(function(x){return x.key===k;})[0];if(hit)hit.v+=(+o.total||0);});
        var max=Math.max.apply(null,days.map(function(d){return d.v;}).concat([1]));
        view.innerHTML=
          '<div class="stats">'+
            stat(data.orders.length,'总订单')+stat(money(revenue),'销售额')+stat(data.products.length,'商品数')+stat(pending,'待处理')+
          '</div>'+
          '<div class="panel"><h2>近 7 天销售</h2><div class="bars">'+days.map(function(d){return '<div class="bar" style="height:'+Math.round(d.v/max*100)+'%"><span>'+d.label+'</span></div>';}).join('')+'</div></div>'+
          '<div class="panel"><div class="panel-head"><h2>最近订单</h2><button class="btn btn--ghost btn--sm" id="goOrders">查看全部</button></div>'+ordersTable(data.orders.slice(0,6),true)+'</div>';
        var g=document.getElementById('goOrders');if(g)g.addEventListener('click',function(){show('orders');});
      });
    }

        function total(p){return p.sizes.reduce(function(a,s){return a+s.q;},0);}
        function prodState(p){if(!p.sizes.length)return 'ok';if(p.sizes.some(function(s){return s.q===0;}))return 'out';if(p.sizes.some(function(s){return s.q>0&&s.q<=thr(p);}))return 'low';return 'ok';}
        function matches(p){if(query){var q=query.toLowerCase();if((p.zh+p.en+p.code).toLowerCase().indexOf(q)<0)return false;}if(filter==='low')return p.sizes.some(function(s){return s.q>0&&s.q<=thr(p);});if(filter==='out')return p.sizes.some(function(s){return s.q===0;});return true;}
        function findP(id){return products.filter(function(p){return p.id===id;})[0];}
        var toastEl=document.getElementById('invToast');if(!toastEl){toastEl=document.createElement('div');toastEl.id='invToast';toastEl.className='itoast';document.body.appendChild(toastEl);}

        function pushLog(dir,name,d,who){log.unshift({dir:dir,name:name,d:d,who:who||'手动调整',when:'刚刚'});if(log.length>8)log.pop();renderLog();}
        function persist(p,cb){var st={};p.sizes.forEach(function(s){st[s.key]=s.q;});DB.updateStock(p.id,{stock:st,track_inventory:p.track,continue_selling:p.oversell,low_stock_threshold:p.thr}).then(function(r){if(r&&r.error){toast('保存失败：'+r.error.message);cb&&cb(false);}else{cb&&cb(true);}},function(){toast('保存失败，请重试');cb&&cb(false);});}

        view.innerHTML='<div class="invtabs">'+
            '<button class="invtab on" data-itab="list"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> 库存清单</button>'+
            '<button class="invtab" data-itab="report"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><polyline points="7 14 11 10 15 14 21 8"/></svg> 报告</button>'+
          '</div>'+
          '<div class="invpane on" id="paneList"><div class="console"><div class="maincol">'+
          '<div class="istats">'+
            '<div class="istat"><svg class="ico" viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/></svg><div class="n" id="stTotal">0</div><div class="l">总库存件数</div></div>'+
            '<div class="istat warn"><svg class="ico" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><path d="M10.3 4.3 2.6 18a2 2 0 0 0 1.7 3h15.4a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0z"/></svg><div class="n" id="stLow">0</div><div class="l">低库存 SKU</div></div>'+
            '<div class="istat bad"><svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg><div class="n" id="stOut">0</div><div class="l">缺货 SKU</div></div>'+
            '<div class="istat"><svg class="ico" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><div class="n" id="stSku">0</div><div class="l">SKU 数 / 商品</div></div>'+
          '</div>'+
          '<div class="toolbar"><div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg><input id="invSearch" type="text" placeholder="搜索商品名 / 货号…"></div>'+
            '<div class="iseg" id="invFilters"><button class="on" data-f="all">全部 <span class="badge" id="fAll">0</span></button><button data-f="low">低库存 <span class="badge" id="fLow">0</span></button><button data-f="out">缺货 <span class="badge" id="fOut">0</span></button></div>'+
            '<button class="btn btn--sm" id="expandAll">全部展开</button></div>'+
          '<div class="bulkbar" id="bulkbar"><span class="cnt"><span id="bulkCnt">0</span> 个商品已选</span><span style="opacity:.6">|</span><span>设为</span><input type="number" id="bulkSet" min="0" placeholder="数量"><button class="bbtn" id="bulkSetBtn">应用到全部尺码</button><span style="opacity:.6">|</span><span>批量</span><button class="bbtn" id="bulkPlus">+5</button><button class="bbtn" id="bulkMinus">−5</button><button class="x" id="bulkClear">✕ 取消选择</button></div>'+
          '<div class="ptable"><div class="ph"><div><input type="checkbox" class="ck" id="ckAll"></div><div>商品 / Product</div><div>总库存</div><div>状态</div><div>分尺码 / Sizes</div><div style="text-align:right">展开</div></div><div id="rows"></div></div>'+
        '</div><aside class="rail">'+
          '<div class="rcard"><div class="rh"><h3>缺货提醒</h3><span class="cn" id="outCount">0</span></div><div class="rbody" id="outList"></div></div>'+
          '<div class="rcard"><div class="rh"><h3>低库存提醒</h3><span class="cn amb" id="lowCount">0</span></div><div class="rbody" id="lowList"></div></div>'+
          '<div class="rcard"><div class="rh"><h3>最近库存变动</h3></div><div class="log" id="logList"></div></div>'+
        '</aside></div></div>'+
        '<div class="invpane" id="paneReport"></div>';

        function refreshStats(){
          var u=0,low=0,out=0,sku=0;products.forEach(function(p){p.sizes.forEach(function(s){sku++;u+=s.q;if(s.q===0)out++;else if(s.q<=thr(p))low++;});});
          Q('#stTotal').textContent=u.toLocaleString();Q('#stLow').textContent=low;Q('#stOut').textContent=out;Q('#stSku').textContent=sku+' / '+products.length;
          Q('#fAll').textContent=products.length;
          Q('#fLow').textContent=products.filter(function(p){return p.sizes.some(function(s){return s.q>0&&s.q<=thr(p);});}).length;
          Q('#fOut').textContent=products.filter(function(p){return p.sizes.some(function(s){return s.q===0;});}).length;
        }
        function badgeFor(st){return st==='out'?'<span class="badge2 out"><span class="dot"></span>缺货</span>':(st==='low'?'<span class="badge2 low"><span class="dot"></span>低库存</span>':'<span class="badge2 ok"><span class="dot"></span>充足</span>');}
        function sizeMini(p){return p.sizes.map(function(s){return '<span class="smchip '+sizeState(p,s)+'">'+esc(s.sz)+' '+s.q+'</span>';}).join('');}
        function renderRows(){
          var host=Q('#rows');host.innerHTML='';var shown=products.filter(matches);
          if(!shown.length){host.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">没有符合条件的商品</div>';return;}
          shown.forEach(function(p){
            var row=document.createElement('div');row.className='prow'+(p._open?' open':'');row.dataset.id=p.id;
            row.innerHTML='<div class="psum"><div><input type="checkbox" class="ck rowck" '+(selected[p.id]?'checked':'')+'></div>'+
              '<div class="pcell"><img class="ithumb" src="'+p.thumb+'" onerror="this.src=\'images/placeholder.svg\'"><div style="min-width:0"><div class="pname">'+esc(p.zh)+'</div><div class="pen">'+esc(p.en)+'</div><div class="pmeta">货号 '+esc(p.code)+' · '+p.sizes.length+' 个尺码'+(p.track?'':' · 未追踪')+'</div><button class="btn btn--ghost btn--sm editprod" data-pid="'+esc(p.id)+'" style="margin-top:7px">✏️ 编辑商品</button></div></div>'+
              '<div class="col-tot"><span class="totbox">'+total(p)+'</span> <small>件</small></div>'+
              '<div class="col-status">'+badgeFor(prodState(p))+'</div>'+
              '<div class="col-sizes"><div class="sizemini">'+sizeMini(p)+'</div></div>'+
              '<svg class="caret" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></div><div class="pexp">'+expHTML(p)+'</div>';
            host.appendChild(row);
          });
          bindRows();
        }
        function expHTML(p){
          var srows=p.sizes.map(function(s){var st=sizeState(p,s);var tx=st==='out'?'缺货':(st==='low'?'低于阈值 '+thr(p):'充足');
            return '<div class="srow '+st+'" data-sz="'+esc(s.sz)+'"><div><div class="sz">'+esc(s.sz)+'</div></div><div class="sku">'+esc(p.code+'-'+s.sz)+'</div><div class="stepper"><button class="dec">−</button><input type="number" class="qin" min="0" value="'+s.q+'"><button class="inc">+</button></div><div class="sstat '+st+'">'+tx+'</div></div>';}).join('');
          return '<div class="exp-grid"><div><div class="exp-h">分尺码库存 · 可直接编辑或 +/− 快速调整</div><div class="sizes">'+(srows||'<div style="padding:14px;color:var(--muted)">该商品没有尺码</div>')+'</div>'+
            '<div class="exp-foot"><span class="saved">✓ 已保存</span><button class="btn btn--ghost btn--sm restock">补货 +10（全尺码）</button><button class="btn btn--sm save">保存更改</button></div></div>'+
            '<div><div class="exp-h">商品库存设置</div><div class="ctrls">'+
              '<div class="ctrl"><div class="lab">追踪库存<small>关闭则永远有货</small></div><div class="sw track'+(p.track?' on':'')+'"></div></div>'+
              '<div class="ctrl"><div class="lab">售罄后仍可购买<small>Continue selling when out of stock</small></div><div class="sw oversell'+(p.oversell?' on':'')+'"></div></div>'+
              '<div class="ctrl"><div class="lab">低库存阈值<small>低于此数量标记为低库存</small></div><div class="thr"><button class="thrdec">−</button><input type="number" class="thrin" min="0" value="'+thr(p)+'"><button class="thrinc">+</button></div></div>'+
            '</div><div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5">改完点「保存更改」写入数据库。低库存以<b style="color:var(--amber)">琥珀</b>、缺货以<b style="color:var(--red)">红色</b>标记。</div></div></div>';
        }
        function updateSizeRowState(sr,p,s){var st=sizeState(p,s);sr.classList.remove('ok','low','out');sr.classList.add(st);var stat=sr.querySelector('.sstat');stat.className='sstat '+st;stat.textContent=st==='out'?'缺货':(st==='low'?'低于阈值 '+thr(p):'充足');}
        function softRefresh(row,p){var tb=row.querySelector('.totbox');if(tb)tb.textContent=total(p);var stc=row.querySelector('.col-status');if(stc)stc.innerHTML=badgeFor(prodState(p));var szc=row.querySelector('.col-sizes .sizemini');if(szc)szc.innerHTML=sizeMini(p);}
        function bindRows(){
          QA('.prow').forEach(function(row){
            var p=findP(row.dataset.id),sum=row.querySelector('.psum');
            sum.addEventListener('click',function(e){if(e.target.closest('.rowck')||e.target.closest('.editprod'))return;p._open=!p._open;row.classList.toggle('open',p._open);});
            var ep=row.querySelector('.editprod');if(ep)ep.addEventListener('click',function(e){e.stopPropagation();window.__editPid=p.id;show('products');});
            row.querySelector('.rowck').addEventListener('click',function(e){e.stopPropagation();selected[p.id]=this.checked;refreshBulk();});
            [].slice.call(row.querySelectorAll('.srow')).forEach(function(sr){
              var s=p.sizes.filter(function(x){return x.sz===sr.dataset.sz;})[0];var input=sr.querySelector('.qin');
              function commit(v,silent){v=Math.max(0,parseInt(v,10)||0);var old=s.q;s.q=v;input.value=v;updateSizeRowState(sr,p,s);softRefresh(row,p);refreshStats();renderAlerts();if(!silent&&v!==old)pushLog(v>old?'up':'down',p.zh+' · '+s.sz,v-old,'手动调整');}
              sr.querySelector('.inc').addEventListener('click',function(){commit(s.q+1);});
              sr.querySelector('.dec').addEventListener('click',function(){commit(s.q-1);});
              input.addEventListener('change',function(){commit(this.value);});
            });
            row.querySelector('.restock').addEventListener('click',function(){p.sizes.forEach(function(s){s.q+=10;});pushLog('up',p.zh+' · 全尺码',p.sizes.length*10,'一键补货');p._open=true;renderRows();refreshStats();renderAlerts();var nr=Q('.prow[data-id="'+p.id+'"]');if(nr)nr.classList.add('open');toast(p.zh+'：每尺码 +10（记得点保存更改）');});
            row.querySelector('.save').addEventListener('click',function(){var btn=this;btn.disabled=true;persist(p,function(ok){btn.disabled=false;if(ok){var sv=row.querySelector('.saved');sv.classList.add('show');setTimeout(function(){sv.classList.remove('show');},1600);toast('已保存「'+p.zh+'」库存');}});});
            row.querySelector('.sw.track').addEventListener('click',function(){p.track=!p.track;this.classList.toggle('on',p.track);var meta=row.querySelector('.pmeta');if(meta)meta.innerHTML='货号 '+esc(p.code)+' · '+p.sizes.length+' 个尺码'+(p.track?'':' · 未追踪');});
            row.querySelector('.sw.oversell').addEventListener('click',function(){p.oversell=!p.oversell;this.classList.toggle('on',p.oversell);});
            var thrIn=row.querySelector('.thrin');
            function setThr(v){v=Math.max(0,parseInt(v,10)||0);p.thr=v;thrIn.value=v;[].slice.call(row.querySelectorAll('.srow')).forEach(function(sr){var s=p.sizes.filter(function(x){return x.sz===sr.dataset.sz;})[0];updateSizeRowState(sr,p,s);});softRefresh(row,p);refreshStats();renderAlerts();}
            row.querySelector('.thrinc').addEventListener('click',function(){setThr(p.thr+1);});
            row.querySelector('.thrdec').addEventListener('click',function(){setThr(thr(p)-1);});
            thrIn.addEventListener('change',function(){setThr(this.value);});
          });
        }
        function renderAlerts(){
          var outI=[],lowI=[];products.forEach(function(p){p.sizes.forEach(function(s){if(s.q===0)outI.push({p:p,s:s});else if(s.q<=thr(p))lowI.push({p:p,s:s});});});lowI.sort(function(a,b){return a.s.q-b.s.q;});
          Q('#outCount').textContent=outI.length;Q('#lowCount').textContent=lowI.length;
          Q('#outList').innerHTML=outI.length?outI.map(function(it){return alertHTML(it,'out');}).join(''):'<div class="rempty">没有缺货尺码 ✓</div>';
          Q('#lowList').innerHTML=lowI.length?lowI.map(function(it){return alertHTML(it,'low');}).join(''):'<div class="rempty">没有低库存尺码 ✓</div>';
          QA('.alert').forEach(function(el){el.addEventListener('click',function(){jumpTo(el.dataset.pid);});});
        }
        function alertHTML(it,kind){var p=it.p,s=it.s;return '<div class="alert" data-pid="'+p.id+'"><img class="at" src="'+p.thumb+'" onerror="this.src=\'images/placeholder.svg\'"><div class="ai"><div class="an">'+esc(p.zh)+' · '+esc(s.sz)+'</div><div class="ad">'+esc(p.code)+'-'+esc(s.sz)+(kind==='low'?' · 阈值 '+thr(p):'')+'</div></div><div class="aq '+kind+'">'+s.q+'</div></div>';}
        function jumpTo(pid){var p=findP(pid);if(!p)return;if(!matches(p)){filter='all';query='';Q('#invSearch').value='';syncFilter();}p._open=true;renderRows();var row=Q('.prow[data-id="'+pid+'"]');if(row){row.classList.add('open');row.scrollIntoView({behavior:'smooth',block:'center'});}}
        function renderLog(){Q('#logList').innerHTML=log.length?log.map(function(l){return '<div class="logrow"><div class="ld '+l.dir+'"></div><div class="lt"><div><b>'+esc(l.name)+'</b></div><div class="lm">'+esc(l.who)+' · '+esc(l.when)+'</div></div><div class="delta '+l.dir+'">'+(l.d>0?'+':'')+l.d+'</div></div>';}).join(''):'<div class="rempty">本次会话暂无变动</div>';}
        function refreshBulk(){var ids=Object.keys(selected).filter(function(k){return selected[k];});Q('#bulkbar').classList.toggle('show',ids.length>0);Q('#bulkCnt').textContent=ids.length;var vis=products.filter(matches);Q('#ckAll').checked=vis.length>0&&vis.every(function(p){return selected[p.id];});}
        function selectedProducts(){return products.filter(function(p){return selected[p.id];});}
        function applyBulk(fn,label){var sel=selectedProducts();if(!sel.length)return;sel.forEach(function(p){p.sizes.forEach(function(s){fn(p,s);});});var done=0;sel.forEach(function(p){persist(p,function(){done++;if(done===sel.length){renderRows();refreshStats();renderAlerts();}});});toast(label+'（'+sel.length+' 个商品，已保存）');}
        function syncFilter(){QA('#invFilters button').forEach(function(b){b.classList.toggle('on',b.dataset.f===filter);});}

        Q('#invFilters').addEventListener('click',function(e){var b=e.target.closest('button');if(!b)return;filter=b.dataset.f;syncFilter();renderRows();refreshBulk();});
        Q('#invSearch').addEventListener('input',function(){query=this.value.trim();renderRows();refreshBulk();});
        Q('#expandAll').addEventListener('click',function(){var shown=products.filter(matches);var anyClosed=shown.some(function(p){return !p._open;});shown.forEach(function(p){p._open=anyClosed;});this.textContent=anyClosed?'全部收起':'全部展开';renderRows();});

        var SYM=(window.STORE_CONFIG&&window.STORE_CONFIG.currencySymbol)||'RM';

        function moneyShort(n){n=Number(n)||0;if(n>=1000)return SYM+' '+(n/1000).toFixed(1)+'k';return SYM+' '+n.toFixed(0);}
        function aggregate(){
          var st={total:0,low:0,out:0,sku:0,value:0,cmpValue:0,prodN:products.length};
          var byCat={};
          var lowList=[],outList=[];
          products.forEach(function(p){
            var c=p.category||'未分类';
            if(!byCat[c])byCat[c]={cat:c,sku:0,qty:0,value:0,prods:{}};
            byCat[c].prods[p.id]=true;
            p.sizes.forEach(function(s){
              st.sku++;st.total+=s.q;st.value+=s.q*p.price;st.cmpValue+=s.q*(p.compare_at||p.price);
              byCat[c].sku++;byCat[c].qty+=s.q;byCat[c].value+=s.q*p.price;
              if(s.q===0){st.out++;outList.push({p:p,s:s});}
              else if(s.q<=thr(p)){st.low++;lowList.push({p:p,s:s});}
            });
          });
          var cats=Object.keys(byCat).map(function(k){var c=byCat[k];c.prodN=Object.keys(c.prods).length;return c;}).sort(function(a,b){return b.value-a.value;});

                '货号':p.code,'商品名(中)':p.zh,'商品名(英)':p.en,

        function csvEscape(v){v=String(v==null?'':v);return /,|"|\n/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}

                var key=c.getAttribute('data-st'),arr=zones[idx].states||[];

            else if(inp.type==='number')zones[idx][k]=inp.value===''?(k==='freeAt'?0:0):parseFloat(inp.value)||0;
