            '<div class="grid">'+
              fT('s_brand','店名 Brand',esc(g('brand','Code Official')))+
              fT('s_tag','标语 Tagline',esc(g('tagline','')))+
              fT('s_email','联系邮箱',esc(g('email','')))+
              '<div class="field"><label class="lbl">默认语言</label><select id="s_lang"><option value=""'+(lang===''?' selected':'')+'>自动</option><option value="en"'+(lang==='en'?' selected':'')+'>English</option><option value="zh"'+(lang==='zh'?' selected':'')+'>中文</option></select></div>'+
            '</div>')+
          card(IC.money,'货币','结账显示的货币设置',
            '<div class="grid">'+
              fT('s_cur','货币代码 (MYR/HKD/USD)',esc(g('currency','MYR')))+
              fT('s_sym','货币符号 (RM/HK$/$)',esc(sym))+
            '</div>')+
          card(IC.track,'广告追踪','Facebook / Meta 像素追踪',
            '<div class="grid"><div class="field full"><label class="lbl">Facebook Pixel ID</label><input type="text" id="s_pixel" value="'+esc(pix)+'" placeholder="纯数字，如 1234567890123456"><div class="help">在 Meta「事件管理工具」里复制（一串数字）。</div></div></div>')+
          card(IC.pay,'支付方式 <span class="cardhead-en">Payment Gateway</span>','选择结账时如何收款',
            '<div class="field"><label class="lbl">收款方式</label><div class="seg2" id="payseg">'+segs.map(function(x){return '<button type="button" data-pm="'+x[0]+'"'+(mode===x[0]?' class="active"':'')+'>'+x[1]+'</button>';}).join('')+'</div></div>'+
            '<div class="pay-link'+(mode==='demo'?' hidden':'')+'" id="linkWrap"><div class="field full"><label class="lbl" id="linkLbl">'+(mode==='paypal'?'PayPal 链接':'Stripe Payment Link')+'</label><input type="text" id="s_link" value="'+esc(link)+'" placeholder="粘贴 Stripe / PayPal 收款链接，例如 https://buy.stripe.com/..."></div></div>'+
            '<div class="demo-note" id="demoNote" style="'+(mode==='demo'?'':'display:none')+'"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg><span>当前为「演示 Demo」模式：不真实扣款，无需填写支付链接。</span></div>'+
            '<div class="help" style="margin-top:14px">演示=不真实扣款；选 Stripe/PayPal 并粘贴收款链接后，结账会跳转到该链接收款（把该链接的"付款后跳转"设为你的 success.html，Purchase 事件才会触发）。</div>')+
          card(IC.bundle,'套装功能 <span class="cardhead-en">Bundles</span>','控制套装组合在店面的展示',
            tRow('s_bun','在店面显示套装组合','导航入口 + 套装页 /bundles.html',bun)+
            tRow('s_bunHome','在首页显示套装板块','需先开启上面的总开关',bunHome)+
            '<div class="bundle-note">关掉总开关：顾客完全看不到套装。每个套装还能在「套装」区单独上架/下架。</div>')+
          '</div>'+
          '<div class="savebar"><div class="savebar-inner"><div class="save-hint"><span class="saved-pill" id="savedPill"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>已保存，店面已生效</span><span class="msg2" id="sm">改动后记得点「保存设置」生效。</span></div><button class="btn-primary" id="saveS">保存设置</button></div></div>'+
        '</div>';
        var seg=document.getElementById('payseg'),curMode=mode;
        seg.addEventListener('click',function(e){var b=e.target.closest('[data-pm]');if(!b)return;curMode=b.getAttribute('data-pm');
          seg.querySelectorAll('button').forEach(function(x){x.classList.toggle('active',x===b);});
          var isDemo=curMode==='demo';
          document.getElementById('linkWrap').classList.toggle('hidden',isDemo);
          document.getElementById('demoNote').style.display=isDemo?'':'none';
          document.getElementById('linkLbl').textContent=curMode==='paypal'?'PayPal 链接':'Stripe Payment Link';
        });
        ['s_bun','s_bunHome'].forEach(function(id){var sw=document.getElementById(id);if(!sw)return;sw.addEventListener('click',function(){var on=sw.classList.toggle('on');sw.setAttribute('aria-checked',on?'true':'false');});});

        document.getElementById('saveS').addEventListener('click',function(){
          var out={brand:v('s_brand'),tagline:v('s_tag'),email:v('s_email'),defaultLang:document.getElementById('s_lang').value,
            currency:v('s_cur'),currencySymbol:v('s_sym'),pixelId:v('s_pixel'),
            paymentMode:curMode,paymentLink:curMode==='demo'?'':v('s_link'),
            bundlesEnabled:document.getElementById('s_bun').classList.contains('on'),bundlesOnHome:document.getElementById('s_bunHome').classList.contains('on')};
          var btn=document.getElementById('saveS'),pill=document.getElementById('savedPill'),hint=document.getElementById('sm');
          btn.disabled=true;
          DB.saveSettings(Object.assign({},s,out)).then(function(r){
            btn.disabled=false;
            if(r&&r.error){hint.style.color='var(--red)';hint.style.display='';hint.textContent='保存失败：'+r.error.message;return;}
            hint.style.display='none';pill.classList.add('show');
            if(window.STORE_CONFIG)Object.keys(out).forEach(function(k){if(out[k]!=='')window.STORE_CONFIG[k]=out[k];});
            clearTimeout(window.__setT);window.__setT=setTimeout(function(){pill.classList.remove('show');hint.style.display='';hint.style.color='';hint.textContent='改动后记得点「保存设置」生效。';},2800);
          },function(){btn.disabled=false;hint.style.color='var(--red)';hint.style.display='';hint.textContent='保存失败，请重试';});
        });
      });
    }
  })();
  </script>
</body>
</html>
