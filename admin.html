<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台 · Code Official</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    :root{
      --cream:#FFFAF1; --cream2:#FAF6F3; --white:#fff;
      --wine:#82213E; --wine-deep:#6A1A32; --pink:#E9C9CC; --blush:#F2E4D9;
      --ink:#1C1C1C; --ink2:#3E3E3E; --muted:#6F635C; --line:#ECD9D6; --line2:#E2DCD8;
      --green:#2F7D4F; --amber:#9A6A1E; --blue:#3A5C9A; --red:#B23A3A; --pink-soft:#F3E2E4; --radius:6px;
      --green-bg:#E3F1E8; --amber-bg:#F6EAD3; --red-bg:#F7E3E0;
      --serif:'DM Serif Display',Georgia,serif; --sans:'DM Sans',-apple-system,Segoe UI,sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--sans);color:var(--ink);background:var(--cream);font-size:15px;line-height:1.6}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
    input,select,textarea{font-family:inherit;font-size:14px;color:inherit}
    img{display:block;max-width:100%}
    h1,h2,h3{font-family:var(--serif);font-weight:400;line-height:1.1}
    .muted{color:var(--muted)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--wine);color:var(--cream);
      padding:11px 20px;font-size:13px;font-weight:500;letter-spacing:.02em;border:1px solid var(--wine);transition:.25s}
    .btn:hover{background:var(--wine-deep);border-color:var(--wine-deep)}
    .btn--ghost{background:transparent;color:var(--wine)}
    .btn--ghost:hover{background:var(--wine);color:var(--cream)}
    .btn--sm{padding:7px 13px;font-size:12px}
    .btn[disabled]{opacity:.5;cursor:not-allowed}

    /* ---------- login ---------- */
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:100%;max-width:380px;background:var(--white);border:1px solid var(--line);padding:38px 32px;text-align:center}
    .login-card .logo{font-family:var(--serif);font-size:30px;margin-bottom:4px}
    .login-card .logo sup{font-size:.42em;color:var(--wine)}
    .login-card .sub{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
    .field{text-align:left;margin-bottom:14px}
    .field label{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .field input,.field select,.field textarea{width:100%;padding:11px 13px;background:var(--white);border:1px solid var(--line2);outline:none;transition:.2s}
    .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--wine)}
    .field textarea{min-height:70px;resize:vertical}
    .msg{font-size:13px;color:var(--wine);margin-top:10px;min-height:18px}

    /* ---------- shell ---------- */
    .shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
    .side{background:var(--cream2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
    .side .brand{font-family:var(--serif);font-size:24px;padding:24px 24px 20px}
    .side .brand sup{font-size:.42em;color:var(--wine)}
    .nav{display:flex;flex-direction:column;padding:6px 12px;gap:2px}
    .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 14px;font-size:14px;color:var(--ink2);border-radius:6px;transition:.18s}
    .nav button:hover{background:var(--blush)}
    .nav button.on{background:var(--wine);color:var(--cream)}
    .nav button.on svg{stroke:var(--cream)}
    .nav svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.6}
    .side-foot{margin-top:auto;padding:16px 16px 22px;border-top:1px solid var(--line);font-size:13px}
    .side-foot a,.side-foot button{display:block;color:var(--muted);padding:6px 8px}
    .side-foot a:hover,.side-foot button:hover{color:var(--wine)}

    .main{min-width:0}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 30px;border-bottom:1px solid var(--line);background:var(--cream)}
    .topbar h1{font-size:30px}
    .topbar .who{font-size:13px;color:var(--muted)}
    .view{padding:26px 30px 70px}

    /* ---------- cards / tables ---------- */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
    .stat{background:var(--white);border:1px solid var(--line);padding:18px 20px}
    .stat .n{font-family:var(--serif);font-size:34px;line-height:1}
    .stat .l{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:8px}
    .panel{background:var(--white);border:1px solid var(--line);padding:22px 24px;margin-bottom:22px}
    .panel h2{font-size:22px;margin-bottom:16px}
    .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .panel-head h2{margin:0}

    table{width:100%;border-collapse:collapse;font-size:14px}
    th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:10px 10px;border-bottom:1px solid var(--line)}
    td{padding:12px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .thumb{width:46px;height:58px;object-fit:cover;background:var(--blush)}
    .pill{display:inline-block;font-size:11px;letter-spacing:.04em;padding:3px 9px;border-radius:999px;background:var(--blush);color:var(--ink2)}
    .pill.sale{background:var(--wine);color:var(--cream)}
    .pill.off{background:var(--line2);color:var(--muted)}
    .pill.green{background:#E3F1E8;color:var(--green)}
    .pill.amber{background:#F6EAD3;color:var(--amber)}
    .pill.blue{background:#E2E9F6;color:var(--blue)}
    .tbl-actions button{font-size:12px;color:var(--muted);padding:6px 9px;border:1px solid var(--line2);border-radius:5px;margin-left:6px}
    .tbl-actions button:hover{border-color:var(--wine);color:var(--wine)}
    .empty{padding:40px 0;text-align:center;color:var(--muted)}

    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .chips{display:flex;gap:7px;flex-wrap:wrap}
    .chips label{border:1px solid var(--line2);padding:7px 13px;font-size:13px;cursor:pointer;border-radius:5px}
    .chips input{margin-right:6px}
    .color-row{display:grid;grid-template-columns:1fr 50px;gap:8px;margin-bottom:7px}
    .color-row input[type=color]{height:42px;padding:2px;border:1px solid var(--line2)}
    .seg{display:inline-flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden}
    .seg button{padding:9px 16px;font-size:13px;background:var(--white)}
    .seg button.on{background:var(--wine);color:var(--cream)}
    .bars{display:flex;align-items:flex-end;gap:10px;height:120px;padding-top:8px}
    .bars .bar{flex:1;background:var(--pink);border-radius:4px 4px 0 0;position:relative;min-height:3px}
    .bars .bar span{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted)}

    @media(max-width:860px){
      .shell{grid-template-columns:1fr}
      .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;border-right:none;border-bottom:1px solid var(--line)}
      .side .brand{padding:16px 18px;font-size:20px}
      .nav{flex-direction:row;flex-wrap:wrap;flex:1}
      .nav button{padding:8px 11px}
      .side-foot{margin:0;border-top:none;padding:10px 16px;display:flex;gap:12px}
      .stats{grid-template-columns:repeat(2,1fr)}
      .row2{grid-template-columns:1fr}
      .topbar,.view{padding-left:18px;padding-right:18px}
      .topbar h1{font-size:24px}
    }

    /* ===== inventory console (design C) ===== */
    .console{display:grid;grid-template-columns:1fr 296px;gap:22px;align-items:start}
    .istats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
    .istat{background:var(--white);border:1px solid var(--line);padding:16px 18px;position:relative}
    .istat .n{font-family:var(--serif);font-size:32px;line-height:1}
    .istat .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:7px}
    .istat .ico{position:absolute;top:14px;right:14px;width:18px;height:18px;fill:none;stroke:var(--pink);stroke-width:1.6}
    .istat.warn .n{color:var(--amber)} .istat.warn .ico{stroke:var(--amber)}
    .istat.bad .n{color:var(--red)} .istat.bad .ico{stroke:var(--red)}
    .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    .search{position:relative;flex:1;min-width:200px}
    .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:none;stroke:var(--muted);stroke-width:1.7}
    .search input{width:100%;padding:10px 12px 10px 36px;background:var(--white);border:1px solid var(--line2);outline:none}
    .search input:focus{border-color:var(--wine)}
    .iseg{display:inline-flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--white)}
    .iseg button{padding:9px 14px;font-size:13px;color:var(--ink2)}
    .iseg button.on{background:var(--wine);color:var(--cream)}
    .iseg button:not(.on):hover{background:var(--blush)}
    .iseg .badge{display:inline-block;min-width:18px;margin-left:6px;padding:0 5px;font-size:11px;line-height:16px;text-align:center;border-radius:999px;background:var(--blush);color:var(--ink2)}
    .iseg button.on .badge{background:rgba(255,255,255,.25);color:var(--cream)}
    .bulkbar{display:none;align-items:center;gap:12px;flex-wrap:wrap;background:var(--wine);color:var(--cream);padding:10px 16px;margin-bottom:12px}
    .bulkbar.show{display:flex}
    .bulkbar .cnt{font-weight:600}
    .bulkbar input[type=number]{width:64px;padding:6px 8px;border:none;outline:none;text-align:center}
    .bulkbar .bbtn{background:rgba(255,255,255,.14);color:var(--cream);padding:7px 12px;font-size:12px;border:1px solid rgba(255,255,255,.3)}
    .bulkbar .bbtn:hover{background:rgba(255,255,255,.26)}
    .bulkbar .x{margin-left:auto;font-size:13px;opacity:.85}
    .ptable{background:var(--white);border:1px solid var(--line)}
    .ph{display:grid;grid-template-columns:38px 1fr 116px 132px 150px 70px;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
    .prow{border-bottom:1px solid var(--line)} .prow:last-child{border-bottom:none}
    .psum{display:grid;grid-template-columns:38px 1fr 116px 132px 150px 70px;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
    .psum:hover{background:var(--cream2)}
    .ck{width:16px;height:16px;accent-color:var(--wine);cursor:pointer}
    .pcell{display:flex;align-items:center;gap:12px;min-width:0}
    .ithumb{width:42px;height:54px;object-fit:cover;background:var(--blush);flex-shrink:0;border:1px solid var(--line)}
    .pname{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pen{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pmeta{font-size:11px;color:var(--muted);margin-top:1px}
    .totbox{font-family:var(--serif);font-size:21px;line-height:1}
    .totbox small{font-family:var(--sans);font-size:11px;color:var(--muted)}
    .badge2{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:999px;font-weight:500;white-space:nowrap}
    .badge2.ok{background:var(--green-bg);color:var(--green)} .badge2.low{background:var(--amber-bg);color:var(--amber)} .badge2.out{background:var(--red-bg);color:var(--red)}
    .badge2 .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
    .sizemini{display:flex;gap:4px;flex-wrap:wrap}
    .smchip{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--blush);color:var(--ink2);white-space:nowrap}
    .smchip.low{background:var(--amber-bg);color:var(--amber)} .smchip.out{background:var(--red-bg);color:var(--red)}
    .caret{width:16px;height:16px;fill:none;stroke:var(--muted);stroke-width:2;transition:.2s;justify-self:end}
    .prow.open .caret{transform:rotate(90deg);stroke:var(--wine)} .prow.open .psum{background:var(--cream2)}
    .pexp{display:none;padding:4px 16px 20px;background:var(--cream2);border-top:1px dashed var(--line)}
    .prow.open .pexp{display:block}
    .exp-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:20px;padding-top:16px}
    .exp-h{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}
    .sizes{background:var(--white);border:1px solid var(--line)}
    .srow{display:grid;grid-template-columns:64px 1fr 132px 78px;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--line)}
    .srow:last-child{border-bottom:none}
    .srow .sz{font-weight:600;font-size:14px} .srow .sku{font-size:11px;color:var(--muted)}
    .stepper{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:var(--white)}
    .stepper button{width:30px;height:32px;font-size:17px;color:var(--wine);background:var(--white)} .stepper button:hover{background:var(--blush)}
    .stepper input{width:46px;height:32px;text-align:center;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);outline:none;font-size:14px;font-weight:600;background:var(--white)}
    .srow.low input{color:var(--amber)} .srow.out input{color:var(--red)}
    .srow.low{background:#FFFCF5} .srow.out{background:#FFF8F6}
    .sstat{font-size:11px;text-align:right;white-space:nowrap}
    .sstat.low{color:var(--amber)} .sstat.out{color:var(--red)} .sstat.ok{color:var(--green)}
    .ctrls{background:var(--white);border:1px solid var(--line);padding:16px 16px 6px}
    .ctrl{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
    .ctrl:last-child{border-bottom:none}
    .ctrl .lab{font-size:13px;font-weight:500}
    .ctrl .lab small{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:1px}
    .sw{position:relative;width:42px;height:23px;border-radius:999px;background:var(--line2);transition:.2s;flex-shrink:0;cursor:pointer}
    .sw::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:.2s}
    .sw.on{background:var(--wine)} .sw.on::after{transform:translateX(19px)}
    .thr{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:var(--white)}
    .thr button{width:28px;height:30px;color:var(--wine)} .thr button:hover{background:var(--blush)}
    .thr input{width:40px;height:30px;text-align:center;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);outline:none;font-weight:600}
    .exp-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
    .saved{font-size:12px;color:var(--green);opacity:0;transition:.3s;margin-right:auto;align-self:center} .saved.show{opacity:1}
    .rail{position:sticky;top:0;display:flex;flex-direction:column;gap:16px}
    .rcard{background:var(--white);border:1px solid var(--line)}
    .rcard .rh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
    .rcard .rh h3{font-size:17px}
    .rcard .rh .cn{font-size:11px;font-weight:600;color:var(--cream);background:var(--red);border-radius:999px;padding:2px 8px}
    .rcard .rh .cn.amb{background:var(--amber)}
    .rbody{padding:6px 0}
    .alert{display:flex;align-items:center;gap:11px;padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--line)}
    .alert:last-child{border-bottom:none} .alert:hover{background:var(--cream2)}
    .alert .at{width:34px;height:44px;object-fit:cover;background:var(--blush);border:1px solid var(--line);flex-shrink:0}
    .alert .ai{min-width:0;flex:1}
    .alert .an{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .alert .ad{font-size:11px;color:var(--muted);margin-top:1px}
    .alert .aq{font-family:var(--serif);font-size:18px;flex-shrink:0}
    .alert .aq.out{color:var(--red)} .alert .aq.low{color:var(--amber)}
    .rempty{padding:22px 16px;text-align:center;font-size:13px;color:var(--muted)}
    .log{padding:4px 0}
    .logrow{display:flex;gap:10px;padding:9px 16px;border-bottom:1px solid var(--line);font-size:13px} .logrow:last-child{border-bottom:none}
    .logrow .ld{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
    .ld.up{background:var(--green)} .ld.down{background:var(--amber)}
    .logrow .lt{flex:1;min-width:0}
    .logrow .delta{font-weight:700;flex-shrink:0} .delta.up{color:var(--green)} .delta.down{color:var(--amber)}
    .logrow .lm{font-size:11px;color:var(--muted);margin-top:1px}
    .itoast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);padding:11px 20px;font-size:13px;border-radius:7px;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.25)}
    .itoast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    @media(max-width:1180px){.exp-grid{grid-template-columns:1fr}}
    @media(max-width:1080px){.console{grid-template-columns:1fr}.rail{position:static}}
    @media(max-width:760px){.istats{grid-template-columns:repeat(2,1fr)}.ph{display:none}.psum{grid-template-columns:24px 1fr 60px 22px}.psum .col-status,.psum .col-sizes{display:none}.exp-grid{grid-template-columns:1fr}}

    /* ===== bundle wizard (design C) ===== */
    .btn--quiet{background:var(--white);color:var(--ink2);border-color:var(--line2)}
    .btn--quiet:hover{background:var(--blush);color:var(--ink);border-color:var(--pink)}
    .btn--lg{padding:15px 30px;font-size:15px}
    @keyframes bwfade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .bw .land-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
    .bw .land-head h2{font-size:23px}
    .bw .bstats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
    .bw .bstat{background:var(--white);border:1px solid var(--line);padding:18px 20px;border-radius:var(--radius)}
    .bw .bstat .n{font-family:var(--serif);font-size:32px;line-height:1}
    .bw .bstat .l{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:8px}
    .bw .bpanel{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
    .bw table{width:100%;border-collapse:collapse;font-size:14px}
    .bw th{text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:13px 16px;border-bottom:1px solid var(--line);background:var(--cream2)}
    .bw td{padding:14px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
    .bw tr:last-child td{border-bottom:none}
    .bw tbody tr:hover{background:var(--cream2)}
    .bw .b-name{font-weight:600;font-size:14.5px} .bw .b-en{font-size:12px;color:var(--muted)}
    .bw .bpill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:4px 10px;border-radius:999px;background:var(--blush);color:var(--ink2);white-space:nowrap}
    .bw .bpill.fixed{background:#EAE3F0;color:#5B4880} .bw .bpill.mix{background:var(--pink-soft);color:var(--wine)}
    .bw .bpill.green{background:var(--green-bg);color:var(--green)} .bw .bpill.off{background:var(--line2);color:var(--muted)}
    .bw .price-cell .set{font-weight:600} .bw .price-cell .sub{font-size:12px;color:var(--green)}
    .bw .tbl-actions{white-space:nowrap;text-align:right}
    .bw .tbl-actions button{font-size:12px;color:var(--muted);padding:7px 11px;border:1px solid var(--line2);border-radius:5px;margin-left:6px;background:var(--white)}
    .bw .tbl-actions button:hover{border-color:var(--wine);color:var(--wine)} .bw .tbl-actions button.del:hover{border-color:var(--red);color:var(--red)}

<body>
  <div id="root"><div class="login-wrap"><p class="muted">载入中…</p></div></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/products.js"></script>
  <script src="js/supabase.js"></script>
  <script>
  (function(){
    var root=document.getElementById('root');
    var CFG=window.STORE_CONFIG||{};
    var CATS=(window.CATEGORIES||['Outerwear','Knitwear','Shirts','Tops','Trousers','Dresses','Accessories']).filter(function(c){return c!=='All';});
    var SIZES=['XS','S','M','L','XL','One Size'];
    var data={products:[],orders:[],customers:[]};
    var view; // #view element

    function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
    function money(n){var sym=(window.STORE_CONFIG&&window.STORE_CONFIG.currencySymbol)||'RM';var v=Math.round((+n||0)*100)/100;return sym+(Number.isInteger(v)?v:v.toFixed(2));}
    function fdate(s){try{return new Date(s).toLocaleDateString();}catch(e){return '';}}
    function slug(s){return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,28)||('item-'+String(Date.now()).slice(-5));}
    var ICON={
      dash:'<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>',
      box:'<svg viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/></svg>',
      bag:'<svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7L6 7zM9 7a3 3 0 0 1 6 0"/></svg>',
      user:'<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>',
      gear:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>',
      tag:'<svg viewBox="0 0 24 24"><path d="M20.6 13.4l-7.2 7.2a2 2 0 0 1-2.8 0L3 13V4h9l8.6 8.6a1 1 0 0 1 0 .8z"/><circle cx="7.5" cy="7.5" r="1.4"/></svg>',
      inv:'<svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4-9-4zM3 7v10l9 4 9-4V7M3 12l9 4 9-4"/></svg>',
      gift:'<svg viewBox="0 0 24 24"><rect x="3" y="8" width="18" height="4"/><path d="M5 12v9h14v-9M12 8v13"/><path d="M12 8S10 3 7.5 4.5 9 8 12 8zM12 8s2-5 4.5-3.5S15 8 12 8z"/></svg>'
    };

    // ---------- boot / auth ----------
    if(!window.Auth||!Auth.enabled){ root.innerHTML='<div class="login-wrap"><div class="login-card"><p class="muted">Supabase 未连接。</p></div></div>'; return; }
    Auth.getUser().then(function(res){
      var u=res&&res.data&&res.data.user;
      if(!u){ renderLogin(); return; }
      DB.isAdmin().then(function(ok){ ok?renderApp(u):renderNoAccess(u); });
    });

    function renderLogin(){
      root.innerHTML='<div class="login-wrap"><div class="login-card">'+
        '<div class="logo">'+esc(CFG.brand||'Code Official')+' <sup>✿</sup></div>'+
        '<div class="sub">Admin</div>'+
        '<form id="lf">'+
          '<div class="field"><label>邮箱 Email</label><input type="email" name="email" required></div>'+
          '<div class="field"><label>密码 Password</label><input type="password" name="password" required></div>'+
          '<button class="btn" style="width:100%" id="lb">登录</button>'+
          '<p class="msg" id="lm"></p>'+
        '</div></form>'+
        '<p class="muted" style="font-size:12px;margin-top:6px">用管理员账号登录。</p>'+
      '</div></div>';
      var f=document.getElementById('lf'),m=document.getElementById('lm');
      f.addEventListener('submit',function(e){e.preventDefault();
        m.textContent='';document.getElementById('lb').disabled=true;
        Auth.signIn(f.email.value.trim(),f.password.value).then(function(r){
          if(r&&r.error){document.getElementById('lb').disabled=false;m.textContent=r.error.message;return;}
          DB.isAdmin().then(function(ok){
            if(ok){Auth.getUser().then(function(x){renderApp(x.data.user);});}
            else{document.getElementById('lb').disabled=false;m.textContent='此账号不是管理员。';Auth.signOut();}
          });
        },function(){document.getElementById('lb').disabled=false;m.textContent='登录失败，请重试。';});
      });
    }

    function renderNoAccess(u){
      root.innerHTML='<div class="login-wrap"><div class="login-card">'+
        '<div class="logo">无权限</div>'+
        '<p class="muted" style="margin:10px 0 20px">当前登录：'+esc(u.email)+'<br>这个账号不是管理员。</p>'+
        '<button class="btn btn--ghost" id="so">退出登录</button> '+
        '<a class="btn" href="index.html">回店面</a>'+
      '</div></div>';
      document.getElementById('so').addEventListener('click',function(){Auth.signOut().then(function(){location.reload();});});
    }

    // ---------- app shell ----------
    var NAV=[['dash','概览',ICON.dash],['products','商品',ICON.box],['inventory','库存',ICON.inv],['orders','订单',ICON.bag],['customers','顾客',ICON.user],['discounts','折扣码',ICON.tag],['bundles','套装',ICON.gift],['settings','设置',ICON.gear]];
    function renderApp(u){
      root.innerHTML='<div class="shell">'+
        '<aside class="side">'+
          '<div class="brand">'+esc(CFG.brand||'Code Official')+' <sup>✿</sup></div>'+
          '<nav class="nav" id="nav">'+NAV.map(function(n){return '<button data-s="'+n[0]+'">'+n[2]+'<span>'+n[1]+'</span></button>';}).join('')+'</nav>'+
          '<div class="side-foot"><a href="index.html" target="_blank">↗ 查看店面</a><button id="signout">退出登录</button></div>'+
        '</aside>'+
        '<main class="main">'+
          '<div class="topbar"><h1 id="title">概览</h1><div class="who">'+esc(u.email)+'</div></div>'+
          '<div class="view" id="view"><p class="muted">载入中…</p></div>'+
        '</main></div>';
      view=document.getElementById('view');
      document.getElementById('signout').addEventListener('click',function(){Auth.signOut().then(function(){location.reload();});});
      document.getElementById('nav').addEventListener('click',function(e){var b=e.target.closest('[data-s]');if(b)show(b.getAttribute('data-s'));});
      show('dash');
    }
    function show(s){
      document.querySelectorAll('#nav button').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-s')===s);});
      var titles={dash:'概览',products:'商品',inventory:'库存',orders:'订单',customers:'顾客',discounts:'折扣码',bundles:'套装',settings:'设置'};
      document.getElementById('title').textContent=titles[s];
      view.innerHTML='<p class="muted">载入中…</p>';
      ({dash:secDash,products:secProducts,inventory:secInventory,orders:secOrders,customers:secCustomers,discounts:secDiscounts,bundles:secBundles,settings:secSettings}[s])();
    }

    // ---------- 概览 ----------
    function secDash(){
      Promise.all([DB.allProducts(),DB.allOrders(),DB.allCustomers()]).then(function(r){
        data.products=(r[0]&&r[0].data)||[]; data.orders=(r[1]&&r[1].data)||[]; data.customers=(r[2]&&r[2].data)||[];
        var revenue=data.orders.reduce(function(s,o){return s+(+o.total||0);},0);
        var pending=data.orders.filter(function(o){return (o.status||'pending')==='pending';}).length;
        // last 7 days revenue bars
        var days=[];for(var i=6;i>=0;i--){var d=new Date();d.setDate(d.getDate()-i);days.push({key:d.toISOString().slice(0,10),label:(d.getMonth()+1)+'/'+d.getDate(),v:0});}
        data.orders.forEach(function(o){var k=(o.created_at||'').slice(0,10);var hit=days.filter(function(x){return x.key===k;})[0];if(hit)hit.v+=(+o.total||0);});
        var max=Math.max.apply(null,days.map(function(d){return d.v;}).concat([1]));
        view.innerHTML=
          '<div class="stats">'+
            stat(data.orders.length,'总订单')+stat(money(revenue),'销售额')+stat(data.products.length,'商品数')+stat(pending,'待处理')+
          '</div>'+
          '<div class="panel"><h2>近 7 天销售</h2><div class="bars">'+days.map(function(d){return '<div class="bar" style="height:'+Math.round(d.v/max*100)+'%"><span>'+d.label+'</span></div>';}).join('')+'</div></div>'+

            sizes:(p.sizes||[]).map(function(sz){return {sz:sz,q:Number((p.stock||{})[sz]||0)};})};
        });
        var log=[],filter='all',query='',selected={},THR_DEF=5;
        var Q=function(s){return view.querySelector(s);},QA=function(s){return [].slice.call(view.querySelectorAll(s));};
        function thr(p){return p.thr||THR_DEF;}

        function total(p){return p.sizes.reduce(function(a,s){return a+s.q;},0);}
        function prodState(p){if(!p.sizes.length)return 'ok';if(p.sizes.some(function(s){return s.q===0;}))return 'out';if(p.sizes.some(function(s){return s.q>0&&s.q<=thr(p);}))return 'low';return 'ok';}
        function matches(p){if(query){var q=query.toLowerCase();if((p.zh+p.en+p.code).toLowerCase().indexOf(q)<0)return false;}if(filter==='low')return p.sizes.some(function(s){return s.q>0&&s.q<=thr(p);});if(filter==='out')return p.sizes.some(function(s){return s.q===0;});return true;}

            '</div><div class="rail"><div class="preview" id="previewBox3"></div></div></div></div>'+
            '<div class="stepwrap" data-pane="4"><div class="wcard"><h2>第四步 · 确认并保存</h2><p class="lede">检查一下，没问题就保存。任何一项都可回到对应步骤修改。</p><div class="review" id="reviewBox"></div></div>'+
              '<div class="wfoot"><button type="button" class="btn btn--quiet btn--lg" data-back="3">← 上一步</button><div class="right"><button type="button" class="btn btn--ghost btn--lg" id="saveDraft">存为草稿</button><button type="button" class="btn btn--lg" id="saveBundle">保存并上架 ✓</button></div></div></div>'+
          '</section></div>';

        var $=function(s){return view.querySelector(s);},$$=function(s){return [].slice.call(view.querySelectorAll(s));};
        function selCount(){return Object.keys(S.selected).length;}
        function pricing(){var ids=Object.keys(S.selected);var list=listFor(S.type,ids,S.selected,S.n);var setP=S.mode==='set'?(+S.setPrice||0):list*(1-(+S.pctOff||0)/100);setP=Math.round(setP);var saved=Math.max(0,Math.round(list-setP));return {list:Math.round(list),setP:setP,saved:saved,pct:list>0?Math.round(saved/list*100):0};}

        function renderBundles(){
          $('#bundleRows').innerHTML=BUNDLES.length?BUNDLES.map(function(b){
            var cnt=b.type==='mix'?(b.count+' 选 '+b.n):(b.count+' 件');
            var line=b.mode==='pct'?(rm(b.price)+' <span class="muted" style="font-size:12px">(打'+(100-(b.pct||0))+'折)</span>'):rm(b.price);
            return '<tr><td><div class="b-name">'+esc(b.name)+'</div><div class="b-en">'+esc(b.en)+'</div></td>'+
              '<td>'+(b.type==='mix'?'<span class="bpill mix">自选组合</span>':'<span class="bpill fixed">固定套装</span>')+'</td>'+
              '<td><div class="price-cell"><div class="set">'+line+'</div><div class="sub">省 '+rm(b.list-b.price)+'</div></div></td>'+
              '<td>'+cnt+'</td><td>'+(b.live?'<span class="bpill green">● 已上架</span>':'<span class="bpill off">○ 草稿</span>')+'</td>'+
              '<td class="tbl-actions"><button data-bedit="'+esc(b.id)+'">编辑</button><button class="del" data-bdel="'+esc(b.id)+'">删除</button></td></tr>';
          }).join(''):'<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:36px">还没有套装，点「＋ 新建套装」开始。</td></tr>';
          $('#bStatTotal').textContent=BUNDLES.length;
          $('#bStatLive').textContent=BUNDLES.filter(function(b){return b.live;}).length;
          $('#bStatSave').textContent=rm(BUNDLES.reduce(function(m,b){return Math.max(m,b.list-b.price);},0));
          $$('[data-bedit]').forEach(function(x){x.addEventListener('click',function(){openWizard(x.getAttribute('data-bedit'));});});
          $$('[data-bdel]').forEach(function(x){x.addEventListener('click',function(){var id=x.getAttribute('data-bdel');if(!confirm('确定删除这个套装？'))return;DB.deleteBundle(id).then(function(r){if(r&&r.error){toast('删除失败：'+r.error.message);return;}toast('套装已删除');secBundles();});});});
        }

        function openWizard(id){
          S=freshState();editingId=null;
          if(id){var b=BUNDLES.filter(function(x){return x.id===id;})[0];if(b){var raw=b.raw;editingId=id;
            S.type=raw.type||'fixed';S.mode=raw.price_mode==='percent'?'pct':'set';S.setPrice=raw.price!=null?raw.price:399;S.pctOff=raw.percent!=null?raw.percent:15;
            S.name=raw.name_zh||'';S.nameEn=raw.name||'';S.desc=raw.description_zh||'';S.sort=raw.sort||0;S.live=raw.active!==false;S.cover=raw.image||null;
            if(raw.type==='mix'){((raw.components&&raw.components.pool)||[]).forEach(function(pid){S.selected[pid]=1;});S.n=(raw.components&&raw.components.choose)||3;}
            else{(Array.isArray(raw.components)?raw.components:[]).forEach(function(c){S.selected[c.product_id]=c.qty||1;});}
          }}
          $('#landing').classList.add('off');$('#wizard').classList.add('on');
          applyState();goStep(1);window.scrollTo(0,0);
        }
        function closeWizard(){$('#wizard').classList.remove('on');$('#landing').classList.remove('off');window.scrollTo(0,0);}
        function applyState(){
          $$('.choice').forEach(function(c){c.classList.toggle('sel',c.dataset.type===S.type);});
          $$('#pmode .opt').forEach(function(o){o.classList.toggle('sel',o.dataset.mode===S.mode);});
          $('#setPriceField').style.display=S.mode==='set'?'block':'none';$('#pctField').style.display=S.mode==='pct'?'block':'none';
          $('#setPrice').value=S.setPrice;$('#pctOff').value=S.pctOff;$('#fName').value=S.name;$('#fNameEn').value=S.nameEn;$('#fDesc').value=S.desc;$('#fSort').value=S.sort;
          var fid=$('#fId');fid.value=editingId||'';fid.readOnly=!!editingId;
          $('#liveSw').classList.toggle('on',S.live);$('#nInput').value=S.n;
          if(S.cover){$('#coverPh').innerHTML='<img src="'+bimg(S.cover)+'" alt="">';}
        }
        function goStep(n){
          $$('.stepwrap').forEach(function(p){p.classList.toggle('on',+p.dataset.pane===n);});
          $$('#stepsBar .step').forEach(function(s){var k=+s.dataset.step;s.classList.toggle('active',k===n);s.classList.toggle('done',k<n);});
          $$('#stepsBar .step-line').forEach(function(l){l.classList.toggle('fill',+l.dataset.line<n);});
          if(n===2){renderCatalog();updatePreview('#previewBox2');}
          if(n===3){updatePreview('#previewBox3');}
          if(n===4){renderReview();}
          window.scrollTo(0,0);
        }
        function updatePickCount(){$('#pickCount').textContent=S.type==='mix'?('池中 '+selCount()+' 件'):('已选 '+selCount()+' 件');}
        function renderCatalog(){
          if(S.type==='mix'){$('#s2title').textContent='第二步 · 设定商品池';$('#s2lede').textContent='勾选要放进「池子」的商品，再设定顾客需选几件。';$('#mixNbox').style.display='flex';}
          else{$('#s2title').textContent='第二步 · 选入套装的商品';$('#s2lede').textContent='勾选要放进套装的单品，并为每件设置数量。';$('#mixNbox').style.display='none';}
          $('#nInput').value=S.n;
          var q=($('#catSearch').value||'').trim().toLowerCase();
          $('#catalogList').innerHTML=CATALOG.map(function(p){
            var on=S.selected.hasOwnProperty(p.id);var qty=S.selected[p.id]||1;
            var hidden=q&&p.zh.toLowerCase().indexOf(q)<0&&p.en.toLowerCase().indexOf(q)<0;
            var qc=S.type==='fixed'?('<div class="pqty"><span class="qlab">数量</span><div class="qstep'+(on?'':' dim')+'" data-q="'+esc(p.id)+'"><button type="button" class="qd">−</button><input class="qi" type="text" value="'+qty+'" inputmode="numeric"><button type="button" class="qu">＋</button></div></div>'):'<div class="pqty"><span class="qlab">入池</span></div>';
            return '<div class="prow'+(on?' sel':'')+(hidden?' hide':'')+'" data-id="'+esc(p.id)+'"><div class="ckbox"></div>'+
              '<img class="pthumb" src="'+bimg(p.img)+'" onerror="this.src=\'images/placeholder.svg\'">'+
              '<div class="pinfo"><div class="nm">'+esc(p.zh)+'</div><div class="ct">'+esc(p.en)+' · '+esc(p.cat)+'</div></div>'+
              '<div class="pprice">'+rm(p.price)+'</div>'+qc+'</div>';
          }).join('');
          $$('#catalogList .prow').forEach(function(row){var id=row.dataset.id;
            row.addEventListener('click',function(e){if(e.target.closest('.qstep'))return;if(S.selected.hasOwnProperty(id))delete S.selected[id];else S.selected[id]=1;renderCatalog();updatePreview('#previewBox2');});
          });
          $$('#catalogList .qstep').forEach(function(st){var id=st.dataset.q;var inp=st.querySelector('.qi');
            st.querySelector('.qd').addEventListener('click',function(e){e.stopPropagation();setQty(id,(S.selected[id]||1)-1);});
            st.querySelector('.qu').addEventListener('click',function(e){e.stopPropagation();setQty(id,(S.selected[id]||1)+1);});
            inp.addEventListener('click',function(e){e.stopPropagation();});
            inp.addEventListener('input',function(){var v=parseInt(inp.value.replace(/\D/g,''),10);S.selected[id]=Math.max(1,Math.min(99,isNaN(v)?1:v));updatePreview('#previewBox2');});
          });
          updatePickCount();
        }
        function setQty(id,v){if(!S.selected.hasOwnProperty(id))S.selected[id]=1;S.selected[id]=Math.max(1,Math.min(99,v||1));renderCatalog();updatePreview('#previewBox2');}
        function setN(v){S.n=Math.max(1,Math.min(9,v||1));$('#nInput').value=S.n;updatePreview('#previewBox2');}
        function updatePreview(sel){
          var box=$(sel);if(!box)return;var ids=Object.keys(S.selected);var pr=pricing();
          var items=ids.length?'<ul class="pv-items">'+ids.map(function(id){var p=byId(id);if(!p)return '';var q=S.selected[id]||1;return '<li><span class="n">'+esc(p.zh)+'</span><span>'+rm(p.price)+(S.type==='fixed'&&q>1?' <span class="q">×'+q+'</span>':'')+'</span></li>';}).join('')+'</ul>':'<div class="pv-empty">还没选商品<br>左侧勾选后这里会更新</div>';
          var typeLabel=S.type==='fixed'?'固定套装':('自选组合 · '+ids.length+' 选 '+S.n);
          var modeLabel=S.mode==='set'?'固定套价':('打 '+(100-(+S.pctOff||0))+' 折');
          var save=(ids.length&&pr.saved>0)?'<span class="pv-save">省 '+rm(pr.saved)+'<small>约 '+pr.pct+'% off</small></span>':'<span class="pv-save none">'+(ids.length?'当前未省（套价 ≥ 单买）':'选商品后显示省额')+'</span>';
          box.innerHTML='<div class="ph"><svg viewBox="0 0 24 24"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>实时预览</div><div class="body"><div class="pv-name">'+(esc(S.name)||'未命名套装')+'</div><div class="pv-meta">'+typeLabel+' · '+modeLabel+'</div>'+items+'<div class="pv-row"><span class="k">单买合计</span><span class="v strike">'+rm(pr.list)+'</span></div><div class="pv-row set"><span class="k">套装价</span><span class="v"><span class="pv-big">'+rm(pr.setP)+'</span></span></div>'+save+'</div>';
        }
        function renderReview(){
          var ids=Object.keys(S.selected);var pr=pricing();
          var lines=ids.length?ids.map(function(id){var p=byId(id);if(!p)return '';var q=S.selected[id]||1;return '<li><span>'+esc(p.zh)+(S.type==='fixed'&&q>1?(' ×'+q):'')+'</span><span class="muted">'+rm(p.price)+'</span></li>';}).join(''):'<li class="muted">（未选商品）</li>';
          var typeTxt=S.type==='fixed'?'固定套装（整套购买）':('自选组合 · '+ids.length+' 选 '+S.n);
          var modeTxt=S.mode==='set'?('固定套价 '+rm(S.setPrice)):('按总价打 '+(100-(+S.pctOff||0))+' 折 ('+S.pctOff+'% off)');
          $('#reviewBox').innerHTML='<div class="rev-block"><h4>类型 &amp; 商品 <button data-jump="2">修改</button></h4>'+
            '<div class="rev-line"><span class="k">类型</span><span class="v">'+typeTxt+'</span></div>'+
            '<div class="rev-line"><span class="k">'+(S.type==='mix'?'池中商品':'含商品')+'</span><span class="v">'+ids.length+' 件</span></div><ul class="rev-items">'+lines+'</ul></div>'+
            '<div class="rev-block"><h4>定价 &amp; 信息 <button data-jump="3">修改</button></h4>'+
            '<div class="rev-line"><span class="k">计价方式</span><span class="v">'+modeTxt+'</span></div>'+
            '<div class="rev-line"><span class="k">单买合计</span><span class="v">'+rm(pr.list)+'</span></div>'+
            '<div class="rev-line"><span class="k">套装价</span><span class="v" style="color:var(--wine);font-weight:700">'+rm(pr.setP)+'</span></div>'+
            '<div class="rev-line"><span class="k">名称</span><span class="v">'+(esc(S.name)||esc(S.nameEn)||'—')+'</span></div>'+
            '<div class="rev-line"><span class="k">状态</span><span class="v">'+(S.live?'<span class="bpill green">● 立即上架</span>':'<span class="bpill off">○ 草稿</span>')+'</span></div></div>'+
            '<div class="rev-banner"><div><div class="muted" style="font-size:12px;text-transform:uppercase;letter-spacing:.06em">顾客可省</div><div class="big">省 '+rm(pr.saved)+'</div></div><div style="font-size:14px;color:var(--green)">约 '+pr.pct+'% off · 单买 '+rm(pr.list)+' → 套装 '+rm(pr.setP)+'</div></div>';
          $$('#reviewBox [data-jump]').forEach(function(b){b.addEventListener('click',function(){goStep(+b.dataset.jump);});});
        }
        function commit(live){
          var ids=Object.keys(S.selected);
          if(ids.length<1){toast('请先在第二步选入商品');goStep(2);return;}
          var nm=(S.nameEn||S.name||'').trim();if(!nm){toast('请填写套装名');goStep(3);return;}
          if(S.type==='mix'&&S.n>ids.length){toast('「选 N 件」不能超过池中件数');goStep(2);return;}
          var components=S.type==='mix'?{pool:ids,choose:S.n}:ids.map(function(id){return {product_id:id,qty:S.selected[id]||1};});
          var row={id:editingId||(($('#fId').value||'').trim()||slug(nm)),name:S.nameEn||S.name,name_zh:S.name||null,type:S.type,price_mode:S.mode==='pct'?'percent':'fixed',
            price:S.mode==='set'?(+S.setPrice||0):null,percent:S.mode==='pct'?(+S.pctOff||0):null,components:components,image:S.cover||null,description_zh:S.desc||null,active:live,sort:parseInt(S.sort,10)||0};
          $('#saveBundle').disabled=true;$('#saveDraft').disabled=true;
          DB.upsertBundle(row).then(function(r){
            if(r&&r.error){toast('保存失败：'+r.error.message);$('#saveBundle').disabled=false;$('#saveDraft').disabled=false;return;}
            toast(live?('套装「'+esc(S.name||S.nameEn)+'」已保存并上架 ✿'):('草稿「'+esc(S.name||S.nameEn)+'」已保存'));secBundles();
          },function(){toast('保存失败，请重试');$('#saveBundle').disabled=false;$('#saveDraft').disabled=false;});
        }

        // ---- wire wizard (elements persist; bound once) ----
        $('#newBundle').addEventListener('click',function(){openWizard(null);});
        $('#cancel1').addEventListener('click',closeWizard);
        $$('.choice').forEach(function(c){c.addEventListener('click',function(){$$('.choice').forEach(function(x){x.classList.remove('sel');});c.classList.add('sel');S.type=c.dataset.type;});});
        $$('#pmode .opt').forEach(function(o){o.addEventListener('click',function(){$$('#pmode .opt').forEach(function(x){x.classList.remove('sel');});o.classList.add('sel');S.mode=o.dataset.mode;$('#setPriceField').style.display=S.mode==='set'?'block':'none';$('#pctField').style.display=S.mode==='pct'?'block':'none';updatePreview('#previewBox3');});});
        $('#setPrice').addEventListener('input',function(){S.setPrice=+this.value||0;updatePreview('#previewBox3');});
        $('#pctOff').addEventListener('input',function(){S.pctOff=+this.value||0;updatePreview('#previewBox3');});
        $('#fName').addEventListener('input',function(){S.name=this.value;updatePreview('#previewBox3');});
        $('#fNameEn').addEventListener('input',function(){S.nameEn=this.value;});
        $('#fDesc').addEventListener('input',function(){S.desc=this.value;});
        $('#fSort').addEventListener('input',function(){S.sort=this.value;});
        $('#liveSw').addEventListener('click',function(){S.live=!S.live;this.classList.toggle('on',S.live);});
        $('#nDec').addEventListener('click',function(){setN(S.n-1);});
        $('#nInc').addEventListener('click',function(){setN(S.n+1);});
        $('#nInput').addEventListener('input',function(){var v=parseInt(this.value.replace(/\D/g,''),10);setN(isNaN(v)?1:v);});
        $('#catSearch').addEventListener('input',renderCatalog);
        $('#pickCover').addEventListener('click',function(){var first=Object.keys(S.selected)[0];if(first){var p=byId(first);S.cover=p.img;$('#coverPh').innerHTML='<img src="'+bimg(p.img)+'" alt="">';toast('已选用「'+esc(p.zh)+'」的图作封面');}else toast('先在第二步选入商品');});
        $$('[data-go]').forEach(function(b){b.addEventListener('click',function(){var n=+b.dataset.go;if(n===3&&selCount()===0){toast('请先在第二步选入至少 1 件商品');return;}goStep(n);});});
        $$('[data-back]').forEach(function(b){b.addEventListener('click',function(){goStep(+b.dataset.back);});});
        $('#saveBundle').addEventListener('click',function(){commit(true);});
        $('#saveDraft').addEventListener('click',function(){commit(false);});

        S=freshState();
        renderBundles();
      });
    }

    // ---------- 设置 ----------
    function secSettings(){
      DB.getSettings().then(function(r){
        var s=(r&&r.data&&r.data.data)||{};
        function g(k,d){return s[k]!==undefined&&s[k]!==null&&s[k]!==''?s[k]:(CFG[k]!==undefined?CFG[k]:d);}
        var mode=g('paymentMode','demo'),link=g('paymentLink','');
        var pix=g('pixelId','');if(pix==='YOUR_PIXEL_ID')pix='';
        view.innerHTML='<div class="panel"><h2>店铺设置</h2>'+
          '<div class="row2"><div class="field"><label>店名 Brand</label><input id="s_brand" value="'+esc(g('brand','Code Official'))+'"></div>'+
            '<div class="field"><label>标语 Tagline</label><input id="s_tag" value="'+esc(g('tagline',''))+'"></div></div>'+
          '<div class="row2"><div class="field"><label>联系邮箱</label><input id="s_email" value="'+esc(g('email',''))+'"></div>'+
            '<div class="field"><label>默认语言</label><select id="s_lang"><option value="">自动</option><option value="en"'+(g('defaultLang','')==='en'?' selected':'')+'>English</option><option value="zh"'+(g('defaultLang','')==='zh'?' selected':'')+'>中文</option></select></div></div>'+
          '<div class="row2"><div class="field"><label>货币代码 (MYR/HKD/USD)</label><input id="s_cur" value="'+esc(g('currency','MYR'))+'"></div>'+
            '<div class="field"><label>货币符号 (RM/HK$/$)</label><input id="s_sym" value="'+esc(g('currencySymbol','RM'))+'"></div></div>'+
          '<div class="row2"><div class="field"><label>免运门槛</label><input id="s_free" type="number" value="'+esc(g('freeShippingThreshold',150))+'"></div>'+
            '<div class="field"><label>统一运费</label><input id="s_ship" type="number" value="'+esc(g('shippingFlat',10))+'"></div></div>'+
          '<div class="field"><label>Facebook Pixel ID（广告追踪）</label><input id="s_pixel" value="'+esc(pix)+'" placeholder="纯数字，如 1234567890123456"></div>'+
          '<h2 style="font-size:20px;margin:28px 0 12px">支付方式 Payment Gateway</h2>'+
          '<div class="seg" id="payseg">'+[['demo','演示 Demo'],['stripe','Stripe'],['paypal','PayPal']].map(function(x){return '<button type="button" data-pm="'+x[0]+'"'+(mode===x[0]?' class="on"':'')+'>'+x[1]+'</button>';}).join('')+'</div>'+
          '<div class="field" id="linkWrap" style="margin-top:14px;'+(mode==='demo'?'display:none':'')+'"><label id="linkLbl">支付链接</label><input id="s_link" value="'+esc(link)+'" placeholder="粘贴 Stripe Payment Link 或 PayPal 链接"></div>'+
          '<p class="muted" style="font-size:12px;margin-top:6px">演示=不真实扣款；选 Stripe/PayPal 并粘贴收款链接后，结账会跳转到该链接收款（在该链接的"付款后跳转"设为你的 success.html，Purchase 事件才会触发）。</p>'+
          '<div style="display:flex;gap:10px;margin-top:22px"><button class="btn" id="saveS">保存设置</button><span class="msg" id="sm"></span></div>'+
          '<p class="muted" style="font-size:12px;margin-top:18px">提示：保存后店面会即时采用这些设置（店名、货币、运费、支付方式、Pixel）。Pixel ID 在 Meta「事件管理工具」里复制（一串数字）。</p>'+
        '</div>';
        var seg=document.getElementById('payseg'),curMode=mode;
        seg.addEventListener('click',function(e){var b=e.target.closest('[data-pm]');if(!b)return;curMode=b.getAttribute('data-pm');
          seg.querySelectorAll('button').forEach(function(x){x.classList.toggle('on',x===b);});
          document.getElementById('linkWrap').style.display=curMode==='demo'?'none':'';
          document.getElementById('linkLbl').textContent=curMode==='stripe'?'Stripe Payment Link':'PayPal 链接';
        });
        document.getElementById('saveS').addEventListener('click',function(){
          var m=document.getElementById('sm');m.style.color='var(--wine)';
          var out={brand:v('s_brand'),tagline:v('s_tag'),email:v('s_email'),defaultLang:document.getElementById('s_lang').value,
            currency:v('s_cur'),currencySymbol:v('s_sym'),pixelId:v('s_pixel'),
            freeShippingThreshold:parseFloat(v('s_free'))||0,shippingFlat:parseFloat(v('s_ship'))||0,
            paymentMode:curMode,paymentLink:curMode==='demo'?'':v('s_link')};
          document.getElementById('saveS').disabled=true;
          DB.saveSettings(out).then(function(r){
            document.getElementById('saveS').disabled=false;
            if(r&&r.error){m.textContent='保存失败：'+r.error.message;return;}
            m.style.color='var(--green)';m.textContent='✓ 已保存，店面已生效';
            if(window.STORE_CONFIG)Object.keys(out).forEach(function(k){if(out[k]!=='')window.STORE_CONFIG[k]=out[k];});
          },function(){document.getElementById('saveS').disabled=false;m.textContent='保存失败，请重试';});
        });
      });
    }
  })();
  </script>
</body>
</html>
