<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品 · 行内展开编辑 (Demo) · Code Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FFFAF1; --cream2:#FAF6F3; --white:#fff; --blush:#F2E4D9; --pink:#E9C9CC; --pink-soft:#F3E2E4; --pink-border:#DAB0B7;
  --wine:#82213E; --wine-deep:#6A1A32; --ink:#1C1C1C; --muted:#6F635C; --line:#ECD9D6;
  --green:#2F7D4F; --green-bg:#E3F1E8; --amber:#9A6B12; --amber-bg:#FBF0DA; --red:#B23A48; --red-bg:#F6E2E4;
  --radius:8px; --shadow:0 1px 3px rgba(28,28,28,.06),0 8px 28px rgba(28,28,28,.05);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--cream); color:var(--ink); line-height:1.5;
  -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
}
h1,h2,h3{font-family:"DM Serif Display",Georgia,serif; font-weight:400; margin:0;}

/* TOP BAR */
.topbar{
  position:sticky; top:0; z-index:50; background:var(--white);
  border-bottom:1px solid var(--pink-soft);
  display:flex; align-items:center; gap:18px;
  padding:13px 22px;
}
.topbar .wrap{max-width:1180px; margin:0 auto; width:100%; display:flex; align-items:center; gap:18px;}
.wordmark{font-family:"DM Serif Display",Georgia,serif; font-size:22px; color:var(--ink); display:flex; align-items:center; gap:5px;}
.wordmark .flower{color:var(--wine); font-size:18px;}
.breadcrumb{font-size:13px; color:var(--muted); letter-spacing:.02em;}
.spacer{flex:1;}
.demo-pill{
  font-size:11.5px; color:var(--wine); border:1px solid var(--pink); background:var(--pink-soft);
  border-radius:40px; padding:5px 13px; white-space:nowrap;
}

/* MAIN */
.main{max-width:1180px; margin:0 auto; padding:0 22px 80px;}
.page-head{display:flex; align-items:center; justify-content:space-between; gap:16px; margin:30px 0 18px; flex-wrap:wrap;}
.page-head h1{font-size:32px; display:flex; align-items:baseline; gap:10px;}
.page-head h1 .count{font-family:"DM Sans",sans-serif; font-size:16px; color:var(--muted); font-weight:500;}
.demo-note{font-size:12px; color:var(--muted); margin:0 0 22px; font-style:italic;}

/* BUTTONS */
.btn{font-family:"DM Sans",sans-serif; font-size:14px; font-weight:500; border-radius:var(--radius); padding:10px 18px; cursor:pointer; border:1px solid transparent; transition:background .15s,border-color .15s,color .15s; display:inline-flex; align-items:center; gap:7px;}
.btn-primary{background:var(--wine); color:#fff;}
.btn-primary:hover{background:var(--wine-deep);}
.btn-ghost{background:transparent; border:1px solid var(--pink-border); color:var(--wine);}
.btn-ghost:hover{background:var(--pink-soft);}
.btn-sm{padding:8px 14px; font-size:13px;}

/* LIST */
.list{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden;}
.list-head{
  display:grid; grid-template-columns:2.6fr 1fr 1.1fr .9fr 64px;
  gap:12px; padding:13px 20px; background:var(--cream2);
  border-bottom:1px solid var(--line);
  font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); font-weight:600;
}
.list-head .col-exp{text-align:center;}

.product{border-bottom:1px solid var(--line);}
.product:last-child{border-bottom:none;}
.product.open{background:var(--cream2);}

.prow{
  display:grid; grid-template-columns:2.6fr 1fr 1.1fr .9fr 64px;
  gap:12px; padding:14px 20px; align-items:center; cursor:pointer;
  transition:background .12s;
}
.prow:hover{background:var(--cream2);}
.product.open .prow{background:transparent;}

.prod-cell{display:flex; align-items:center; gap:13px; min-width:0;}
.thumb{width:46px; height:58px; border-radius:6px; flex:none; border:1px solid var(--line);}
.prod-names{min-width:0;}
.prod-zh{font-weight:600; font-size:14.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.prod-en{font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.prod-sku{font-size:11px; color:var(--muted); letter-spacing:.03em; margin-top:1px;}

.cat{font-size:13.5px; color:var(--ink);}
.price-cell{font-size:14px; display:flex; align-items:center; gap:7px; flex-wrap:wrap;}
.price-now{font-weight:600;}
.price-old{color:var(--muted); text-decoration:line-through; font-size:12.5px;}
.sale-chip{font-size:10px; font-weight:700; letter-spacing:.05em; background:var(--wine); color:#fff; padding:2px 6px; border-radius:4px;}

.pill{font-size:11.5px; font-weight:600; padding:4px 11px; border-radius:40px; display:inline-block;}
.pill-on{background:var(--green-bg); color:var(--green);}
.pill-off{background:#EFEAE6; color:var(--muted);}

.chev{
  width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:var(--white);
  display:flex; align-items:center; justify-content:center; margin:0 auto; color:var(--wine);
  transition:transform .28s ease, background .15s; font-size:13px;
}
.product.open .chev{transform:rotate(180deg); background:var(--pink-soft);}

/* EXPAND */
.editor-wrap{display:grid; grid-template-rows:0fr; transition:grid-template-rows .32s ease;}
.product.open .editor-wrap{grid-template-rows:1fr;}
.editor-clip{overflow:hidden;}
.editor{
  opacity:0; transform:translateY(-6px); transition:opacity .26s ease .04s, transform .26s ease .04s;
  padding:6px 20px 24px;
}
.product.open .editor{opacity:1; transform:translateY(0);}

.editor-grid{display:grid; grid-template-columns:1.55fr 1fr; gap:22px; align-items:start;}

/* FORM */
.fieldset{margin-bottom:0;}
.field{margin-bottom:14px;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.field-row-3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px;}
label{display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; letter-spacing:.02em;}
label .req{color:var(--wine);}
input[type=text],input[type=number],input[type=url],select,textarea{
  width:100%; background:var(--white); border:1px solid var(--line); border-radius:6px;
  padding:10px 12px; font-family:"DM Sans",sans-serif; font-size:13.5px; color:var(--ink);
  transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--pink-border); box-shadow:0 0 0 3px var(--pink-soft);}
input[readonly]{background:var(--cream2); color:var(--muted);}
textarea{resize:vertical; min-height:62px;}
.card{background:var(--white); border:1px solid var(--line); border-radius:var(--radius); padding:18px;}
.card-title{font-family:"DM Serif Display",Georgia,serif; font-size:18px; margin-bottom:4px;}
.card-sub{font-size:11.5px; color:var(--muted); margin-bottom:16px;}
.section-title{font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--wine); margin:22px 0 12px;}
.editor-col-left .section-title:first-child{margin-top:4px;}

/* SIZE CHIPS */
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{
  font-size:13px; padding:7px 14px; border-radius:40px; border:1px solid var(--line);
  background:var(--white); cursor:pointer; user-select:none; transition:all .15s; color:var(--ink);
}
.chip:hover{border-color:var(--pink-border);}
.chip.active{background:var(--wine); color:#fff; border-color:var(--wine);}

/* COLORS */
.color-rows{display:flex; flex-direction:column; gap:10px;}
.color-row{display:flex; align-items:center; gap:10px;}
.color-row input[type=text]{flex:1;}
.color-row input[type=color]{
  width:42px; height:38px; padding:3px; border:1px solid var(--line); border-radius:6px; background:var(--white); cursor:pointer;
}

/* TOGGLES */
.toggle-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid var(--line);}
.toggle-row:last-of-type{border-bottom:none;}
.toggle-label{font-size:13.5px;}
.toggle-label small{display:block; color:var(--muted); font-size:11.5px; margin-top:1px;}
.switch{position:relative; width:46px; height:25px; flex:none;}
.switch input{opacity:0; width:0; height:0;}
.switch .track{
  position:absolute; inset:0; background:#D8CFC8; border-radius:40px; transition:background .2s; cursor:pointer;
}
.switch .knob{
  position:absolute; top:2px; left:2px; width:21px; height:21px; background:#fff; border-radius:50%;
  transition:transform .2s; box-shadow:0 1px 2px rgba(0,0,0,.25);
}
.switch input:checked + .track{background:var(--green);}
.switch.wine input:checked + .track{background:var(--wine);}
.switch input:checked + .track .knob{transform:translateX(21px);}

.thresh-row{display:flex; align-items:center; gap:12px; margin:14px 0 4px;}
.thresh-row label{margin:0; flex:1;}
.thresh-row input{width:90px;}

/* STOCK MATRIX */
.matrix{margin-top:6px;}
.matrix-group{margin-bottom:16px;}
.matrix-group:last-child{margin-bottom:0;}
.mg-head{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
.swatch-dot{width:16px; height:16px; border-radius:50%; border:1px solid rgba(0,0,0,.12); flex:none;}
.mg-name{font-size:13px; font-weight:600;}
.mg-cells{display:flex; flex-wrap:wrap; gap:10px;}
.cell{width:74px;}
.cell-size{font-size:11px; color:var(--muted); font-weight:600; margin-bottom:4px; text-align:center; letter-spacing:.04em;}
.cell-input-wrap{position:relative;}
.cell input{padding:8px 8px 8px 24px; text-align:center; font-size:13px;}
.cell-dot{position:absolute; left:9px; top:50%; transform:translateY(-50%); width:9px; height:9px; border-radius:50%; pointer-events:none;}
.dot-out{background:var(--red);}
.dot-low{background:var(--amber);}
.dot-ok{background:var(--green);}
.matrix-empty{font-size:12.5px; color:var(--muted); font-style:italic; padding:8px 0;}
.matrix-legend{display:flex; gap:14px; margin-top:12px; font-size:11px; color:var(--muted); flex-wrap:wrap;}
.matrix-legend span{display:flex; align-items:center; gap:5px;}
.lg-dot{width:8px; height:8px; border-radius:50%;}

.card-actions{display:flex; gap:10px; margin-top:18px; padding-top:16px; border-top:1px solid var(--line);}
.card-actions .btn{flex:1; justify-content:center;}

/* TOAST */
.toast{
  position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; font-size:13.5px; padding:12px 22px; border-radius:40px;
  box-shadow:0 8px 28px rgba(0,0,0,.25); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:100;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

@media(max-width:880px){
  .editor-grid{grid-template-columns:1fr;}
  .list-head{display:none;}
  .prow{grid-template-columns:1fr 44px; grid-template-areas:"prod exp" "cat exp" "price exp" "status exp"; gap:8px;}
  .prow .prod-cell{grid-area:prod;}
  .prow .cat{grid-area:cat;}
  .prow .price-cell{grid-area:price;}
  .prow .status-cell{grid-area:status;}
  .prow .exp-cell{grid-area:exp; align-self:center;}
  .field-row,.field-row-3{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <div class="wordmark">Code Official <span class="flower">✿</span></div>
    <div class="breadcrumb">后台 · 商品</div>
    <div class="spacer"></div>
    <div class="demo-pill">Demo · 行内展开编辑</div>
  </div>
</div>

<div class="main">
  <div class="page-head">
    <h1>商品 <span class="count" id="prodCount">(3)</span></h1>
    <button class="btn btn-primary" onclick="addProduct()">＋ 上新商品</button>
  </div>
  <p class="demo-note">这是设计 Demo，未连接真实后台。点击任意商品行右侧的 ▾ 即可在原位展开编辑。</p>

  <div class="list">
    <div class="list-head">
      <div>商品</div>
      <div>分类</div>
      <div>价格</div>
      <div>状态</div>
      <div class="col-exp">展开</div>
    </div>
    <div id="productList"></div>
  </div>
</div>

<div class="toast" id="toast">（Demo）已保存</div>

<script>
const CATS = ["Outerwear","Knitwear","Shirts","Tops","Trousers","Dresses","Accessories"];
const SIZES = ["XS","S","M","L","XL","ONE SIZE"];
const TAGS = ["无","New","Sale"];

let products = [
  {
    id:"P-1001", thumb:"#C7A98B",
    zh:"羊毛混纺大衣", en:"Wool-Blend Overcoat", sku:"OVERCOAT-01",
    cat:"Outerwear", price:680, oldPrice:880, tag:"Sale", sort:1,
    active:true, track:true, oversell:false, threshold:5,
    sizes:["S","M","L"],
    colors:[{name:"驼色",hex:"#C7A98B"},{name:"黑色",hex:"#1C1C1C"}],
    img:"https://cdn.example.com/overcoat-main.jpg", img2:"",
    descEn:"A timeless wool-blend overcoat with a tailored silhouette.", descZh:"经典羊毛混纺大衣，修身剪裁。",
    stock:{"驼色":{"S":10,"M":0,"L":4},"黑色":{"S":5,"M":3,"L":0}}
  },
  {
    id:"P-1002", thumb:"#82213E",
    zh:"真丝吊带连衣裙", en:"Silk Slip Dress", sku:"DRESS-05",
    cat:"Dresses", price:320, oldPrice:null, tag:"无", sort:2,
    active:true, track:true, oversell:false, threshold:3,
    sizes:["XS","S","M"],
    colors:[{name:"酒红",hex:"#82213E"}],
    img:"", img2:"",
    descEn:"Bias-cut silk slip dress with adjustable straps.", descZh:"斜裁真丝吊带连衣裙，可调节肩带。",
    stock:{"酒红":{"XS":6,"S":8,"M":2}}
  },
  {
    id:"P-1003", thumb:"#EFE9DD",
    zh:"美利奴高领衫", en:"Merino Turtleneck", sku:"TURTLE-10",
    cat:"Knitwear", price:240, oldPrice:null, tag:"无", sort:3,
    active:false, track:true, oversell:false, threshold:4,
    sizes:["S","M","L","XL"],
    colors:[{name:"米白",hex:"#EFE9DD"}],
    img:"", img2:"",
    descEn:"Fine merino wool turtleneck, breathable and warm.", descZh:"精纺美利奴羊毛高领衫，透气保暖。",
    stock:{"米白":{"S":12,"M":7,"L":3,"XL":0}}
  }
];

let openId = null;
let newCounter = 0;

function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function priceHtml(p){
  let h='';
  if(p.oldPrice) h+=`<span class="price-old">RM ${p.oldPrice}</span>`;
  h+=`<span class="price-now">RM ${p.price||0}</span>`;
  if(p.tag==="Sale" || (p.oldPrice && p.oldPrice>p.price)) h+=`<span class="sale-chip">SALE</span>`;
  return h;
}

function render(){
  const list = document.getElementById('productList');
  list.innerHTML = '';
  document.getElementById('prodCount').textContent = `(${products.length})`;
  products.forEach(p=>{
    const open = p.id===openId;
    const el = document.createElement('div');
    el.className = 'product'+(open?' open':'');
    el.id = 'prod-'+p.id;
    el.innerHTML = `
      <div class="prow" onclick="toggle('${p.id}')">
        <div class="prod-cell">
          <div class="thumb" style="background:${esc(p.thumb||'#E9C9CC')}"></div>
          <div class="prod-names">
            <div class="prod-zh">${esc(p.zh)||'<span style="color:var(--muted)">（未命名）</span>'}</div>
            <div class="prod-en">${esc(p.en)||'New Product'}</div>
            <div class="prod-sku">${esc(p.sku)||p.id}</div>
          </div>
        </div>
        <div class="cat">${esc(p.cat)}</div>
        <div class="price-cell">${priceHtml(p)}</div>
        <div class="status-cell">${p.active?'<span class="pill pill-on">上架</span>':'<span class="pill pill-off">下架</span>'}</div>
        <div class="exp-cell"><div class="chev">▾</div></div>
      </div>
      <div class="editor-wrap"><div class="editor-clip"><div class="editor" id="editor-${p.id}">${open?editorHtml(p):''}</div></div></div>
    `;
    list.appendChild(el);
  });
}

function editorHtml(p){
  const catOpts = CATS.map(c=>`<option ${c===p.cat?'selected':''}>${c}</option>`).join('');
  const tagOpts = TAGS.map(t=>`<option ${t===p.tag?'selected':''}>${t}</option>`).join('');
  const sizeChips = SIZES.map(s=>`<div class="chip ${p.sizes.includes(s)?'active':''}" onclick="toggleSize('${p.id}','${s}')">${s}</div>`).join('');
  let colorRows='';
  for(let i=0;i<4;i++){
    const c = p.colors[i]||{name:'',hex:'#E9C9CC'};
    colorRows+=`<div class="color-row">
      <input type="text" placeholder="颜色名 ${i+1}（留空=不使用）" value="${esc(c.name)}" oninput="setColorName('${p.id}',${i},this.value)">
      <input type="color" value="${c.hex}" oninput="setColorHex('${p.id}',${i},this.value)">
    </div>`;
  }
  return `
  <div class="editor-grid">
    <div class="editor-col-left">
      <div class="section-title">基本信息</div>
      <div class="field-row">
        <div class="field"><label>商品ID（自动）</label><input type="text" value="${esc(p.id)}" readonly></div>
        <div class="field"><label>分类</label><select onchange="setField('${p.id}','cat',this.value)">${catOpts}</select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>商品名（English）<span class="req">*</span></label><input type="text" value="${esc(p.en)}" oninput="setField('${p.id}','en',this.value)"></div>
        <div class="field"><label>商品名（中文）</label><input type="text" value="${esc(p.zh)}" oninput="setField('${p.id}','zh',this.value)"></div>
      </div>
      <div class="field-row-3">
        <div class="field"><label>价格（RM）<span class="req">*</span></label><input type="number" value="${p.price||''}" oninput="setNum('${p.id}','price',this.value)"></div>
        <div class="field"><label>原价（可空）</label><input type="number" value="${p.oldPrice||''}" oninput="setNum('${p.id}','oldPrice',this.value)"></div>
        <div class="field"><label>排序</label><input type="number" value="${p.sort||''}" oninput="setNum('${p.id}','sort',this.value)"></div>
      </div>
      <div class="field"><label>标签</label><select onchange="setField('${p.id}','tag',this.value)">${tagOpts}</select></div>

      <div class="section-title">尺码</div>
      <div class="field"><div class="chips">${sizeChips}</div></div>

      <div class="section-title">颜色（最多 4 个）</div>
      <div class="field"><div class="color-rows">${colorRows}</div></div>

      <div class="section-title">图片</div>
      <div class="field-row">
        <div class="field"><label>主图（网址）</label><input type="url" value="${esc(p.img)}" oninput="setField('${p.id}','img',this.value)" placeholder="https://..."></div>
        <div class="field"><label>备用图（网址）</label><input type="url" value="${esc(p.img2)}" oninput="setField('${p.id}','img2',this.value)" placeholder="https://..."></div>
      </div>

      <div class="section-title">描述</div>
      <div class="field"><label>描述（English）</label><textarea oninput="setField('${p.id}','descEn',this.value)">${esc(p.descEn)}</textarea></div>
      <div class="field"><label>描述（中文）</label><textarea oninput="setField('${p.id}','descZh',this.value)">${esc(p.descZh)}</textarea></div>
    </div>

    <div class="editor-col-right">
      <div class="card">
        <div class="card-title">库存 &amp; 上架</div>
        <div class="card-sub">控制商品的上下架与各颜色尺码库存。</div>

        <div class="toggle-row">
          <div class="toggle-label">上架商品<small>开 = 顾客可见可买</small></div>
          <label class="switch"><input type="checkbox" ${p.active?'checked':''} onchange="setField('${p.id}','active',this.checked)"><span class="track"><span class="knob"></span></span></label>
        </div>
        <div class="toggle-row">
          <div class="toggle-label">追踪库存<small>关 = 永远有货</small></div>
          <label class="switch wine"><input type="checkbox" ${p.track?'checked':''} onchange="setField('${p.id}','track',this.checked); refreshMatrix('${p.id}')"><span class="track"><span class="knob"></span></span></label>
        </div>
        <div class="toggle-row">
          <div class="toggle-label">售罄后仍可购买<small>允许超卖</small></div>
          <label class="switch wine"><input type="checkbox" ${p.oversell?'checked':''} onchange="setField('${p.id}','oversell',this.checked)"><span class="track"><span class="knob"></span></span></label>
        </div>

        <div class="thresh-row">
          <label>低库存阈值</label>
          <input type="number" min="0" value="${p.threshold}" oninput="setNum('${p.id}','threshold',this.value); refreshMatrix('${p.id}')">
        </div>

        <div class="section-title" style="margin-top:18px">颜色 × 尺码 库存</div>
        <div class="matrix" id="matrix-${p.id}">${matrixHtml(p)}</div>

        <div class="matrix-legend">
          <span><span class="lg-dot dot-ok"></span>充足</span>
          <span><span class="lg-dot dot-low"></span>低库存</span>
          <span><span class="lg-dot dot-out"></span>售罄</span>
        </div>

        <div class="card-actions">
          <button class="btn btn-primary btn-sm" onclick="save('${p.id}')">保存</button>
          <button class="btn btn-ghost btn-sm" onclick="cancel('${p.id}')">取消</button>
        </div>
      </div>
    </div>
  </div>`;
}

function dotClass(p,qty){
  if(!p.track) return 'dot-ok';
  qty = Number(qty)||0;
  if(qty<=0) return 'dot-out';
  if(qty<=Number(p.threshold||0)) return 'dot-low';
  return 'dot-ok';
}

function matrixHtml(p){
  const sizes = SIZES.filter(s=>p.sizes.includes(s));
  if(sizes.length===0) return `<div class="matrix-empty">请先在左侧选择尺码。</div>`;
  const namedColors = p.colors.filter(c=>c.name && c.name.trim());

  if(namedColors.length===0){
    // size-only fallback
    let cells='';
    sizes.forEach(s=>{
      const qty = (p.stock["__nocolor__"]&&p.stock["__nocolor__"][s])||0;
      cells+=`<div class="cell">
        <div class="cell-size">${s}</div>
        <div class="cell-input-wrap">
          <span class="cell-dot ${dotClass(p,qty)}"></span>
          <input type="number" min="0" value="${qty}" oninput="setStock('${p.id}','__nocolor__','${s}',this.value)">
        </div>
      </div>`;
    });
    return `<div class="matrix-group">
      <div class="matrix-empty" style="margin-bottom:8px">未填写颜色 → 按尺码统计：</div>
      <div class="mg-cells">${cells}</div>
    </div>`;
  }

  let out='';
  namedColors.forEach(c=>{
    let cells='';
    sizes.forEach(s=>{
      const qty = (p.stock[c.name]&&p.stock[c.name][s]!=null)?p.stock[c.name][s]:0;
      cells+=`<div class="cell">
        <div class="cell-size">${s}</div>
        <div class="cell-input-wrap">
          <span class="cell-dot ${dotClass(p,qty)}"></span>
          <input type="number" min="0" value="${qty}" oninput="setStock('${p.id}','${esc(c.name)}','${s}',this.value)">
        </div>
      </div>`;
    });
    out+=`<div class="matrix-group">
      <div class="mg-head"><span class="swatch-dot" style="background:${c.hex}"></span><span class="mg-name">${esc(c.name)}</span></div>
      <div class="mg-cells">${cells}</div>
    </div>`;
  });
  return out;
}

/* ---- interactions ---- */
function find(id){return products.find(p=>p.id===id);}

function toggle(id){
  if(openId===id){ openId=null; }
  else { openId=id; }
  render();
}

function setField(id,k,v){const p=find(id); if(!p)return; p[k]=v;}
function setNum(id,k,v){const p=find(id); if(!p)return; p[k]= v===''?null:Number(v);}

function setColorName(id,i,v){
  const p=find(id); if(!p)return;
  if(!p.colors[i]) p.colors[i]={name:'',hex:'#E9C9CC'};
  p.colors[i].name=v;
  refreshMatrix(id);
}
function setColorHex(id,i,v){
  const p=find(id); if(!p)return;
  if(!p.colors[i]) p.colors[i]={name:'',hex:v};
  p.colors[i].hex=v;
  refreshMatrix(id);
}
function toggleSize(id,s){
  const p=find(id); if(!p)return;
  const idx=p.sizes.indexOf(s);
  if(idx>=0) p.sizes.splice(idx,1);
  else p.sizes.push(s);
  // re-render chips area + matrix
  const ed=document.getElementById('editor-'+id);
  // update chip states
  ed.querySelectorAll('.chip').forEach(ch=>{
    ch.classList.toggle('active', p.sizes.includes(ch.textContent));
  });
  refreshMatrix(id);
}
function setStock(id,color,size,v){
  const p=find(id); if(!p)return;
  if(!p.stock[color]) p.stock[color]={};
  p.stock[color][size]= v===''?0:Number(v);
  // update just this dot live
  refreshMatrix(id);
}

function refreshMatrix(id){
  const p=find(id); if(!p)return;
  const m=document.getElementById('matrix-'+id);
  if(m) m.innerHTML=matrixHtml(p);
}

function save(id){
  // recompute thumb from first color for the row preview
  const p=find(id);
  if(p && p.colors[0] && p.colors[0].hex) p.thumb=p.colors[0].hex;
  showToast('（Demo）已保存');
  openId=null;
  render();
}
function cancel(id){
  openId=null;
  render();
}

function addProduct(){
  newCounter++;
  const id='P-NEW'+newCounter;
  const np={
    id, thumb:'#E9C9CC',
    zh:'', en:'', sku:'',
    cat:'Outerwear', price:null, oldPrice:null, tag:'无', sort:products.length+1,
    active:false, track:true, oversell:false, threshold:5,
    sizes:[], colors:[], img:'', img2:'', descEn:'', descZh:'',
    stock:{}
  };
  products.unshift(np);
  openId=id;
  render();
  // scroll to top of list
  document.getElementById('prod-'+id).scrollIntoView({behavior:'smooth',block:'center'});
}

let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),1900);
}

render();
</script>
</body>
</html>
