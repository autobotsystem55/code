<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Generic meta; JS updates the <title> per product below.
       (For per-product share previews that work in crawlers, generate a
        static page per product or move to a server-rendered setup later.) -->
  <title>Product — Code Official</title>
  <meta name="description" content="Discover this sweet, feminine piece from the Code Official collection.">
  <link rel="canonical" href="https://www.petale-boutique.com/product.html">

  <meta property="og:type" content="product">
  <meta property="og:site_name" content="Code Official">
  <meta property="og:title" content="Code Official">
  <meta property="og:description" content="A sweet, feminine piece from Code Official.">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260621e">

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/pixel.js"></script>
</head>
<body>
  <div id="site-header"></div>

  <main class="wrap">
    <div id="pdp"></div>

    <section class="section" style="padding-top:clamp(50px,7vw,90px)">
      <div class="sec-head reveal"><div><span class="eyebrow" data-i18n="pdp.also">You may also like</span><h2 style="font-size:clamp(28px,4vw,44px)" data-i18n="pdp.complete">Complete the look</h2></div></div>
      <div class="grid grid--3" id="related"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/products.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/store.js?v=20260621"></script>
  <script>
    productsReady.then(function () {
      var id = new URLSearchParams(location.search).get('id');
      var p = findProduct(id);
      var root = document.getElementById('pdp');

      if (!p) {
        root.innerHTML = '<div style="text-align:center;padding:120px 0"><h1 style="font-size:46px;margin-bottom:16px">' + t('pdp.notFound') + '</h1><p class="muted" style="margin-bottom:28px">' + t('pdp.notFoundSub') + '</p><a class="btn" href="shop.html">' + t('pdp.back') + '</a></div>';
        return;
      }

      document.title = pName(p) + ' — ' + (STORE_CONFIG.brand || '');
      var onSale = p.compareAt && p.compareAt > p.price;
      var soldOut = window.productSoldOut && productSoldOut(p);

      var thumbs = p.images.map(function (im, i) {
        return '<button class="' + (i === 0 ? 'is-active' : '') + '" data-thumb="' + i + '" aria-label="' + t('aria.thumb', { n: i + 1 }) + '"><img src="' + imgUrl(im, 200) + '" alt="" onerror="this.onerror=null;this.src=\'images/placeholder.svg\'"></button>';
      }).join('');

      var swatches = p.colors.map(function (c, i) {
        return '<button class="swatch ' + (i === 0 ? 'is-active' : '') + '" style="background:' + c.hex + '" data-color="' + c.name + '" title="' + c.name + '" aria-label="' + c.name + '"></button>';
      }).join('');

      var firstColor = (p.colors[0] && p.colors[0].name) || null;
      var sizes = p.sizes.map(function (s) {
        var so = window.sizeSoldOut && sizeSoldOut(p, s, firstColor);
        return '<button class="size' + (so ? ' size--out' : '') + '" data-size="' + s + '"' + (so ? ' disabled' : '') + '>' + s + '</button>';
      }).join('');

      var price = onSale
        ? '<span class="now sale">' + money(p.price) + '</span> <span class="was">' + money(p.compareAt) + '</span>'
        : '<span class="now">' + money(p.price) + '</span>';

      root.innerHTML =
        '<div class="page-head" style="text-align:left;padding:26px 0 18px"><a class="link-underline muted" href="shop.html?category=' + encodeURIComponent(p.category) + '">← ' + pCat(p) + '</a></div>' +
        '<div class="pdp">' +
          '<div class="gallery">' +
            '<div class="gallery__thumbs">' + thumbs + '</div>' +
            '<div class="gallery__main"><img id="mainImg" src="' + imgUrl(p.images[0], 900) + '" alt="' + pName(p) + '" onerror="this.onerror=null;this.src=\'images/placeholder.svg\'"></div>' +
          '</div>' +
          '<div class="pdp__info">' +
            '<div class="pdp__cat">' + pCat(p) + '</div>' +
            '<h1 class="pdp__title">' + pName(p) + '</h1>' +
            '<div class="pdp__price">' + price + '</div>' +
            '<p class="pdp__desc">' + pDesc(p) + '</p>' +
            '<div class="opt"><div class="opt__label">' + t('pdp.colour') + ' <span id="colorName">' + p.colors[0].name + '</span></div><div class="swatch-row">' + swatches + '</div></div>' +
            '<div class="opt"><div class="opt__label">' + t('pdp.size') + '</div><div class="size-row" id="sizeRow">' + sizes + '</div></div>' +
            '<div class="pdp__add">' +
              '<div class="stepper" id="qtyStep"><button data-q="-1" aria-label="' + t('aria.dec') + '">–</button><span id="qty">1</span><button data-q="1" aria-label="' + t('aria.inc') + '">+</button></div>' +
              '<button class="btn btn--block" id="addBtn"' + (soldOut ? ' disabled' : '') + '>' + (soldOut ? t('badge.soldOut') : t('pdp.addToBag', { x: money(p.price) })) + '</button>' +
            '</div>' +
            sizeChart(p) +
            '<div class="pdp__acc">' +
              acc(t('pdp.details'), t('pdp.detailsBody')) +
              acc(t('pdp.shipping'), t('pdp.shippingBody', { x: money(STORE_CONFIG.freeShippingThreshold) })) +
              acc(t('pdp.care'), t('pdp.careBody')) +
            '</div>' +
          '</div>' +
        '</div>';

      // ---- fire Pixel ViewContent ----
      if (window.Pixel) Pixel.viewContent(p);

      // ---- state ----
      var sel = { color: p.colors[0].name, size: p.sizes.length === 1 ? p.sizes[0] : null, qty: 1 };
      if (p.sizes.length === 1) root.querySelector('.size').classList.add('is-active');


      // ---- gallery thumbs ----
      root.querySelectorAll('[data-thumb]').forEach(function (b) {
        b.addEventListener('click', function () {
          var i = +b.getAttribute('data-thumb');
          document.getElementById('mainImg').src = imgUrl(p.images[i], 900);
          root.querySelectorAll('[data-thumb]').forEach(function (x) { x.classList.toggle('is-active', x === b); });
        });
      });
      // ---- colour ----
      function paintSizes(color) {
        root.querySelectorAll('[data-size]').forEach(function (b) {
          var sz = b.getAttribute('data-size');
          var so = window.sizeSoldOut && sizeSoldOut(p, sz, color);
          b.classList.toggle('size--out', !!so); b.disabled = !!so;
          if (so && sel.size === sz) { sel.size = null; b.classList.remove('is-active'); }
        });
      }
      root.querySelectorAll('[data-color]').forEach(function (b) {
        b.addEventListener('click', function () {
          sel.color = b.getAttribute('data-color');
          document.getElementById('colorName').textContent = sel.color;
          root.querySelectorAll('[data-color]').forEach(function (x) { x.classList.toggle('is-active', x === b); });
          paintSizes(sel.color);
        });
      });
      // ---- size ----
      root.querySelectorAll('[data-size]').forEach(function (b) {
        b.addEventListener('click', function () {
          sel.size = b.getAttribute('data-size');
          root.querySelectorAll('[data-size]').forEach(function (x) { x.classList.toggle('is-active', x === b); });
          paintCurrentSizeRow();
        });
      });
      // ---- qty ----
      root.querySelector('#qtyStep').addEventListener('click', function (e) {
        var d = e.target.getAttribute('data-q'); if (!d) return;
        sel.qty = Math.max(1, sel.qty + parseInt(d, 10));
        document.getElementById('qty').textContent = sel.qty;
      });
      // ---- accordions ----
      root.querySelectorAll('.acc__q').forEach(function (q) {
        q.addEventListener('click', function () { q.parentElement.classList.toggle('open'); });
      });
      // ---- add to bag ----
      document.getElementById('addBtn').addEventListener('click', function () {
        if (!sel.size) { toast(t('pdp.selectSize')); document.getElementById('sizeRow').animate(
          [{ transform: 'translateX(0)' }, { transform: 'translateX(-6px)' }, { transform: 'translateX(6px)' }, { transform: 'translateX(0)' }], { duration: 300 }); return; }
        Store.addToCart(p.id, sel.size, sel.color, sel.qty);
      });

      function acc(q, a) {
        return '<div class="acc"><button class="acc__q">' + q + '<span>+</span></button><div class="acc__a"><p>' + a + '</p></div></div>';
      }

      function sizeChart(prod) {
        // per-product overrides global; source=false means explicitly disabled for this product
        var sc = (prod && prod.sizeChart && typeof prod.sizeChart === 'object')
          ? prod.sizeChart
          : ((STORE_CONFIG && STORE_CONFIG.sizeChart) || null);
        if (!sc || sc.enabled === false) return '';
        var cols = Array.isArray(sc.columns) ? sc.columns : [];
        var rows = Array.isArray(sc.rows) ? sc.rows : [];
        if (!cols.length || !rows.length) return '';
        // units
        var hasCm = sc.cm !== false;     // default on
        var hasIn = !!sc.inch;
        var unit = hasCm ? 'cm' : (hasIn ? 'inch' : 'cm');
        function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
        function unitTabs() {
          if (!(hasCm && hasIn)) return '';
          return '<div class="sc-units" id="scUnits">'+
            '<button type="button" data-u="cm" class="' + (unit==='cm'?'is-active':'') + '">cm</button>'+
            '<button type="button" data-u="inch" class="' + (unit==='inch'?'is-active':'') + '">inch</button>'+
          '</div>';
        }
        function renderTable(u) {
          var head = '<thead><tr><th>' + t('pdp.size') + '</th>' +
            cols.map(function(c){ return '<th>' + esc(c.label || '') + '</th>'; }).join('') + '</tr></thead>';
          var body = '<tbody>' + rows.map(function(r){
            return '<tr data-sz="' + esc(r.size||'') + '"><td>' + esc(r.size||'') + '</td>' +
              cols.map(function(c){
                var key = (c.key || c.label || '');
                var v = ((r[u] && r[u][key]) != null) ? r[u][key] : (r[key] != null ? r[key] : '');
                return '<td>' + esc(v) + '</td>';
              }).join('') + '</tr>';
          }).join('') + '</tbody>';
          return '<table class="sc-table" id="scTable">' + head + body + '</table>';
        }
        var title = sc.title || t('pdp.sizeChartTitle');
        var note = sc.note || '';
        return '<section class="pdp__sizechart" data-current-unit="' + unit + '">' +
          '<div class="sc-head">' +
            '<div class="sc-ti"><span class="sc-ic">⌶</span> ' + esc(title) + '</div>' +
            unitTabs() +
          '</div>' +
          '<div id="scTableWrap">' + renderTable(unit) + '</div>' +
          (note ? '<div class="sc-note"><span class="sc-star">★</span> ' + esc(note) + '</div>' : '') +
        '</section>';
      }

      function paintCurrentSizeRow() {
        var rows = document.querySelectorAll('.pdp__sizechart .sc-table tbody tr[data-sz]');
        rows.forEach(function(tr){
          tr.classList.toggle('sc-current', !!sel.size && tr.getAttribute('data-sz') === sel.size);
        });
      }

      // wire unit toggle (re-renders the table when switched)
      (function wireSizeChart(){
        var sc = (prod && prod.sizeChart && typeof prod.sizeChart === 'object')
          ? prod.sizeChart
          : ((STORE_CONFIG && STORE_CONFIG.sizeChart) || null);
        if (!sc) return;
        var card = root.querySelector('.pdp__sizechart');
        if (!card) return;
        var tabs = card.querySelector('#scUnits');
        if (tabs) {
          tabs.addEventListener('click', function(e){
            var b = e.target.closest('[data-u]'); if (!b) return;
            var u = b.getAttribute('data-u');
            tabs.querySelectorAll('button').forEach(function(x){ x.classList.toggle('is-active', x===b); });
            card.setAttribute('data-current-unit', u);
            // re-render table cells
            var rows = (Array.isArray(sc.rows)?sc.rows:[]);
            var cols = (Array.isArray(sc.columns)?sc.columns:[]);
            card.querySelectorAll('.sc-table tbody tr[data-sz]').forEach(function(tr,i){
              var r = rows[i] || {};
              tr.querySelectorAll('td').forEach(function(td, ci){
                if (ci === 0) return; // size label column
                var c = cols[ci-1] || {};
                var key = (c.key || c.label || '');
                var v = ((r[u] && r[u][key]) != null) ? r[u][key] : (r[key] != null ? r[key] : '');
                td.textContent = (v == null ? '' : String(v));
              });
            });
            paintCurrentSizeRow();
          });
        }
        paintCurrentSizeRow();
      })();

      // hook into size selection to highlight matching row
      root.querySelectorAll('[data-size]').forEach(function (b) {
        b.addEventListener('click', paintCurrentSizeRow);
      });

      // ---- related ----
      var related = PRODUCTS.filter(function (x) { return x.category === p.category && x.id !== p.id; });
      if (related.length < 3) related = related.concat(PRODUCTS.filter(function (x) { return x.id !== p.id && related.indexOf(x) === -1; }));
      renderProducts(related.slice(0, 3), '#related');
    });
  </script>
</body>
</html>
