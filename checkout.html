<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Code Official</title>
  <meta name="description" content="Secure checkout.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://www.petale-boutique.com/checkout.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/pixel.js"></script>
</head>
<body>
  <div id="site-header"></div>

  <main class="wrap">
    <div class="page-head" style="padding-bottom:10px"><span class="eyebrow" data-i18n="co.almost">Almost yours</span><h1 data-i18n="co.title">Checkout</h1></div>

    <div id="coRoot"></div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/products.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/store.js"></script>
  <script>
    productsReady.then(function () {
      var lines = cartLines();
      var root = document.getElementById('coRoot');

      if (!lines.length) {
        root.innerHTML = '<div style="text-align:center;padding:90px 0 130px"><p class="muted" style="margin-bottom:24px">' + t('co.empty') + '</p><a class="btn" href="shop.html">' + t('co.continue') + '</a></div>';
        return;
      }

      var subtotal = cartSubtotal();
      var shipping = subtotal >= (STORE_CONFIG.freeShippingThreshold || 0) ? 0 : (STORE_CONFIG.shippingFlat || 0);
      var discount = 0, discountCode = '', freeShip = false;
      var total = subtotal + shipping;

      var payLink = (STORE_CONFIG.paymentLink || '').trim();
      var demo = !payLink;

      // ---- fire Pixel InitiateCheckout ----
      if (window.Pixel) Pixel.initiateCheckout(lines.map(function (l) { return { id: l.id, qty: l.qty, price: l.price }; }), subtotal);

      function summaryHTML(perLine) {
        perLine = perLine || {};
        return lines.map(function (l) {
          var a = perLine[l.key];
          var badge = a ? '<span style="display:inline-block;margin-top:4px;font-size:11px;color:#2F7D4F;background:#E3F1E8;border-radius:30px;padding:1px 9px;font-weight:600">' + (a.n > 1 ? (a.n + '件 ') : '') + a.label + '</span>' : '';
          return '<div class="summary__line">' +
            '<div class="li-img"><img src="' + imgUrl(l.image, 160) + '" alt="" onerror="this.onerror=null;this.src=\'images/placeholder.svg\'"><b>' + l.qty + '</b></div>' +
            '<div><div class="li-name">' + l.name + '</div><div class="li-meta">' + [l.color, l.size].filter(Boolean).join(' · ') + '</div>' + badge + '</div>' +
            '<div class="li-price">' + money(l.price * l.qty) + '</div>' +
          '</div>';
        }).join('');
      }
      var summaryLines = summaryHTML(null);

      var paymentFieldset = demo
        ? '<fieldset><legend>' + t('co.payment') + ' <small>' + t('co.demo') + '</small></legend>' +
            '<div class="field"><label>' + t('co.card') + '</label><input name="card" inputmode="numeric" placeholder="4242 4242 4242 4242" required></div>' +
            '<div class="row2"><div class="field"><label>' + t('co.exp') + '</label><input name="exp" placeholder="04/28" required></div>' +
            '<div class="field"><label>' + t('co.cvc') + '</label><input name="cvc" inputmode="numeric" placeholder="123" required></div></div>' +
          '</fieldset>'
        : '';

      var btnLabel = demo ? t('co.place', { x: money(total) }) : t('co.proceed', { x: money(total) });
      var secureNote = demo ? t('co.secureDemo') : t('co.secureReal');

      root.innerHTML =
        '<div class="checkout">' +
          '<form class="co-form" id="coForm" novalidate>' +
            '<fieldset><legend>' + t('co.contact') + '</legend>' +
              '<div class="field"><label>' + t('co.email') + '</label><input type="email" name="email" placeholder="you@email.com" required></div>' +
            '</fieldset>' +
            '<fieldset><legend>' + t('co.shipping') + '</legend>' +
              '<div class="row2"><div class="field"><label>' + t('co.first') + '</label><input name="first" required></div>' +
              '<div class="field"><label>' + t('co.last') + '</label><input name="last" required></div></div>' +
              '<div class="field"><label>' + t('co.address') + '</label><input name="address" required></div>' +
              '<div class="field"><label>' + t('co.apt') + '</label><input name="apt"></div>' +
              '<div class="row2"><div class="field"><label>' + t('co.city') + '</label><input name="city" required></div>' +
              '<div class="field"><label>' + t('co.zip') + '</label><input name="zip" required></div></div>' +
              '<div class="row2"><div class="field"><label>' + t('co.country') + '</label><select name="country" required>' +
                '<option value="">' + t('co.select') + '</option><option>United States</option><option>United Kingdom</option><option>Canada</option><option>Australia</option><option>Hong Kong</option><option>Singapore</option><option>China</option><option>Other</option>' +
              '</select></div>' +
              '<div class="field"><label>' + t('co.phone') + '</label><input name="phone" required></div></div>' +
            '</fieldset>' +
            paymentFieldset +
            '<button type="submit" class="btn btn--block" id="placeBtn">' + btnLabel + '</button>' +
            '<div class="co-secure"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg> ' + secureNote + '</div>' +
          '</form>' +

          '<aside class="summary">' +
            '<h3>' + t('co.summary') + '</h3>' +
            '<div id="sumLines">' + summaryLines + '</div>' +
            '<p id="promoHint" style="display:none;font-size:12.5px;line-height:1.5;margin:10px 0 0;color:#6A1A32;background:#FBF0DA;border-radius:8px;padding:9px 12px"></p>' +
            '<div style="display:flex;gap:8px;margin:16px 0 2px">' +
              '<input id="discInput" placeholder="' + t('co.discPh') + '" style="flex:1;padding:11px 13px;background:var(--white);border:1px solid var(--pink-border);border-radius:var(--radius);outline:none;text-transform:uppercase">' +
              '<button type="button" class="btn btn--ghost" id="discBtn" style="padding:11px 18px">' + t('co.apply') + '</button>' +
            '</div>' +
            '<p id="discMsg" class="muted" style="font-size:12px;margin:4px 0 0;min-height:16px"></p>' +
            '<div class="totals">' +
              '<div><span>' + t('co.subtotal') + '</span><span>' + money(subtotal) + '</span></div>' +
              '<div id="discRow" style="display:none"><span>' + t('co.discount') + ' <b id="discTag" style="color:var(--wine)"></b></span><span id="discAmt"></span></div>' +
              '<div><span>' + t('co.shippingLbl') + '</span><span id="shipVal">' + (shipping === 0 ? t('co.free') : money(shipping)) + '</span></div>' +
              '<div class="grand"><span>' + t('co.total') + '</span><b id="grandTotal">' + money(total) + '</b></div>' +
            '</div>' +
          '</aside>' +
        '</div>';

      // ---- discount: flat codes + cart-aware promos (买一送一 / 第N件半价) ----
      var discountLabel = '';
      function renderTotals() {
        var effShip = freeShip ? 0 : shipping;
        total = Math.max(0, subtotal - discount) + effShip;
        var sv = document.getElementById('shipVal');
        if (sv) sv.textContent = (effShip === 0 ? t('co.free') : money(effShip));
        var row = document.getElementById('discRow');
        if (discount > 0 || (freeShip && shipping > 0)) {
          row.style.display = '';
          document.getElementById('discTag').textContent = discountLabel || discountCode;
          document.getElementById('discAmt').textContent = '−' + money(discount > 0 ? discount : shipping);
        } else { row.style.display = 'none'; }
        document.getElementById('grandTotal').textContent = money(total);
        var pb = document.getElementById('placeBtn');
        if (pb) pb.textContent = demo ? t('co.place', { x: money(total) }) : t('co.proceed', { x: money(total) });
      }
      function renderSummary(perLine) { var b = document.getElementById('sumLines'); if (b) b.innerHTML = summaryHTML(perLine || {}); }
      function showHint(nudge) {
        var h = document.getElementById('promoHint'); if (!h) return;
        if (nudge && nudge.need > 0) { h.style.display = ''; h.textContent = t(nudge.more ? 'co.promoMore' : 'co.promoNudge', { n: nudge.need, name: nudge.label }); }
        else { h.style.display = 'none'; h.textContent = ''; }
      }
      // --- cart-level discount math (computed here because we need the line items) ---
      function dInScope(promo, line) {
        if (promo.scope_type === 'all' || !promo.scope_type) return true;
        var p = window.findProduct ? window.findProduct(line.id) : null; if (!p) return false;
        if (promo.scope_type === 'category') return (promo.scope_ids || []).indexOf(p.category) >= 0;
        if (promo.scope_type === 'product') return (promo.scope_ids || []).indexOf(line.id) >= 0;
        return false;
      }
      function dUnits(promo) {
        var units = [];
        lines.forEach(function (l) {
          if (l.b) return;                                            // bundles excluded
          if (window.findProduct && !window.findProduct(l.id)) return; // removed product excluded
          if (!dInScope(promo, l)) return;
          for (var k = 0; k < (l.qty || 0); k++) units.push({ key: l.key, price: l.price || 0 });
        });
        units.sort(function (a, b) { return a.price - b.price; });     // cheapest first
        return units;
      }
      function mark(res, key, label) { var m = res.perLine[key] || { n: 0, label: label }; m.n++; m.label = label; res.perLine[key] = m; }
      function pctLabel(off) { return off === 50 ? '半价' : ((Math.round((100 - off) / 10 * 10) / 10) + ' 折'); }
      function computeCartDiscount(promo) {
        var cfg = promo.config || {}, units = dUnits(promo), n = units.length, i;
        var res = { amount: 0, perLine: {}, eligible: n, need: 0 };
        if (promo.type === 'bxgy') {
          var buy = Math.max(1, parseInt(cfg.buy, 10) || 1), get = Math.max(1, parseInt(cfg.get, 10) || 1);
          var fpct = (cfg.free_pct != null && +cfg.free_pct > 0) ? +cfg.free_pct : 100;
          var gsize = buy + get, free = Math.floor(n / gsize) * get;
          var cap = cfg.max_per_order ? parseInt(cfg.max_per_order, 10) : Infinity; if (free > cap) free = cap;
          for (i = 0; i < free; i++) { res.amount += units[i].price * fpct / 100; mark(res, units[i].key, fpct >= 100 ? '免费' : '赠品价'); }
          res.need = n > 0 ? ((gsize - n % gsize) % gsize) : 0;
        } else if (promo.type === 'nth') {
          var nth = Math.max(2, parseInt(cfg.nth, 10) || 2);
          var opct = (cfg.off_pct != null && +cfg.off_pct > 0) ? +cfg.off_pct : 50;
          var rep = cfg.repeating !== false;
          var g = Math.floor(n / nth); if (!rep) g = Math.min(g, 1);
          var cap2 = cfg.max_per_order ? parseInt(cfg.max_per_order, 10) : Infinity; if (g > cap2) g = cap2;
          for (i = 0; i < g; i++) { res.amount += units[i].price * opct / 100; mark(res, units[i].key, pctLabel(opct)); }
          res.need = (!rep && n >= nth) ? 0 : (n > 0 ? ((nth - n % nth) % nth) : 0);
        }
        res.amount = Math.round(res.amount * 100) / 100;
        return res;
      }
      function applyPromo(promo, res) {
        discount = res.amount; discountCode = promo.code; discountLabel = promo.name || promo.code; freeShip = false;
        renderSummary(res.perLine); renderTotals();
        if (res.need > 0) showHint({ need: res.need, label: promo.name || promo.code, more: true }); else showHint(null);
      }
      // auto-apply the best cart-level promo on load (no code needed)
      function applyAuto() {
        if (!(window.DB && DB.autoDiscounts)) return;
        DB.autoDiscounts(subtotal).then(function (r) {
          var promos = (r && r.data) || []; if (!promos.length) return;
          var bestP = null, bestR = null, nudge = null;
          promos.forEach(function (p) {
            var res = computeCartDiscount(p);
            if (res.amount > 0 && (!bestR || res.amount > bestR.amount)) { bestP = p; bestR = res; }
            if (res.eligible > 0 && res.need > 0 && (!nudge || res.need < nudge.need)) nudge = { need: res.need, label: p.name || p.code };
          });
          if (bestR) applyPromo(bestP, bestR);
          else if (nudge) showHint(nudge);
        }, function () {});
      }
      document.getElementById('discBtn').addEventListener('click', function () {
        var code = document.getElementById('discInput').value.trim();
        var msg = document.getElementById('discMsg');
        if (!code) return;
        if (!(window.DB && DB.validateDiscount)) { msg.style.color = 'var(--muted)'; msg.textContent = t('co.discNa'); return; }
        var btn = this; btn.disabled = true;
        DB.validateDiscount(code, subtotal).then(function (r) {
          btn.disabled = false; var d = r && r.data;
          if (!d) { msg.style.color = 'var(--wine)'; msg.textContent = t('co.discBad'); return; }
          if (d.type === 'bxgy' || d.type === 'nth') {
            var res = computeCartDiscount(d);
            if (res.amount > 0) { applyPromo(d, res); msg.style.color = 'var(--green, #2F7D4F)'; msg.textContent = t('co.discOk', { x: money(res.amount) }); }
            else { msg.style.color = 'var(--wine)'; msg.textContent = t('co.discNoQual'); }
            return;
          }
          if (d.type === 'free_shipping' && shipping <= 0) { msg.style.color = 'var(--muted)'; msg.textContent = t('co.discShipNone'); return; }
          // flat / free-shipping codes override any auto promo (one discount per order)
          renderSummary({}); showHint(null); discountCode = d.code; discountLabel = d.code;
          if (d.type === 'free_shipping') { freeShip = true; discount = 0; msg.style.color = 'var(--green, #2F7D4F)'; msg.textContent = t('co.discShip'); }
          else { freeShip = false; discount = Math.max(0, Math.min(subtotal, Number(d.discount) || 0)); msg.style.color = 'var(--green, #2F7D4F)'; msg.textContent = t('co.discOk', { x: money(discount) }); }
          renderTotals();
        }, function () { btn.disabled = false; msg.style.color = 'var(--wine)'; msg.textContent = t('co.discBad'); });
      });
      applyAuto();

      // ---- submit ----
      document.getElementById('coForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var form = e.target;
        var ok = true;
        form.querySelectorAll('[required]').forEach(function (inp) {
          var bad = !inp.value.trim() || (inp.type === 'email' && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(inp.value));
          inp.classList.toggle('err', bad);
          if (bad) ok = false;
        });
        if (!ok) { toast(t('co.fill')); return; }

        var orderId = 'ME' + String(Date.now()).slice(-7);
        var f = form;
        var effShip = freeShip ? 0 : shipping;
        var itemRows = lines.map(function (l) {
          return l.b
            ? { b: 1, id: l.id, name: l.name, qty: l.qty, price: l.price, items: l.items }
            : { id: l.id, name: l.name, qty: l.qty, price: l.price, size: l.size, color: l.color };
        });
        var customer = {
          first: f.first.value, last: f.last.value, address: f.address.value, apt: f.apt.value,
          city: f.city.value, zip: f.zip.value, country: f.country.value, phone: f.phone.value
        };
        localStorage.setItem('eclat_last_order', JSON.stringify({
          orderId: orderId, email: f.email.value,
          items: itemRows, subtotal: subtotal, shipping: effShip, total: total,
          discount_code: discountCode || null, discount_amount: discount || 0
        }));

        // DEMO → confirmation page. REAL → redirect to your Stripe/PayPal link.
        function go() { location.href = demo ? 'success.html' : payLink; }

        // Save the order to Supabase (attach the logged-in user if any).
        // Never block checkout on a DB hiccup.
        if (window.DB && DB.configured && window.Auth) {
          var btn = document.getElementById('placeBtn'); if (btn) btn.disabled = true;
          var orderRow = {
            order_number: orderId, email: f.email.value, customer: customer,
            items: itemRows, subtotal: subtotal, shipping: effShip, total: total,
            discount_code: discountCode || null, discount_amount: discount || 0,
            currency: (STORE_CONFIG.currency || 'MYR')
          };
          Auth.getUser().then(function (res) {
            var u = res && res.data && res.data.user; if (u) orderRow.user_id = u.id;
            return DB.createOrder(orderRow);
          }).then(function (r) {
            if (r && r.error) console.warn('[Supabase] order save:', r.error.message);
            else {
              if (discountCode && DB.redeemDiscount) { try { DB.redeemDiscount(discountCode); } catch (e) {} }
              if (DB.decrementStock) { try {
                var stockRows = [];
                lines.forEach(function (l) {
                  if (l.b) { (l.items || []).forEach(function (it) { stockRows.push({ id: it.id, size: it.size, qty: (it.qty || 1) * l.qty }); }); }
                  else { stockRows.push({ id: l.id, size: l.size, qty: l.qty }); }
                });
                DB.decrementStock(stockRows);
              } catch (e) {} }
            }
          }).then(go, go);
        } else { go(); }
      });
    });
  </script>
</body>
</html>
