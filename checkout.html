<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Code Official</title>
  <meta name="description" content="Secure checkout.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://www.petale-boutique.com/checkout.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css?v=20260622">
  <style>
    @keyframes co-flash{0%{background:#FFF6D9;border-color:#E7C66A}100%{background:var(--white,#fff);border-color:var(--pink-border,#DAB0B7)}}
    input.co-autofill{animation:co-flash 1.2s ease}
    .co-signup-row{display:flex;align-items:flex-start;gap:10px;margin:12px 0 0;padding:11px 12px;border:1px dashed var(--pink-border,#DAB0B7);border-radius:9px;background:var(--pink-soft,#F6E4E6);cursor:pointer;user-select:none}
    .co-signup-row input[type="checkbox"]{width:17px;height:17px;flex:0 0 auto;margin-top:2px;accent-color:var(--wine,#82213E);cursor:pointer}
    .co-signup-row .co-su-t b{display:block;font-size:13px;color:var(--wine-deep,#6A1A32)}
    .co-signup-row .co-su-t span{display:block;font-size:11.5px;color:var(--muted,#6F635C);margin-top:1px}
    .co-signup-pw{margin-top:10px}
    .co-signup-pw .pw-row{display:flex;gap:8px}
    .co-signup-pw .pw-row input{flex:1}
    .co-auth-err{font-size:12px;color:var(--wine,#82213E);margin:5px 0 0}
    .co-pw-field{margin-top:10px}
    .co-signup-ok{background:#E3F1E8;border:1px solid #BFE0CC;border-radius:9px;padding:10px 13px;font-size:13px;color:#2F7D4F;font-weight:600;margin-top:10px;display:flex;align-items:center;gap:8px}
    .co-signup-ok .co-su-tick{width:18px;height:18px;border-radius:50%;background:#2F7D4F;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex:0 0 auto}
    .co-signout-btn{margin-left:auto;padding:4px 10px;font-size:11.5px}
    .co-auth-toggle{font-size:12px;color:var(--muted,#6F635C);margin:8px 0 0;text-align:right}
    .co-auth-toggle a{color:var(--wine,#82213E);font-weight:600;text-decoration:none}
    .co-auth-toggle a:hover{text-decoration:underline}
    .co-news-row{display:flex;align-items:center;gap:9px;margin:13px 0 0;font-size:13px;color:var(--ink,#1C1C1C);cursor:pointer;user-select:none}
    .co-news-row input[type="checkbox"]{width:16px;height:16px;flex:0 0 auto;accent-color:var(--wine,#82213E);cursor:pointer}
  </style>

  <script src="js/config.js"></script>
  <script src="js/i18n.js?v=2"></script>
  <script src="js/pixel.js"></script>
</head>
<body>
  <div id="site-header"></div>

  <main class="wrap">
    <div class="page-head" style="padding-bottom:10px"><span class="eyebrow" data-i18n="co.almost">Almost yours</span><h1 data-i18n="co.title">Checkout</h1></div>

    <div id="coRoot"></div>
  </main>

  <div id="site-footer"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/products.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/store.js?v=20260622"></script>
  <script>
    productsReady.then(function () {
      var lines = cartLines();
      var root = document.getElementById('coRoot');

      if (!lines.length) {
        root.innerHTML = '<div style="text-align:center;padding:90px 0 130px"><p class="muted" style="margin-bottom:24px">' + t('co.empty') + '</p><a class="btn" href="shop.html">' + t('co.continue') + '</a></div>';
        return;
      }

      var subtotal = cartSubtotal();

      // ---- zone-based shipping setup ----
      var MY_STATES=[['johor','Johor','柔佛','wm'],['kedah','Kedah','吉打','wm'],['kelantan','Kelantan','吉兰丹','wm'],['kuala-lumpur','Kuala Lumpur','吉隆坡','wm'],['labuan','Labuan','纳闽','em'],['melaka','Melaka','马六甲','wm'],['negeri-sembilan','Negeri Sembilan','森美兰','wm'],['pahang','Pahang','彭亨','wm'],['penang','Penang','槟城','wm'],['perak','Perak','霹雳','wm'],['perlis','Perlis','玻璃市','wm'],['putrajaya','Putrajaya','布城','wm'],['sabah','Sabah','沙巴','em'],['sarawak','Sarawak','砂拉越','em'],['selangor','Selangor','雪兰莪','wm'],['terengganu','Terengganu','登嘉楼','wm']];
      var shippingZones=(STORE_CONFIG.shippingZones||[]).filter(function(z){return z.enabled!==false;});
      var useZones=shippingZones.length>0;
      var selectedZone=null, isCOD=false;
      var hasCODZones=shippingZones.some(function(z){return z.allowCOD;});
      function _esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
      function findZoneForValue(val){
        if(!val)return null;
        if(val==='sg'){for(var _i=0;_i<shippingZones.length;_i++){if(shippingZones[_i].type==='sg')return shippingZones[_i];}return null;}
        for(var _j=0;_j<shippingZones.length;_j++){var _z=shippingZones[_j];if(_z.type==='my'&&(_z.states||[]).indexOf(val)>=0)return _z;if(_z.type==='custom'&&_z.id===val)return _z;}
        return null;
      }
      function calcZoneShipping(zone){
        if(!zone)return useZones?0:(subtotal>=(STORE_CONFIG.freeShippingThreshold||0)?0:(STORE_CONFIG.shippingFlat||0));
        var _r=Number(zone.rate)||0,_f=Number(zone.freeAt)||0;
        return(_f>0&&subtotal>=_f)?0:_r;
      }
      function buildZoneOptions(codMode){
        var isZh=window.LANG==='zh';
        var _h='<option value="">'+_esc(isZh?'请选择州属 / 地区…':'Select state / region…')+'</option>';
        shippingZones.forEach(function(zone){
          if(codMode&&!zone.allowCOD)return;
          var _lbl=isZh?zone.name:(zone.english||zone.name);
          if(zone.type==='my'){
            _h+='<optgroup label="'+_esc(_lbl)+'">';
            (zone.states||[]).forEach(function(stKey){
              var hit=null;for(var _k=0;_k<MY_STATES.length;_k++){if(MY_STATES[_k][0]===stKey){hit=MY_STATES[_k];break;}}
              if(!hit)return;
              _h+='<option value="'+stKey+'">'+(isZh?(hit[2]+' '+hit[1]):(hit[1]+' '+hit[2]))+'</option>';
            });
            _h+='</optgroup>';
          }else if(zone.type==='sg'){
            _h+='<optgroup label="'+_esc(_lbl)+'"><option value="sg">'+_esc(_lbl)+'</option></optgroup>';
          }else{
            _h+='<option value="'+_esc(zone.id)+'">'+_esc(_lbl)+'</option>';
          }
        });
        return _h;
      }
      function buildCountryOptions(){
        var isZh=window.LANG==='zh';
        var o='<option value="">'+t('co.select')+'</option>';
        o+='<option value="United States">United States</option>';
        o+='<option value="United Kingdom">United Kingdom</option>';
        o+='<option value="Canada">Canada</option>';
        o+='<option value="Australia">Australia</option>';
        o+='<option value="Hong Kong">Hong Kong</option>';
        o+='<option value="Singapore">Singapore</option>';
        o+='<option value="China">China</option>';
        o+='<option value="Other">'+(isZh?'其他':'Other')+'</option>';
        return o;
      }
      function buildCombinedOptions(codMode){
        var isZh=window.LANG==='zh';
        var _h='<option value="">'+_esc(isZh?'请选择…':'Select…')+'</option>';
        shippingZones.forEach(function(zone){
          if(codMode&&!zone.allowCOD)return;
          var _lbl=isZh?zone.name:(zone.english||zone.name);
          if(zone.type==='my'){
            _h+='<optgroup label="'+_esc(_lbl)+'">';
            (zone.states||[]).forEach(function(stKey){
              var hit=null;for(var _k=0;_k<MY_STATES.length;_k++){if(MY_STATES[_k][0]===stKey){hit=MY_STATES[_k];break;}}
              if(!hit)return;
              _h+='<option value="'+stKey+'">'+(isZh?(hit[2]+' '+hit[1]):(hit[1]+' '+hit[2]))+'</option>';
            });
            _h+='</optgroup>';
          }else if(zone.type==='sg'){
            _h+='<optgroup label="'+_esc(_lbl)+'"><option value="sg">'+_esc(_lbl)+'</option></optgroup>';
          }else{
            _h+='<option value="'+_esc(zone.id)+'">'+_esc(_lbl)+'</option>';
          }
        });
        return _h;
      }
      function countryFromZone(val){
        if(!val)return'';
        if(val==='sg')return'Singapore';
        for(var _i=0;_i<MY_STATES.length;_i++){if(MY_STATES[_i][0]===val)return'Malaysia';}
        for(var _j=0;_j<shippingZones.length;_j++){var _z=shippingZones[_j];if(_z.type==='custom'&&_z.id===val)return _z.english||_z.name;}
        return val;
      }

      var shipping = useZones ? 0 : (subtotal >= (STORE_CONFIG.freeShippingThreshold || 0) ? 0 : (STORE_CONFIG.shippingFlat || 0));
      var discount = 0, discountCode = '', freeShip = false;
      var total = subtotal + shipping;

      var payMode = (STORE_CONFIG.paymentMode || '').toLowerCase();
      var payLink = (STORE_CONFIG.paymentLink || '').trim();
      var useBillplz = payMode === 'billplz' && !!(window.DB && DB.configured);
      var demo = !useBillplz && !payLink;

      // ---- fire Pixel InitiateCheckout ----
      if (window.Pixel) Pixel.initiateCheckout(lines.map(function (l) { return { id: l.id, qty: l.qty, price: l.price }; }), subtotal);

      function summaryHTML(perLine) {
        perLine = perLine || {};
        return lines.map(function (l) {
          var a = perLine[l.key];
          var badge = a ? '<span style="display:inline-block;margin-top:4px;font-size:11px;color:#2F7D4F;background:#E3F1E8;border-radius:30px;padding:1px 9px;font-weight:600">' + (a.n > 1 ? (a.n + '件 ') : '') + a.label + '</span>' : '';
          return '<div class="summary__line">' +
            '<div class="li-img"><img src="' + imgUrl(l.image, 160) + '" alt="" onerror="this.onerror=null;this.src=\'images/placeholder.svg\'"><b>' + l.qty + '</b></div>' +
            '<div><div class="li-name">' + l.name + '</div><div class="li-meta">' + [l.color, l.size].filter(Boolean).join(' · ') + '</div>' + badge + '</div>' +
            '<div class="li-price">' + money(l.price * l.qty) + '</div>' +
          '</div>';
        }).join('');
      }
      var summaryLines = summaryHTML(null);

      var payMethodFieldset = (useZones && hasCODZones)
        ? '<fieldset id="coPayMethodFs"><legend>' + t('co.payMethod') + '</legend>' +
            '<div style="display:flex;gap:20px;padding:2px 0">' +
              '<label style="display:flex;align-items:center;gap:8px;cursor:pointer">' +
                '<input type="radio" name="payMethodCo" value="online" checked style="accent-color:var(--wine,#82213E)"> ' + t('co.payOnline') +
              '</label>' +
              '<label style="display:flex;align-items:center;gap:7px;cursor:pointer">' +
                '<input type="radio" name="payMethodCo" value="cod" style="accent-color:var(--wine,#82213E)"> ' + t('co.payCOD') +
              '</label>' +
            '</div>' +
          '</fieldset>'
        : '';

      var paymentFieldset = demo
        ? '<fieldset id="coDemoCard"><legend>' + t('co.payment') + ' <small>' + t('co.demo') + '</small></legend>' +
            '<div class="field"><label>' + t('co.card') + '</label><input name="card" inputmode="numeric" placeholder="4242 4242 4242 4242" required></div>' +
            '<div class="row2"><div class="field"><label>' + t('co.exp') + '</label><input name="exp" placeholder="04/28" required></div>' +
            '<div class="field"><label>' + t('co.cvc') + '</label><input name="cvc" inputmode="numeric" placeholder="123" required></div></div>' +
          '</fieldset>'
        : '';

      var btnLabel = demo ? t('co.place', { x: money(total) }) : t('co.proceed', { x: money(total) });
      var secureNote = demo ? t('co.secureDemo') : t('co.secureReal');

      root.innerHTML =
        '<div class="checkout">' +
          '<form class="co-form" id="coForm" novalidate>' +
            '<fieldset><legend>' + t('co.contact') + '</legend>' +
              '<div class="field"><label>' + t('co.name') + '</label><input id="cName" autocomplete="off" placeholder="—"></div>' +
              '<div class="field"><label>' + t('co.email') + '</label><input type="email" name="email" placeholder="you@email.com" required></div>' +
              '<div class="field"><label>' + t('co.phone') + '</label><input id="cPhone" autocomplete="off" placeholder="—"></div>' +

              // newsletter opt-in
              '<label class="co-news-row"><input type="checkbox" id="coNewsChk" checked><span>' + t('co.newsletter') + '</span></label>' +

              // ── auth section (3 states) ──────────────────────────────────
              '<div id="coAuthSection">' +

                // state A – guest (default)
                '<div id="coAuthGuest">' +
                  // signup row
                  '<label class="co-signup-row" id="coSignupRow"><input type="checkbox" id="coSignupChk"><span class="co-su-t"><b>' + t('co.signupTitle') + '</b><span>' + t('co.signupSub') + '</span></span></label>' +
                  '<div id="coSignupPwBox" style="display:none">' +
                    '<div class="field co-pw-field"><label>' + t('co.signupPwLabel') + '</label>' +
                      '<div class="pw-row"><input type="password" id="coSignupPw" placeholder="' + t('co.signupPwPh') + '" minlength="6"><button type="button" class="btn" id="coSignupBtn">' + t('co.signupDo') + '</button></div>' +
                      '<p class="co-auth-err" id="coSignupErr" style="display:none"></p>' +
                    '</div>' +
                  '</div>' +
                  // signin row (hidden until toggled)
                  '<label class="co-signup-row" id="coSigninRow" style="display:none"><input type="checkbox" id="coSigninChk"><span class="co-su-t"><b>' + t('co.signinTitle') + '</b><span>' + t('co.signinSub') + '</span></span></label>' +
                  '<div id="coSigninPwBox" style="display:none">' +
                    '<div class="field co-pw-field"><label>' + t('co.signinPwLabel') + '</label>' +
                      '<div class="pw-row"><input type="password" id="coSigninPw" placeholder="' + t('co.signinPwPh') + '"><button type="button" class="btn" id="coSigninBtn">' + t('co.signinDo') + '</button></div>' +
                      '<p class="co-auth-err" id="coSigninErr" style="display:none"></p>' +
                    '</div>' +
                  '</div>' +
                  // mode toggle link
                  '<p class="co-auth-toggle" id="coAuthToggle"><span id="coToggleLabel">' + t('co.haveAccount') + '</span> <a href="#" id="coToggleLink">' + t('co.toSignin') + '</a></p>' +
                '</div>' +

                // state B – signed in
                '<div id="coAuthLoggedIn" style="display:none">' +
                  '<div class="co-signup-ok">' +
                    '<span class="co-su-tick">✓</span><span id="coSignedInLabel"></span>' +
                    '<button type="button" id="coSignOutBtn" class="btn btn--ghost co-signout-btn">' + t('co.signOut') + '</button>' +
                  '</div>' +
                '</div>' +

                // success banners
                '<div class="co-signup-ok" id="coSignupOk" style="display:none"><span class="co-su-tick">✓</span><span>' + t('co.signupOk') + '</span></div>' +
                '<div class="co-signup-ok" id="coSigninOk" style="display:none"><span class="co-su-tick">✓</span><span>' + t('co.signinOk') + '</span></div>' +

              '</div>' +
              // ─────────────────────────────────────────────────────────────
            '</fieldset>' +
            '<fieldset><legend>' + t('co.shipping') + '</legend>' +
              '<div class="row2"><div class="field"><label>' + t('co.first') + '</label><input name="first" required></div>' +
              '<div class="field"><label>' + t('co.last') + '</label><input name="last" required></div></div>' +
              '<div class="field"><label>' + t('co.address') + '</label><input name="address" required></div>' +
              '<div class="field"><label>' + t('co.apt') + '</label><input name="apt"></div>' +
              '<div class="row2"><div class="field"><label>' + t('co.city') + '</label><input name="city" required></div>' +
              '<div class="field"><label>' + t('co.zip') + '</label><input name="zip" required></div></div>' +
              (useZones
                ? '<input type="hidden" name="country">' +
                  '<div class="row2"><div class="field"><label>' + t('co.country') + '</label><select id="coZoneSelect" style="width:100%">' + buildCombinedOptions(false) + '</select></div>' +
                  '<div class="field"><label>' + t('co.phone') + '</label><input name="phone" required></div></div>'
                : '<div class="row2"><div class="field"><label>' + t('co.country') + '</label><select name="country" required>' + buildCountryOptions() + '</select></div>' +
                  '<div class="field"><label>' + t('co.phone') + '</label><input name="phone" required></div></div>'
              ) +
            '</fieldset>' +
            payMethodFieldset +
            paymentFieldset +
            '<button type="submit" class="btn btn--block" id="placeBtn">' + btnLabel + '</button>' +
            '<div class="co-secure"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="1.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg> ' + secureNote + '</div>' +
          '</form>' +

          '<aside class="summary">' +
            '<h3>' + t('co.summary') + '</h3>' +
            '<div id="sumLines">' + summaryLines + '</div>' +
            '<div id="giftLines"></div>' +
            '<div id="addonBox"></div>' +
            '<p id="promoHint" style="display:none;font-size:12.5px;line-height:1.5;margin:10px 0 0;color:#6A1A32;background:#FBF0DA;border-radius:8px;padding:9px 12px"></p>' +
            '<div style="display:flex;gap:8px;margin:16px 0 2px">' +
              '<input id="discInput" placeholder="' + t('co.discPh') + '" style="flex:1;padding:11px 13px;background:var(--white);border:1px solid var(--pink-border);border-radius:var(--radius);outline:none;text-transform:uppercase">' +
              '<button type="button" class="btn btn--ghost" id="discBtn" style="padding:11px 18px">' + t('co.apply') + '</button>' +
            '</div>' +
            '<p id="discMsg" class="muted" style="font-size:12px;margin:4px 0 0;min-height:16px"></p>' +
            '<div id="creditWrap" style="display:none"></div>' +
            '<div class="totals">' +
              '<div><span>' + t('co.subtotal') + '</span><span>' + money(subtotal) + '</span></div>' +
              '<div id="discRow" style="display:none"><span>' + t('co.discount') + ' <b id="discTag" style="color:var(--wine)"></b></span><span id="discAmt"></span></div>' +
              '<div id="creditRow" style="display:none;color:var(--wine)"><span id="creditLabel"></span><span id="creditAmt"></span></div>' +
              '<div><span>' + t('co.shippingLbl') + '</span><span id="shipVal">' + (useZones ? t('co.zoneNone') : (shipping === 0 ? t('co.free') : money(shipping))) + '</span></div>' +
              '<div id="addonRow" style="display:none"><span>' + t('co.addon') + ' <b id="addonTag" style="color:var(--wine)"></b></span><span id="addonAmt"></span></div>' +
              '<div class="grand"><span>' + t('co.total') + '</span><b id="grandTotal">' + money(total) + '</b></div>' +
            '</div>' +
          '</aside>' +
        '</div>';

      // ---- discount: flat codes + cart-aware promos (买一送一 / 第N件半价) ----
      var discountLabel = '';
      var gifts = [], giftNudge = null;
      var addonOffer = null, addonAdded = false, addonTotal = 0, addonNudge = null;
      var creditBal = 0, creditUse = 0;   // points: balance + amount (RM) applied this order
      var vouchers = [], voucherSel = null;   // cash vouchers + the one chosen (one reward per order)
      function renderTotals() {
        var effShip = freeShip ? 0 : shipping;
        if (!voucherSel && creditUse > Math.max(0, subtotal - discount)) creditUse = Math.max(0, subtotal - discount);
        var rewardDisc = voucherSel ? voucherDiscFor(voucherSel) : creditUse;   // one reward per order
        total = Math.max(0, subtotal - discount - rewardDisc) + effShip + (addonAdded ? addonTotal : 0);
        var crow = document.getElementById('creditRow');
        if (crow) {
          if (rewardDisc > 0) {
            crow.style.display = '';
            document.getElementById('creditLabel').textContent = voucherSel ? (window.LANG === 'zh' ? '现金券' : 'Voucher') : (window.LANG === 'zh' ? '积分折抵' : 'Points');
            document.getElementById('creditAmt').textContent = '−' + money(rewardDisc);
          } else { crow.style.display = 'none'; }
        }
        var sv = document.getElementById('shipVal');
        if (sv) sv.textContent = (useZones && !selectedZone && !freeShip) ? t('co.zoneNone') : (effShip === 0 ? t('co.free') : money(effShip));
        var row = document.getElementById('discRow');
        if (discount > 0 || (freeShip && shipping > 0)) {
          row.style.display = '';
          document.getElementById('discTag').textContent = discountLabel || discountCode;
          document.getElementById('discAmt').textContent = '−' + money(discount > 0 ? discount : shipping);
        } else { row.style.display = 'none'; }
        var arow = document.getElementById('addonRow');
        if (arow) { if (addonAdded && addonOffer) { arow.style.display = ''; document.getElementById('addonTag').textContent = addonOffer.name; document.getElementById('addonAmt').textContent = '+' + money(addonTotal); } else { arow.style.display = 'none'; } }
        document.getElementById('grandTotal').textContent = money(total);
        var pb = document.getElementById('placeBtn');
        if (pb) pb.textContent = demo ? t('co.place', { x: money(total) }) : t('co.proceed', { x: money(total) });
      }
      function renderSummary(perLine) { var b = document.getElementById('sumLines'); if (b) b.innerHTML = summaryHTML(perLine || {}); }
      function giftLine(promo, g) {
        var gp = window.findProduct ? window.findProduct(g.id) : null;
        var gn = gp ? ((window.LANG === 'zh' && gp.name_zh) ? gp.name_zh : gp.name) : g.id;
        return { code: promo.code, id: g.id, name: gn, qty: g.qty };
      }
      function renderGifts() {
        var box = document.getElementById('giftLines'); if (!box) return;
        if (gifts.length) {
          box.innerHTML = gifts.map(function (g) {
            return '<div class="summary__line"><div class="li-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:#FBF0DA">🎁</div>' +

          var nm = [fFirst.value.trim(), fLast.value.trim()].filter(Boolean).join(' ');
          if (nm !== cName.value) { cName.value = nm; if (nm) flash(cName); }
          var ph = fPhone.value.trim();
          if (ph !== cPhone.value) { cPhone.value = ph; if (ph) flash(cPhone); }
        }
        [fFirst, fLast].forEach(function (el) { el.addEventListener('input', syncContact); });
        fPhone.addEventListener('input', syncContact);

        // ── check if already logged in ───────────────────────────────
        if (window.Auth && Auth.getUser) {
          Auth.getUser().then(function (res) {
            var u = res && res.data && res.data.user;
            if (!u) return;
            // logged-in state
            document.getElementById('coAuthGuest').style.display = 'none';
            var li = document.getElementById('coAuthLoggedIn');
            li.style.display = '';
            document.getElementById('coSignedInLabel').textContent = t('co.signedInAs', { x: u.email });
            // pre-fill email from account
            if (fEmail && !fEmail.value) fEmail.value = u.email;
            // pre-fill name from metadata
            var nm = u.user_metadata && (u.user_metadata.full_name || u.user_metadata.name);
            if (nm && cName && !cName.value) cName.value = nm;
          });
        }

        // sign-out button
        document.getElementById('coSignOutBtn').addEventListener('click', function () {
          if (window.Auth && Auth.signOut) Auth.signOut().then(function () { location.reload(); });
        });

        // ── mode: 'signup' | 'signin' ────────────────────────────────
        var mode = 'signup';
        var signupRow  = document.getElementById('coSignupRow');
        var signupPwBox = document.getElementById('coSignupPwBox');
        var signinRow  = document.getElementById('coSigninRow');
        var signinPwBox = document.getElementById('coSigninPwBox');
        var toggleLabel = document.getElementById('coToggleLabel');
        var toggleLink  = document.getElementById('coToggleLink');

        function setMode(m) {
          mode = m;
          var isSignup = m === 'signup';
          signupRow.style.display  = isSignup ? '' : 'none';
          signupPwBox.style.display = (isSignup && document.getElementById('coSignupChk').checked) ? '' : 'none';
          signinRow.style.display  = isSignup ? 'none' : '';
          signinPwBox.style.display = (!isSignup && document.getElementById('coSigninChk').checked) ? '' : 'none';
          toggleLabel.textContent  = isSignup ? t('co.haveAccount') : t('co.noAccount');
          toggleLink.textContent   = isSignup ? t('co.toSignin')    : t('co.toSignup');
          if (!isSignup) { document.getElementById('coSigninChk').checked = true; signinPwBox.style.display = ''; document.getElementById('coSigninPw').focus(); }
        }

        toggleLink.addEventListener('click', function (e) {
          e.preventDefault(); setMode(mode === 'signup' ? 'signin' : 'signup');
        });

        // ── signup checkbox ──────────────────────────────────────────
        document.getElementById('coSignupChk').addEventListener('change', function () {
          signupPwBox.style.display = this.checked ? '' : 'none';
          if (this.checked) document.getElementById('coSignupPw').focus();
        });

        document.getElementById('coSignupBtn').addEventListener('click', function () {
          var pw = document.getElementById('coSignupPw').value;
          var email = fEmail ? fEmail.value.trim() : '';
          var name  = cName ? cName.value.trim() : '';
          var errEl = document.getElementById('coSignupErr');
          var btn   = this;
          errEl.style.display = 'none';
          if (pw.length < 6) { document.getElementById('coSignupPw').focus(); return; }
          if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { fEmail.classList.add('err'); fEmail.focus(); return; }
          btn.disabled = true;
          if (window.Auth && Auth.signUp) {
            Auth.signUp(email, pw, name).then(function (res) {
              btn.disabled = false;
              if (res && res.error) { errEl.textContent = t('co.signupErr'); errEl.style.display = ''; return; }
              document.getElementById('coAuthGuest').style.display = 'none';
              document.getElementById('coSignupOk').style.display = 'flex';
            }, function () { btn.disabled = false; errEl.textContent = t('co.signupErr'); errEl.style.display = ''; });
          }
        });

        // ── signin checkbox + button ─────────────────────────────────
        document.getElementById('coSigninChk').addEventListener('change', function () {
          signinPwBox.style.display = this.checked ? '' : 'none';
          if (this.checked) document.getElementById('coSigninPw').focus();
        });

        document.getElementById('coSigninBtn').addEventListener('click', function () {
          var pw = document.getElementById('coSigninPw').value;
          var email = fEmail ? fEmail.value.trim() : '';
          var errEl = document.getElementById('coSigninErr');
          var btn   = this;
          errEl.style.display = 'none';
          if (!pw) { document.getElementById('coSigninPw').focus(); return; }
          if (!email || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { fEmail.classList.add('err'); fEmail.focus(); return; }
          btn.disabled = true;
          if (window.Auth && Auth.signIn) {
            Auth.signIn(email, pw).then(function (res) {
              btn.disabled = false;
              if (res && res.error) { errEl.textContent = t('co.signinErr'); errEl.style.display = ''; return; }
              // fill name from user metadata
              var u = res && res.data && res.data.user;
              if (u) {
                var nm = u.user_metadata && (u.user_metadata.full_name || u.user_metadata.name);
                if (nm && cName && !cName.value) { cName.value = nm; flash(cName); }
              }
              document.getElementById('coAuthGuest').style.display = 'none';
              document.getElementById('coSigninOk').style.display = 'flex';
            }, function () { btn.disabled = false; errEl.textContent = t('co.signinErr'); errEl.style.display = ''; });
          }
        });
      })();

      // ---- submit ----
      document.getElementById('coForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var form = e.target;
        var ok = true;
        form.querySelectorAll('[required]').forEach(function (inp) {
          var bad = !inp.value.trim() || (inp.type === 'email' && !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(inp.value));
          inp.classList.toggle('err', bad);
          if (bad) ok = false;
        });
        if (!ok) { toast(t('co.fill')); return; }

        if (useZones) {
          var zs = document.getElementById('coZoneSelect');
          if (!zs || !zs.value) {
            if (zs) { zs.classList.add('err'); zs.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            toast(window.LANG === 'zh' ? '请选择收货地区' : 'Please select your shipping region');
            return;
          }
        }

        // ---- stock pre-check ----
        var stockErrors = [];
        lines.forEach(function (l) {
          if (l.b) {
            (l.items || []).forEach(function (it) {
              var p = window.findProduct && findProduct(it.id);
              if (!p || !p.trackInventory || p.continueSelling) return;
              var avail = Number((window.stockVal ? stockVal(p, it.size, it.color) : ((p.stock || {})[it.size])) || 0);
              var need = (it.qty || 1) * (l.qty || 1);
              if (avail < need) stockErrors.push({ name: (window.LANG === 'zh' && p.name_zh ? p.name_zh : p.name || it.id), size: it.size, avail: avail, need: need });
            });
          } else {
            var p = window.findProduct && findProduct(l.id);
            if (!p || !p.trackInventory || p.continueSelling) return;
            var avail = Number((window.stockVal ? stockVal(p, l.size, l.color) : ((p.stock || {})[l.size])) || 0);
            if (avail < l.qty) stockErrors.push({ name: (window.LANG === 'zh' && p.name_zh ? p.name_zh : p.name || l.id), size: l.size, avail: avail, need: l.qty });
          }
        });
        if (stockErrors.length) {
          var zh = (window.LANG === 'zh');
          var msg = zh
            ? '以下商品库存不足，请更新购物车：\n' + stockErrors.map(function (e) { return '• ' + e.name + (e.size ? ' (' + e.size + ')' : '') + ' — 剩余 ' + e.avail + ' 件，需要 ' + e.need + ' 件'; }).join('\n')
            : 'Some items are out of stock. Please update your cart:\n' + stockErrors.map(function (e) { return '• ' + e.name + (e.size ? ' (' + e.size + ')' : '') + ' — only ' + e.avail + ' left, need ' + e.need; }).join('\n');
          var errBox = document.getElementById('stockErrBox');
          if (!errBox) {
            errBox = document.createElement('div');
            errBox.id = 'stockErrBox';
            errBox.style.cssText = 'background:#F7E3E0;border:1px solid #e8b5b0;border-left:3px solid #B23A3A;border-radius:5px;padding:14px 16px;margin-bottom:18px;font-size:13.5px;color:#1C1C1C;line-height:1.7;white-space:pre-line';
            var formEl = document.getElementById('coForm');
            formEl.parentNode.insertBefore(errBox, formEl);
          }
          errBox.innerHTML = '<b style="color:#B23A3A">' + (zh ? '⚠ 库存不足' : '⚠ Out of stock') + '</b><br>' +
            stockErrors.map(function (e) {
              return '• ' + _esc(e.name) + (e.size ? ' <span style="color:#6F635C">(' + _esc(e.size) + ')</span>' : '') +
                ' — ' + (zh ? '剩余 <b>' + e.avail + '</b> 件，你需要 <b>' + e.need + '</b> 件' : 'only <b>' + e.avail + '</b> left, you need <b>' + e.need + '</b>');
            }).join('<br>') +
            '<br><a href="cart.html" style="color:#B23A3A;font-weight:600;text-decoration:underline;margin-top:6px;display:inline-block">' + (zh ? '回购物车修改 →' : 'Edit cart →') + '</a>';
          errBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
          return;
        }
        var errBox = document.getElementById('stockErrBox');
        if (errBox) errBox.remove();
        // ---- end stock pre-check ----

        var orderId = 'ME' + String(Date.now()).slice(-7);
        var f = form;
        var effShip = freeShip ? 0 : shipping;
        var itemRows = lines.map(function (l) {
          return l.b
            ? { b: 1, id: l.id, name: l.name, qty: l.qty, price: l.price, items: l.items }
            : { id: l.id, name: l.name, qty: l.qty, price: l.price, size: l.size, color: l.color };
        });
        gifts.forEach(function (g) { itemRows.push({ id: g.id, name: g.name, qty: g.qty, price: 0, gift: 1 }); });
        if (addonAdded && addonOffer) itemRows.push({ id: addonOffer.id, name: addonOffer.name, qty: addonOffer.qty, price: addonOffer.price, addon: 1 });
        var customer = {
          first: f.first.value, last: f.last.value, address: f.address.value, apt: f.apt.value,
          city: f.city.value, zip: f.zip.value, country: f.country.value, phone: f.phone.value,
          zoneId: selectedZone ? selectedZone.id : '',
          state: (document.getElementById('coZoneSelect') || {}).value || '',
          paymentMethod: isCOD ? 'cod' : 'online'
        };
        localStorage.setItem('eclat_last_order', JSON.stringify({
          orderId: orderId, email: f.email.value,
          items: itemRows, subtotal: subtotal, shipping: effShip, total: total,
          discount_code: discountCode || null, discount_amount: discount || 0,
          credit_used: creditUse || 0
        }));

        // DEMO → confirmation page. STRIPE/PAYPAL → redirect to that link.
        // BILLPLZ → ask the Edge Function to open a bill, then redirect there.
        var saveSucceeded = false;
        function go() {
          if (useBillplz) {
            if (!saveSucceeded) {
              toast(window.LANG === 'zh' ? '订单保存失败，请重试' : 'Could not save order, please try again');
              var pb0 = document.getElementById('placeBtn'); if (pb0) pb0.disabled = false;
              return;
            }
            var redirectUrl = window.location.origin + '/success.html';
            window.sb.functions.invoke('create-billplz-bill', {
              body: {
                order_number: orderId,
                email: f.email.value,
                name: [f.first.value, f.last.value].filter(Boolean).join(' '),
                mobile: f.phone.value,
                redirect_url: redirectUrl
              }
            }).then(function (r) {
              var url = r && r.data && r.data.url;
              if (!url || (r && r.error)) {
                toast(window.LANG === 'zh' ? '支付通道打开失败，请重试' : 'Payment gateway error, please try again');
                var pb1 = document.getElementById('placeBtn'); if (pb1) pb1.disabled = false;
                return;
              }
              location.href = url;
            }, function () {
              toast(window.LANG === 'zh' ? '支付通道连接失败' : 'Payment connection failed');
              var pb2 = document.getElementById('placeBtn'); if (pb2) pb2.disabled = false;
            });
            return;
          }
          location.href = demo ? 'success.html' : payLink;
        }

        // Save the order to Supabase (attach the logged-in user if any).
        // Never block checkout on a DB hiccup.
        if (window.DB && DB.configured) {
          var btn = document.getElementById('placeBtn'); if (btn) btn.disabled = true;
          var orderRow = {
            order_number: orderId, email: f.email.value, customer: customer,
            items: itemRows, subtotal: subtotal, shipping: effShip, total: total,
            discount_code: discountCode || null, discount_amount: discount || 0,
            currency: (STORE_CONFIG.currency || 'MYR'),
            payment_method: isCOD ? 'cod' : 'online'
          };
          if (creditUse > 0) orderRow.credit_used = creditUse;
          if (voucherSel) orderRow.voucher_id = voucherSel.id;
          var zh = (window.LANG === 'zh');

          // Spend the chosen reward FIRST (server-side, atomic). Only on success do we
          // keep the discount; otherwise place the order at full price.
          var saveOrder = function () {
          var getU = (window.Auth && Auth.getUser) ? Auth.getUser() : Promise.resolve({ data: { user: null } });
          getU.then(function (res) {
            var u = res && res.data && res.data.user; if (u) orderRow.user_id = u.id;
            return DB.createOrder(orderRow);
          }).then(function (r) {
            if (r && r.error) console.warn('[Supabase] order save:', r.error.message);
            else {
              saveSucceeded = true;
              if (discountCode && DB.redeemDiscount) { try { DB.redeemDiscount(discountCode); } catch (e) {} }
              gifts.forEach(function (g) { if (DB.redeemDiscount) { try { DB.redeemDiscount(g.code); } catch (e) {} } });
              if (addonAdded && addonOffer && DB.redeemDiscount) { try { DB.redeemDiscount(addonOffer.code); } catch (e) {} }
              if (DB.decrementStock) { try {
                var stockRows = [];
                lines.forEach(function (l) {
                  if (l.b) { (l.items || []).forEach(function (it) { stockRows.push({ id: it.id, size: it.size, qty: (it.qty || 1) * l.qty }); }); }
                  else { stockRows.push({ id: l.id, size: l.size, color: l.color, qty: l.qty }); }
                });
                DB.decrementStock(stockRows);
              } catch (e) {} }
            }
          }).then(go, go);
          };
          var revertReward = function () {
            voucherSel = null; creditUse = 0;
            if (orderRow.credit_used != null) delete orderRow.credit_used;
            if (orderRow.voucher_id != null) delete orderRow.voucher_id;
            orderRow.total = total = Math.max(0, subtotal - discount) + effShip + (addonAdded ? addonTotal : 0);
            renderRewards(); renderTotals();
            if (btn) btn.disabled = false;
            toast(zh ? '回馈使用失败，已移除，请再试一次' : 'Reward could not be applied — removed, please try again');
          };

          if (voucherSel && DB.redeemVoucher) {
            DB.redeemVoucher(voucherSel.id, orderId, subtotal).then(function (r) {
              if (r && r.error) { revertReward(); return; }
              saveOrder();
            }, revertReward);
          } else if (creditUse > 0 && DB.redeemCredit) {
            DB.redeemCredit(creditUse, orderId).then(function (r) {
              if (r && r.error) { revertReward(); return; }
              saveOrder();
            }, revertReward);
          } else { saveOrder(); }
        } else { go(); }
      });
    });
  </script>
</body>
</html>
