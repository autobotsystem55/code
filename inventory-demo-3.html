<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存管理 · Code Official（设计示意 C · 混合控制台）</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFFAF1; --cream2:#FAF6F3; --white:#fff;
    --wine:#82213E; --wine-deep:#6A1A32; --pink:#E9C9CC; --blush:#F2E4D9;
    --ink:#1C1C1C; --ink2:#3E3E3E; --muted:#6F635C; --line:#ECD9D6; --line2:#E2DCD8;
    --green:#2F7D4F; --amber:#9A6A1E; --red:#B23A3A;
    --amber-bg:#F6EAD3; --green-bg:#E3F1E8; --red-bg:#F7E3E0;
    --serif:'DM Serif Display',Georgia,serif; --sans:'DM Sans',-apple-system,Segoe UI,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);font-size:15px;line-height:1.55}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit;font-size:14px;color:inherit}
  h1,h2,h3{font-family:var(--serif);font-weight:400;line-height:1.12}
  .muted{color:var(--muted)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--wine);color:var(--cream);
    padding:11px 18px;font-size:13px;font-weight:500;letter-spacing:.02em;border:1px solid var(--wine);transition:.2s}
  .btn:hover{background:var(--wine-deep);border-color:var(--wine-deep)}
  .btn--ghost{background:transparent;color:var(--wine)}
  .btn--ghost:hover{background:var(--wine);color:var(--cream)}
  .btn--sm{padding:7px 13px;font-size:12px}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  /* shell */
  .shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .side{background:var(--cream2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .brand{font-family:var(--serif);font-size:24px;padding:24px 24px 18px}
  .side .brand sup{font-size:.42em;color:var(--wine)}
  .nav{display:flex;flex-direction:column;padding:6px 12px;gap:2px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 14px;font-size:14px;color:var(--ink2);border-radius:6px;transition:.18s}
  .nav button:hover{background:var(--blush)}
  .nav button.on{background:var(--wine);color:var(--cream)}
  .nav button.on svg{stroke:var(--cream)}
  .nav svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.6}
  .side-foot{margin-top:auto;padding:16px 16px 22px;border-top:1px solid var(--line);font-size:13px}
  .side-foot a{display:block;color:var(--muted);padding:6px 8px}
  .side-foot a:hover{color:var(--wine)}

  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 30px;border-bottom:1px solid var(--line);background:var(--cream)}
  .topbar h1{font-size:29px}
  .topbar .crumb{font-size:12px;letter-spacing:.04em;color:var(--muted);margin-bottom:3px}
  .topbar .who{font-size:13px;color:var(--muted)}
  .demo-tag{display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--wine);
    border:1px solid var(--pink);border-radius:999px;padding:3px 10px;margin-left:10px;vertical-align:middle}

  /* content: console = left rail + main */
  .console{display:grid;grid-template-columns:1fr 296px;gap:22px;padding:24px 30px 70px;align-items:start}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px}
  .stat{background:var(--white);border:1px solid var(--line);padding:16px 18px;position:relative}
  .stat .n{font-family:var(--serif);font-size:32px;line-height:1}
  .stat .l{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:7px}
  .stat .ico{position:absolute;top:14px;right:14px;width:18px;height:18px;fill:none;stroke:var(--pink);stroke-width:1.6}
  .stat.warn .n{color:var(--amber)} .stat.warn .ico{stroke:var(--amber)}
  .stat.bad .n{color:var(--red)} .stat.bad .ico{stroke:var(--red)}

  /* toolbar */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  .search{position:relative;flex:1;min-width:200px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;fill:none;stroke:var(--muted);stroke-width:1.7}
  .search input{width:100%;padding:10px 12px 10px 36px;background:var(--white);border:1px solid var(--line2);outline:none;transition:.18s}
  .search input:focus{border-color:var(--wine)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--white)}
  .seg button{padding:9px 14px;font-size:13px;color:var(--ink2);position:relative}
  .seg button.on{background:var(--wine);color:var(--cream)}
  .seg button:not(.on):hover{background:var(--blush)}
  .seg .badge{display:inline-block;min-width:18px;margin-left:6px;padding:0 5px;font-size:11px;line-height:16px;text-align:center;border-radius:999px;background:var(--blush);color:var(--ink2)}
  .seg button.on .badge{background:rgba(255,255,255,.25);color:var(--cream)}

  /* bulk bar */
  .bulkbar{display:none;align-items:center;gap:12px;flex-wrap:wrap;background:var(--wine);color:var(--cream);padding:10px 16px;margin-bottom:12px}
  .bulkbar.show{display:flex}
  .bulkbar .cnt{font-weight:600}
  .bulkbar input[type=number]{width:64px;padding:6px 8px;border:none;outline:none;text-align:center}
  .bulkbar .bbtn{background:rgba(255,255,255,.14);color:var(--cream);padding:7px 12px;font-size:12px;border:1px solid rgba(255,255,255,.3);transition:.18s}
  .bulkbar .bbtn:hover{background:rgba(255,255,255,.26)}
  .bulkbar .x{margin-left:auto;font-size:13px;opacity:.85}
  .bulkbar .x:hover{opacity:1}

  /* product table */
  .ptable{background:var(--white);border:1px solid var(--line)}
  .ph{display:grid;grid-template-columns:38px 1fr 116px 132px 150px 70px;align-items:center;gap:10px;
    padding:11px 16px;border-bottom:1px solid var(--line);font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .prow{border-bottom:1px solid var(--line)}
  .prow:last-child{border-bottom:none}
  .psum{display:grid;grid-template-columns:38px 1fr 116px 132px 150px 70px;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;transition:.15s}
  .psum:hover{background:var(--cream2)}
  .ck{width:16px;height:16px;accent-color:var(--wine);cursor:pointer}
  .pcell{display:flex;align-items:center;gap:12px;min-width:0}
  .thumb{width:42px;height:54px;object-fit:cover;background:var(--blush);flex-shrink:0;border:1px solid var(--line)}
  .pname{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pen{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pmeta{font-size:11px;color:var(--muted);margin-top:1px}
  .totbox{font-family:var(--serif);font-size:21px;line-height:1}
  .totbox small{font-family:var(--sans);font-size:11px;color:var(--muted);letter-spacing:.04em}

  /* status badges */
  .badge2{display:inline-flex;align-items:center;gap:5px;font-size:11px;letter-spacing:.03em;padding:3px 9px;border-radius:999px;font-weight:500;white-space:nowrap}
  .badge2.ok{background:var(--green-bg);color:var(--green)}
  .badge2.low{background:var(--amber-bg);color:var(--amber)}
  .badge2.out{background:var(--red-bg);color:var(--red)}
  .badge2 .dot{width:6px;height:6px;border-radius:50%;background:currentColor}

  /* mini size chips in summary row */
  .sizemini{display:flex;gap:4px;flex-wrap:wrap}
  .smchip{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--blush);color:var(--ink2);white-space:nowrap}
  .smchip.low{background:var(--amber-bg);color:var(--amber)}
  .smchip.out{background:var(--red-bg);color:var(--red)}

  .caret{width:16px;height:16px;fill:none;stroke:var(--muted);stroke-width:2;transition:.2s;justify-self:end}
  .prow.open .caret{transform:rotate(90deg);stroke:var(--wine)}
  .prow.open .psum{background:var(--cream2)}

  /* expanded panel */
  .pexp{display:none;padding:4px 16px 20px;background:var(--cream2);border-top:1px dashed var(--line)}
  .prow.open .pexp{display:block}
  .exp-grid{display:grid;grid-template-columns:1.45fr 1fr;gap:20px;padding-top:16px}
  @media(max-width:1180px){.exp-grid{grid-template-columns:1fr}}

  .exp-h{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:10px}

  /* per-size rows */
  .sizes{background:var(--white);border:1px solid var(--line)}
  .srow{display:grid;grid-template-columns:64px 1fr 132px 78px;align-items:center;gap:12px;padding:9px 14px;border-bottom:1px solid var(--line)}
  .srow:last-child{border-bottom:none}
  .srow .sz{font-weight:600;font-size:14px}
  .srow .sku{font-size:11px;color:var(--muted)}
  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:var(--white)}
  .stepper button{width:30px;height:32px;font-size:17px;color:var(--wine);background:var(--white);transition:.15s}
  .stepper button:hover{background:var(--blush)}
  .stepper input{width:46px;height:32px;text-align:center;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);outline:none;font-size:14px;font-weight:600;background:var(--white);-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .srow.low input{color:var(--amber)} .srow.out input{color:var(--red)}
  .srow.low{background:#FFFCF5} .srow.out{background:#FFF8F6}
  .sstat{font-size:11px;text-align:right;white-space:nowrap}
  .sstat.low{color:var(--amber)} .sstat.out{color:var(--red)} .sstat.ok{color:var(--green)}

  /* per-product controls */
  .ctrls{background:var(--white);border:1px solid var(--line);padding:16px 16px 6px}
  .ctrl{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:9px 0;border-bottom:1px solid var(--line)}
  .ctrl:last-child{border-bottom:none}
  .ctrl .lab{font-size:13px;font-weight:500}
  .ctrl .lab small{display:block;font-size:11px;color:var(--muted);font-weight:400;margin-top:1px}
  .sw{position:relative;width:42px;height:23px;border-radius:999px;background:var(--line2);transition:.2s;flex-shrink:0}
  .sw::after{content:'';position:absolute;top:2px;left:2px;width:19px;height:19px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:.2s}
  .sw.on{background:var(--wine)} .sw.on::after{transform:translateX(19px)}
  .thr{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:6px;overflow:hidden;background:var(--white)}
  .thr button{width:28px;height:30px;color:var(--wine)} .thr button:hover{background:var(--blush)}
  .thr input{width:40px;height:30px;text-align:center;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);outline:none;font-weight:600;-moz-appearance:textfield}
  .thr input::-webkit-outer-spin-button,.thr input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .exp-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
  .saved{font-size:12px;color:var(--green);opacity:0;transition:.3s;margin-right:auto;align-self:center}
  .saved.show{opacity:1}

  /* right rail */
  .rail{position:sticky;top:24px;display:flex;flex-direction:column;gap:16px}
  .rcard{background:var(--white);border:1px solid var(--line)}
  .rcard .rh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--line)}
  .rcard .rh h3{font-size:17px}
  .rcard .rh .cn{font-size:11px;font-weight:600;color:var(--cream);background:var(--red);border-radius:999px;padding:2px 8px}
  .rcard .rh .cn.amb{background:var(--amber)}
  .rbody{padding:6px 0}
  .alert{display:flex;align-items:center;gap:11px;padding:9px 16px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--line)}
  .alert:last-child{border-bottom:none}
  .alert:hover{background:var(--cream2)}
  .alert .at{width:34px;height:44px;object-fit:cover;background:var(--blush);border:1px solid var(--line);flex-shrink:0}
  .alert .ai{min-width:0;flex:1}
  .alert .an{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .alert .ad{font-size:11px;color:var(--muted);margin-top:1px}
  .alert .aq{font-family:var(--serif);font-size:18px;flex-shrink:0}
  .alert .aq.out{color:var(--red)} .alert .aq.low{color:var(--amber)}
  .rempty{padding:22px 16px;text-align:center;font-size:13px;color:var(--muted)}

  /* recent log */
  .log{padding:4px 0}
  .logrow{display:flex;gap:10px;padding:9px 16px;border-bottom:1px solid var(--line);font-size:13px}
  .logrow:last-child{border-bottom:none}
  .logrow .ld{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .ld.up{background:var(--green)} .ld.down{background:var(--amber)} .ld.set{background:var(--blue,#3A5C9A)}
  .logrow .lt{flex:1;min-width:0}
  .logrow .lt b{font-weight:600}
  .logrow .delta{font-weight:700;flex-shrink:0}
  .delta.up{color:var(--green)} .delta.down{color:var(--amber)}
  .logrow .lm{font-size:11px;color:var(--muted);margin-top:1px}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);
    padding:11px 20px;font-size:13px;border-radius:7px;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:1080px){
    .console{grid-template-columns:1fr}
    .rail{position:static}
  }
  @media(max-width:860px){
    .shell{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;border-right:none;border-bottom:1px solid var(--line)}
    .side .brand{padding:14px 18px;font-size:20px}
    .nav{flex-direction:row;flex-wrap:wrap;flex:1}
    .nav button{padding:8px 11px}
    .side-foot{margin:0;border-top:none;padding:10px 16px;display:flex;gap:12px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .topbar,.console{padding-left:16px;padding-right:16px}
    .topbar h1{font-size:23px}
    .ph{display:none}
    .psum{grid-template-columns:24px 1fr 64px 24px;grid-template-areas:'ck name tot car';gap:8px}
    .psum .ck{grid-area:ck} .psum .pcell{grid-area:name} .psum .col-tot{grid-area:tot} .psum .caret{grid-area:car}
    .psum .col-status,.psum .col-sizes{display:none}
    .exp-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="shell">
  <!-- sidebar -->
  <aside class="side">
    <div class="brand">Code Official <sup>✿</sup></div>
    <nav class="nav">
      <button><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>仪表盘</button>
      <button><svg viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/></svg>商品</button>
      <button class="on"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/><circle cx="8" cy="7" r="1.2"/><circle cx="16" cy="12" r="1.2"/><circle cx="8" cy="17" r="1.2"/></svg>库存</button>
      <button><svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7L6 7zM9 7a3 3 0 0 1 6 0"/></svg>订单</button>
      <button><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg>顾客</button>
      <button><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>设置</button>
    </nav>
    <div class="side-foot">
      <a href="#">↗ 查看店铺</a>
      <a href="#">退出登录</a>
    </div>
  </aside>

  <!-- main -->
  <div class="main">
    <div class="topbar">
      <div>
        <div class="crumb">商品 / 库存</div>
        <h1>库存管理<span class="demo-tag">设计示意 C · 混合控制台</span></h1>
      </div>
      <div class="who">Hi，店主 ✿</div>
    </div>

    <div class="console">
      <!-- ======= MAIN COLUMN ======= -->
      <div class="maincol">
        <!-- stat cards -->
        <div class="stats">
          <div class="stat">
            <svg class="ico" viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/></svg>
            <div class="n" id="stTotal">0</div>
            <div class="l">总库存件数</div>
          </div>
          <div class="stat warn">
            <svg class="ico" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><path d="M10.3 4.3 2.6 18a2 2 0 0 0 1.7 3h15.4a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0z"/></svg>
            <div class="n" id="stLow">0</div>
            <div class="l">低库存 SKU</div>
          </div>
          <div class="stat bad">
            <svg class="ico" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>
            <div class="n" id="stOut">0</div>
            <div class="l">缺货 SKU</div>
          </div>
          <div class="stat">
            <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            <div class="n" id="stSku">0</div>
            <div class="l">SKU 数 / 商品</div>
          </div>
        </div>

        <!-- toolbar -->
        <div class="toolbar">
          <div class="search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
            <input id="search" type="text" placeholder="搜索商品名 / SKU / 货号…">
          </div>
          <div class="seg" id="filters">
            <button class="on" data-f="all">全部 <span class="badge" id="fAll">0</span></button>
            <button data-f="low">低库存 <span class="badge" id="fLow">0</span></button>
            <button data-f="out">缺货 <span class="badge" id="fOut">0</span></button>
          </div>
          <button class="btn btn--sm" id="expandAll">全部展开</button>
        </div>

        <!-- bulk bar -->
        <div class="bulkbar" id="bulkbar">
          <span class="cnt"><span id="bulkCnt">0</span> 个商品已选</span>
          <span style="opacity:.6">|</span>
          <span>设为</span><input type="number" id="bulkSet" min="0" placeholder="数量">
          <button class="bbtn" id="bulkSetBtn">应用到全部尺码</button>
          <span style="opacity:.6">|</span>
          <span>批量调整</span>
          <button class="bbtn" id="bulkPlus">+5</button>
          <button class="bbtn" id="bulkMinus">−5</button>
          <button class="x" id="bulkClear">✕ 取消选择</button>
        </div>

        <!-- product table -->
        <div class="ptable">
          <div class="ph">
            <div><input type="checkbox" class="ck" id="ckAll"></div>
            <div>商品 / Product</div>
            <div>总库存</div>
            <div>状态</div>
            <div>分尺码 / Sizes</div>
            <div style="text-align:right">展开</div>
          </div>
          <div id="rows"></div>
        </div>
      </div>

      <!-- ======= RIGHT RAIL ======= -->
      <aside class="rail">
        <div class="rcard">
          <div class="rh">
            <h3>缺货提醒</h3>
            <span class="cn" id="outCount">0</span>
          </div>
          <div class="rbody" id="outList"></div>
        </div>

        <div class="rcard">
          <div class="rh">
            <h3>低库存提醒</h3>
            <span class="cn amb" id="lowCount">0</span>
          </div>
          <div class="rbody" id="lowList"></div>
        </div>

        <div class="rcard">
          <div class="rh"><h3>最近库存变动</h3></div>
          <div class="log" id="logList"></div>
        </div>
      </aside>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  // ---------- mock data ----------
  // thumbnails are tiny inline SVG swatches so file is fully self-contained (no network images)
  function swatch(c1,c2){
    var s='<svg xmlns="http://www.w3.org/2000/svg" width="42" height="54"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+c1+'"/><stop offset="1" stop-color="'+c2+'"/></linearGradient></defs><rect width="42" height="54" fill="url(#g)"/></svg>';
    return 'data:image/svg+xml;utf8,'+encodeURIComponent(s);
  }
  var products=[
    {id:'p1',zh:'羊毛混纺大衣',en:'Wool-Blend Overcoat',code:'OW-101',thumb:swatch('#7a3b2e','#caa07e'),track:true,oversell:false,thr:5,
      sizes:[{sz:'XS',q:8},{sz:'S',q:3},{sz:'M',q:12},{sz:'L',q:0},{sz:'XL',q:6}]},
    {id:'p2',zh:'羊绒圆领毛衣',en:'Cashmere Crewneck',code:'KN-204',thumb:swatch('#b9a06b','#e6d8b0'),track:true,oversell:false,thr:5,
      sizes:[{sz:'XS',q:4},{sz:'S',q:2},{sz:'M',q:0},{sz:'L',q:1},{sz:'XL',q:9}]},
    {id:'p3',zh:'真丝吊带连衣裙',en:'Silk Slip Dress',code:'DR-310',thumb:swatch('#82213e','#c98aa0'),track:true,oversell:true,thr:6,
      sizes:[{sz:'XS',q:15},{sz:'S',q:22},{sz:'M',q:18},{sz:'L',q:5},{sz:'XL',q:0}]},
    {id:'p4',zh:'有机棉T恤',en:'Organic Cotton Tee',code:'TP-118',thumb:swatch('#d8d2c8','#f3efe8'),track:true,oversell:false,thr:8,
      sizes:[{sz:'XS',q:40},{sz:'S',q:55},{sz:'M',q:62},{sz:'L',q:48},{sz:'XL',q:7}]},
    {id:'p5',zh:'高腰阔腿西裤',en:'High-Waist Wide Trousers',code:'TR-422',thumb:swatch('#3a3a3a','#7d7d7d'),track:true,oversell:false,thr:5,
      sizes:[{sz:'XS',q:0},{sz:'S',q:0},{sz:'M',q:3},{sz:'L',q:11},{sz:'XL',q:14}]},
    {id:'p6',zh:'法式泡泡袖衬衫',en:'French Puff-Sleeve Blouse',code:'SH-208',thumb:swatch('#e8d3d6','#f7ecef'),track:true,oversell:false,thr:6,
      sizes:[{sz:'XS',q:9},{sz:'S',q:14},{sz:'M',q:20},{sz:'L',q:6},{sz:'XL',q:2}]},
    {id:'p7',zh:'廓形羊毛针织开衫',en:'Oversized Wool Cardigan',code:'KN-231',thumb:swatch('#6b5b4a','#b8a890'),track:false,oversell:false,thr:5,
      sizes:[{sz:'S',q:7},{sz:'M',q:13},{sz:'L',q:10},{sz:'XL',q:4}]},
    {id:'p8',zh:'缎面系带半身裙',en:'Satin Wrap Midi Skirt',code:'DR-355',thumb:swatch('#9a6a1e','#e0c089'),track:true,oversell:false,thr:6,
      sizes:[{sz:'XS',q:5},{sz:'S',q:0},{sz:'M',q:2},{sz:'L',q:8},{sz:'XL',q:16}]}
  ];

  var log=[
    {dir:'up',name:'有机棉T恤 · M',d:12,who:'手动补货',when:'今天 10:24'},
    {dir:'down',name:'真丝吊带连衣裙 · L',d:-3,who:'订单 #10472',when:'今天 09:51'},
    {dir:'down',name:'羊绒圆领毛衣 · S',d:-2,who:'订单 #10470',when:'昨天 18:30'},
    {dir:'up',name:'缎面系带半身裙 · XL',d:6,who:'手动补货',when:'昨天 14:02'}
  ];

  var THR_DEF=5;
  var filter='all', query='', selected={};

  // ---------- helpers ----------
  var $=function(s,r){return (r||document).querySelector(s);};
  var $$=function(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));};
  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
  function thr(p){return p.thr||THR_DEF;}
  function sizeState(p,s){ if(s.q===0) return 'out'; if(s.q<=thr(p)) return 'low'; return 'ok'; }
  function total(p){return p.sizes.reduce(function(a,s){return a+s.q;},0);}
  function prodState(p){
    var hasOut=p.sizes.some(function(s){return s.q===0;});
    var hasLow=p.sizes.some(function(s){return s.q>0 && s.q<=thr(p);});
    if(p.sizes.every(function(s){return s.q===0;})) return 'out';
    if(hasOut) return 'out';
    if(hasLow) return 'low';
    return 'ok';
  }
  function matches(p){
    if(query){
      var q=query.toLowerCase();
      if((p.zh+p.en+p.code).toLowerCase().indexOf(q)<0) return false;
    }
    if(filter==='low'){ return p.sizes.some(function(s){return s.q>0 && s.q<=thr(p);}); }
    if(filter==='out'){ return p.sizes.some(function(s){return s.q===0;}); }
    return true;
  }

  function toast(msg){
    var t=$('#toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(function(){t.classList.remove('show');},1900);
  }
  function pushLog(dir,name,d,who){
    log.unshift({dir:dir,name:name,d:d,who:who||'手动调整',when:'刚刚'});
    if(log.length>8) log.pop();
    renderLog();
  }

  // ---------- summary numbers ----------
  function computeStats(){
    var totalUnits=0, lowSku=0, outSku=0, skuCount=0;
    products.forEach(function(p){
      p.sizes.forEach(function(s){
        skuCount++;
        totalUnits+=s.q;
        if(s.q===0) outSku++;
        else if(s.q<=thr(p)) lowSku++;
      });
    });
    return {totalUnits:totalUnits,lowSku:lowSku,outSku:outSku,skuCount:skuCount};
  }
  function refreshStats(){
    var st=computeStats();
    $('#stTotal').textContent=st.totalUnits.toLocaleString();
    $('#stLow').textContent=st.lowSku;
    $('#stOut').textContent=st.outSku;
    $('#stSku').textContent=st.skuCount+' / '+products.length;
    // filter badges (count products, not SKUs)
    var all=products.length;
    var low=products.filter(function(p){return p.sizes.some(function(s){return s.q>0&&s.q<=thr(p);});}).length;
    var out=products.filter(function(p){return p.sizes.some(function(s){return s.q===0;});}).length;
    $('#fAll').textContent=all; $('#fLow').textContent=low; $('#fOut').textContent=out;
  }

  // ---------- render rows ----------
  function badgeFor(state){
    if(state==='out') return '<span class="badge2 out"><span class="dot"></span>缺货</span>';
    if(state==='low') return '<span class="badge2 low"><span class="dot"></span>低库存</span>';
    return '<span class="badge2 ok"><span class="dot"></span>充足</span>';
  }
  function sizeMini(p){
    return p.sizes.map(function(s){
      var st=sizeState(p,s);
      return '<span class="smchip '+st+'">'+esc(s.sz)+' '+s.q+'</span>';
    }).join('');
  }

  function renderRows(){
    var host=$('#rows'); host.innerHTML='';
    var shown=products.filter(matches);
    if(!shown.length){
      host.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)">没有符合条件的商品</div>';
      return;
    }
    shown.forEach(function(p){
      var state=prodState(p);
      var row=document.createElement('div');
      row.className='prow'+(p._open?' open':'');
      row.dataset.id=p.id;
      row.innerHTML=
        '<div class="psum">'+
          '<div><input type="checkbox" class="ck rowck" '+(selected[p.id]?'checked':'')+'></div>'+
          '<div class="pcell">'+
            '<img class="thumb" src="'+p.thumb+'" alt="">'+
            '<div style="min-width:0">'+
              '<div class="pname">'+esc(p.zh)+'</div>'+
              '<div class="pen">'+esc(p.en)+'</div>'+
              '<div class="pmeta">货号 '+esc(p.code)+' · '+p.sizes.length+' 个尺码'+(p.track?'':' · 未追踪')+'</div>'+
            '</div>'+
          '</div>'+
          '<div class="col-tot"><span class="totbox">'+total(p)+'</span> <small>件</small></div>'+
          '<div class="col-status">'+badgeFor(state)+'</div>'+
          '<div class="col-sizes"><div class="sizemini">'+sizeMini(p)+'</div></div>'+
          '<svg class="caret" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg>'+
        '</div>'+
        '<div class="pexp">'+expHTML(p)+'</div>';
      host.appendChild(row);
    });
    bindRowEvents();
  }

  function expHTML(p){
    var srows=p.sizes.map(function(s){
      var st=sizeState(p,s);
      var sku=p.code+'-'+s.sz;
      var statTxt = st==='out'?'缺货':(st==='low'?'低于阈值 '+thr(p):'充足');
      return '<div class="srow '+st+'" data-sz="'+esc(s.sz)+'">'+
        '<div><div class="sz">'+esc(s.sz)+'</div></div>'+
        '<div class="sku">'+esc(sku)+'</div>'+
        '<div class="stepper">'+
          '<button class="dec" aria-label="减">−</button>'+
          '<input type="number" class="qin" min="0" value="'+s.q+'">'+
          '<button class="inc" aria-label="加">+</button>'+
        '</div>'+
        '<div class="sstat '+st+'">'+statTxt+'</div>'+
      '</div>';
    }).join('');

    return '<div class="exp-grid">'+
      // left: per-size stock
      '<div>'+
        '<div class="exp-h">分尺码库存 · 可直接编辑或 +/− 快速调整</div>'+
        '<div class="sizes">'+srows+'</div>'+
        '<div class="exp-foot">'+
          '<span class="saved">✓ 已保存</span>'+
          '<button class="btn btn--ghost btn--sm restock">补货 +10（全尺码）</button>'+
          '<button class="btn btn--sm save">保存更改</button>'+
        '</div>'+
      '</div>'+
      // right: controls
      '<div>'+
        '<div class="exp-h">商品库存设置</div>'+
        '<div class="ctrls">'+
          '<div class="ctrl">'+
            '<div class="lab">追踪库存<small>Track inventory · 关闭则不计数</small></div>'+
            '<div class="sw track'+(p.track?' on':'')+'" role="switch"></div>'+
          '</div>'+
          '<div class="ctrl">'+
            '<div class="lab">售罄后仍可购买<small>Continue selling when out of stock</small></div>'+
            '<div class="sw oversell'+(p.oversell?' on':'')+'" role="switch"></div>'+
          '</div>'+
          '<div class="ctrl">'+
            '<div class="lab">低库存阈值<small>低于此数量标记为低库存</small></div>'+
            '<div class="thr">'+
              '<button class="thrdec">−</button>'+
              '<input type="number" class="thrin" min="0" value="'+thr(p)+'">'+
              '<button class="thrinc">+</button>'+
            '</div>'+
          '</div>'+
        '</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:10px;line-height:1.5">提示：低库存以 <b style="color:var(--amber)">琥珀色</b> 标记，缺货以 <b style="color:var(--red)">红色</b> 标记。修改阈值会即时更新提醒列表。</div>'+
      '</div>'+
    '</div>';
  }

  function findP(id){return products.filter(function(p){return p.id===id;})[0];}

  // ---------- row events ----------
  function bindRowEvents(){
    $$('.prow').forEach(function(row){
      var p=findP(row.dataset.id);
      var sum=$('.psum',row);

      // expand toggle (but not when clicking checkbox)
      sum.addEventListener('click',function(e){
        if(e.target.closest('.rowck')) return;
        p._open=!p._open; row.classList.toggle('open',p._open);
      });

      // row checkbox
      $('.rowck',row).addEventListener('click',function(e){
        e.stopPropagation();
        selected[p.id]=this.checked;
        refreshBulk();
      });

      // size steppers + inputs
      $$('.srow',row).forEach(function(sr){
        var szName=sr.dataset.sz;
        var s=p.sizes.filter(function(x){return x.sz===szName;})[0];
        var input=$('.qin',sr);
        function commit(newVal,silent){
          newVal=Math.max(0,parseInt(newVal,10)||0);
          var old=s.q; s.q=newVal; input.value=newVal;
          updateSizeRowState(sr,p,s);
          softRefresh(row,p);
          refreshStats(); renderAlerts();
          if(!silent && newVal!==old){
            pushLog(newVal>old?'up':'down', p.zh+' · '+s.sz, newVal-old, '手动调整');
          }
        }
        $('.inc',sr).addEventListener('click',function(){commit(s.q+1);});
        $('.dec',sr).addEventListener('click',function(){commit(s.q-1);});
        input.addEventListener('change',function(){commit(this.value);});
        input.addEventListener('keydown',function(e){if(e.key==='Enter'){this.blur();}});
      });

      // restock +10
      $('.restock',row).addEventListener('click',function(){
        p.sizes.forEach(function(s){s.q+=10;});
        p._open=true;
        pushLog('up', p.zh+' · 全尺码', p.sizes.length*10, '一键补货');
        renderRows(); refreshStats(); renderAlerts();
        // keep open
        var nr=$('.prow[data-id="'+p.id+'"]'); if(nr) nr.classList.add('open');
        toast(p.zh+'：每个尺码 +10 件');
      });

      // save (mock)
      $('.save',row).addEventListener('click',function(){
        var sv=$('.saved',row); sv.classList.add('show');
        setTimeout(function(){sv.classList.remove('show');},1600);
        toast('已保存「'+p.zh+'」库存（示意）');
      });

      // toggles
      $('.sw.track',row).addEventListener('click',function(){
        p.track=!p.track; this.classList.toggle('on',p.track);
        toast(p.zh+'：追踪库存 '+(p.track?'开启':'关闭'));
        // refresh meta line
        var meta=$('.pmeta',row);
        if(meta) meta.innerHTML='货号 '+esc(p.code)+' · '+p.sizes.length+' 个尺码'+(p.track?'':' · 未追踪');
      });
      $('.sw.oversell',row).addEventListener('click',function(){
        p.oversell=!p.oversell; this.classList.toggle('on',p.oversell);
        toast(p.zh+'：售罄后'+(p.oversell?'仍可购买':'不可购买'));
      });

      // threshold
      var thrIn=$('.thrin',row);
      function setThr(v){
        v=Math.max(0,parseInt(v,10)||0); p.thr=v; thrIn.value=v;
        // re-evaluate all size rows + summary
        $$('.srow',row).forEach(function(sr){
          var s=p.sizes.filter(function(x){return x.sz===sr.dataset.sz;})[0];
          updateSizeRowState(sr,p,s);
        });
        softRefresh(row,p); refreshStats(); renderAlerts();
      }
      $('.thrinc',row).addEventListener('click',function(){setThr(p.thr*1+1);});
      $('.thrdec',row).addEventListener('click',function(){setThr(thr(p)-1);});
      thrIn.addEventListener('change',function(){setThr(this.value);});
    });
  }

  function updateSizeRowState(sr,p,s){
    var st=sizeState(p,s);
    sr.classList.remove('ok','low','out'); sr.classList.add(st);
    var stat=$('.sstat',sr); stat.className='sstat '+st;
    stat.textContent = st==='out'?'缺货':(st==='low'?'低于阈值 '+thr(p):'充足');
  }

  // update summary cells of a row without full re-render (keeps focus/expand)
  function softRefresh(row,p){
    var tb=$('.totbox',row); if(tb) tb.textContent=total(p);
    var stc=$('.col-status',row); if(stc) stc.innerHTML=badgeFor(prodState(p));
    var szc=$('.col-sizes .sizemini',row); if(szc) szc.innerHTML=sizeMini(p);
  }

  // ---------- right rail alerts ----------
  function renderAlerts(){
    var outItems=[], lowItems=[];
    products.forEach(function(p){
      p.sizes.forEach(function(s){
        if(s.q===0) outItems.push({p:p,s:s});
        else if(s.q<=thr(p)) lowItems.push({p:p,s:s});
      });
    });
    lowItems.sort(function(a,b){return a.s.q-b.s.q;});

    $('#outCount').textContent=outItems.length;
    $('#lowCount').textContent=lowItems.length;

    var outHost=$('#outList');
    outHost.innerHTML = outItems.length? outItems.map(function(it){
      return alertHTML(it,'out');
    }).join('') : '<div class="rempty">没有缺货尺码 ✓</div>';

    var lowHost=$('#lowList');
    lowHost.innerHTML = lowItems.length? lowItems.map(function(it){
      return alertHTML(it,'low');
    }).join('') : '<div class="rempty">没有低库存尺码 ✓</div>';

    // bind clicks: jump to product + expand
    $$('.alert',outHost).concat($$('.alert',lowHost)).forEach(function(el){
      el.addEventListener('click',function(){ jumpTo(el.dataset.pid); });
    });
  }
  function alertHTML(it,kind){
    var p=it.p, s=it.s;
    return '<div class="alert" data-pid="'+p.id+'">'+
      '<img class="at" src="'+p.thumb+'" alt="">'+
      '<div class="ai"><div class="an">'+esc(p.zh)+' · '+esc(s.sz)+'</div>'+
      '<div class="ad">'+esc(p.code)+'-'+esc(s.sz)+(kind==='low'?' · 阈值 '+thr(p):'')+'</div></div>'+
      '<div class="aq '+kind+'">'+s.q+'</div>'+
    '</div>';
  }
  function jumpTo(pid){
    var p=findP(pid); if(!p) return;
    // make sure it's visible under current filter
    if(!matches(p)){ filter='all'; query=''; $('#search').value=''; syncFilterUI(); renderRows(); }
    p._open=true;
    renderRows();
    var row=$('.prow[data-id="'+pid+'"]');
    if(row){ row.classList.add('open'); row.scrollIntoView({behavior:'smooth',block:'center'});
      row.style.transition='box-shadow .3s'; row.style.boxShadow='0 0 0 2px var(--pink)';
      setTimeout(function(){row.style.boxShadow='none';},1400);
    }
  }

  // ---------- recent log ----------
  function renderLog(){
    var host=$('#logList');
    host.innerHTML=log.map(function(l){
      var cls = l.dir;
      var sign = l.d>0?'+':'';
      return '<div class="logrow">'+
        '<div class="ld '+cls+'"></div>'+
        '<div class="lt"><div><b>'+esc(l.name)+'</b></div>'+
        '<div class="lm">'+esc(l.who)+' · '+esc(l.when)+'</div></div>'+
        '<div class="delta '+cls+'">'+sign+l.d+'</div>'+
      '</div>';
    }).join('');
  }

  // ---------- bulk ----------
  function refreshBulk(){
    var ids=Object.keys(selected).filter(function(k){return selected[k];});
    var bar=$('#bulkbar');
    bar.classList.toggle('show',ids.length>0);
    $('#bulkCnt').textContent=ids.length;
    // sync header checkbox
    var visible=products.filter(matches);
    var allSel=visible.length>0 && visible.every(function(p){return selected[p.id];});
    $('#ckAll').checked=allSel;
  }
  function selectedProducts(){
    return products.filter(function(p){return selected[p.id];});
  }
  function applyBulk(fn,label){
    var sel=selectedProducts(); if(!sel.length) return;
    sel.forEach(function(p){ p.sizes.forEach(function(s){ fn(p,s); }); });
    renderRows(); refreshStats(); renderAlerts();
    // re-open none; keep selection
    toast(label+'（'+sel.length+' 个商品）');
  }

  // ---------- wire toolbar ----------
  function syncFilterUI(){
    $$('#filters button').forEach(function(b){ b.classList.toggle('on',b.dataset.f===filter); });
  }
  $('#filters').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    filter=b.dataset.f; syncFilterUI(); renderRows(); refreshBulk();
  });
  $('#search').addEventListener('input',function(){
    query=this.value.trim(); renderRows(); refreshBulk();
  });
  $('#expandAll').addEventListener('click',function(){
    var shown=products.filter(matches);
    var anyClosed=shown.some(function(p){return !p._open;});
    shown.forEach(function(p){p._open=anyClosed;});
    this.textContent=anyClosed?'全部收起':'全部展开';
    renderRows();
  });
  $('#ckAll').addEventListener('change',function(){
    var on=this.checked;
    products.filter(matches).forEach(function(p){ selected[p.id]=on; });
    renderRows(); refreshBulk();
  });
  $('#bulkClear').addEventListener('click',function(){
    selected={}; renderRows(); refreshBulk();
  });
  $('#bulkSetBtn').addEventListener('click',function(){
    var v=parseInt($('#bulkSet').value,10);
    if(isNaN(v)||v<0){ toast('请输入有效数量'); return; }
    applyBulk(function(p,s){s.q=v;},'已将所选商品全部尺码设为 '+v+' 件');
  });
  $('#bulkPlus').addEventListener('click',function(){ applyBulk(function(p,s){s.q+=5;},'所选商品每个尺码 +5'); });
  $('#bulkMinus').addEventListener('click',function(){ applyBulk(function(p,s){s.q=Math.max(0,s.q-5);},'所选商品每个尺码 −5'); });

  // ---------- init ----------
  refreshStats();
  renderRows();
  renderAlerts();
  renderLog();
  refreshBulk();
})();
</script>
</body>
</html>
