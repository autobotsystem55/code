<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>库存管理 · Code Official（卡片式 Demo B）</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFFAF1; --cream2:#FAF6F3; --white:#fff;
    --wine:#82213E; --wine-deep:#6A1A32; --pink:#E9C9CC; --blush:#F2E4D9;
    --ink:#1C1C1C; --ink2:#3E3E3E; --muted:#6F635C; --line:#ECD9D6; --line2:#E2DCD8;
    --green:#2F7D4F; --green-bg:#E3F1E8; --amber:#9A6A1E; --amber-bg:#F6EAD3;
    --red:#B3261E; --red-bg:#F7E1DF; --blue:#3A5C9A;
    --serif:'DM Serif Display',Georgia,serif; --sans:'DM Sans',-apple-system,Segoe UI,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);font-size:15px;line-height:1.6}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit;font-size:14px;color:inherit}
  h1,h2,h3{font-family:var(--serif);font-weight:400;line-height:1.12}
  .muted{color:var(--muted)}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--wine);color:var(--cream);
    padding:10px 18px;font-size:13px;font-weight:500;letter-spacing:.02em;border:1px solid var(--wine);transition:.22s}
  .btn:hover{background:var(--wine-deep);border-color:var(--wine-deep)}
  .btn--ghost{background:transparent;color:var(--wine)}
  .btn--ghost:hover{background:var(--wine);color:var(--cream)}
  .btn--sm{padding:6px 12px;font-size:12px}
  .btn[disabled]{opacity:.45;cursor:not-allowed}

  /* ---------- shell ---------- */
  .shell{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
  .side{background:var(--cream2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .brand{font-family:var(--serif);font-size:24px;padding:24px 24px 20px}
  .side .brand sup{font-size:.42em;color:var(--wine)}
  .nav{display:flex;flex-direction:column;padding:6px 12px;gap:2px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 14px;font-size:14px;color:var(--ink2);border-radius:6px;transition:.18s}
  .nav button:hover{background:var(--blush)}
  .nav button.on{background:var(--wine);color:var(--cream)}
  .nav svg{width:17px;height:17px;fill:none;stroke:currentColor;stroke-width:1.6}
  .side-foot{margin-top:auto;padding:16px 16px 22px;border-top:1px solid var(--line);font-size:13px}
  .side-foot a{display:block;color:var(--muted);padding:6px 8px;text-decoration:none}
  .side-foot a:hover{color:var(--wine)}

  .main{min-width:0}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 30px;border-bottom:1px solid var(--line);background:var(--cream);gap:16px;flex-wrap:wrap}
  .topbar h1{font-size:30px}
  .topbar .sub{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:4px}
  .view{padding:24px 30px 80px}

  /* ---------- summary stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .stat{background:var(--white);border:1px solid var(--line);padding:16px 18px;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--pink)}
  .stat.amber::before{background:var(--amber)}
  .stat.red::before{background:var(--red)}
  .stat.blue::before{background:var(--blue)}
  .stat .n{font-family:var(--serif);font-size:32px;line-height:1}
  .stat .l{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-top:7px}
  .stat .l small{display:block;text-transform:none;letter-spacing:0;font-size:11px;color:var(--muted);opacity:.8}

  /* ---------- low stock strip ---------- */
  .lowstrip{background:var(--white);border:1px solid var(--line);margin-bottom:22px;overflow:hidden}
  .lowstrip-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:linear-gradient(90deg,var(--amber-bg),#FFF6E9);border-bottom:1px solid var(--line)}
  .lowstrip-head .t{display:flex;align-items:center;gap:10px}
  .lowstrip-head .t b{font-family:var(--serif);font-weight:400;font-size:19px}
  .lowstrip-head .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 0 4px var(--amber-bg);animation:pulse 1.8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .lowstrip-body{display:flex;gap:12px;overflow-x:auto;padding:14px 18px}
  .lowstrip-body::-webkit-scrollbar{height:7px}
  .lowstrip-body::-webkit-scrollbar-thumb{background:var(--line2);border-radius:9px}
  .lowcard{flex:0 0 auto;min-width:210px;border:1px solid var(--line);border-radius:8px;padding:11px 13px;background:var(--cream2);display:flex;gap:11px;align-items:center}
  .lowcard.out{background:var(--red-bg);border-color:#EBCBC8}
  .lowcard .lc-thumb{width:42px;height:52px;border-radius:5px;object-fit:cover;background:var(--blush);flex:0 0 auto}
  .lowcard .lc-name{font-size:13.5px;font-weight:600;line-height:1.25}
  .lowcard .lc-meta{font-size:12px;color:var(--muted);margin-top:2px}
  .lowcard .lc-meta b{color:var(--amber)}
  .lowcard.out .lc-meta b{color:var(--red)}
  .lowcard .lc-go{margin-left:auto;flex:0 0 auto}
  .lowstrip.collapsed .lowstrip-body{display:none}
  .lowstrip-empty{padding:16px 18px;color:var(--muted);font-size:13.5px}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:18px}
  .search{position:relative;flex:1;min-width:220px;max-width:380px}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:1.7}
  .search input{width:100%;padding:11px 13px 11px 38px;background:var(--white);border:1px solid var(--line2);outline:none;transition:.2s}
  .search input:focus{border-color:var(--wine)}
  .seg{display:inline-flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden;background:var(--white)}
  .seg button{padding:9px 15px;font-size:13px;display:flex;align-items:center;gap:7px}
  .seg button + button{border-left:1px solid var(--line2)}
  .seg button.on{background:var(--wine);color:var(--cream)}
  .seg button .cnt{font-size:11px;background:rgba(0,0,0,.08);padding:1px 7px;border-radius:999px}
  .seg button.on .cnt{background:rgba(255,255,255,.22)}
  .toolbar .spacer{flex:1}

  /* ---------- product cards ---------- */
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .pcard{background:var(--white);border:1px solid var(--line);display:flex;flex-direction:column;transition:.2s}
  .pcard.hide{display:none}
  .pcard-top{display:flex;gap:14px;padding:16px 18px 12px}
  .pcard-thumb{width:64px;height:80px;object-fit:cover;background:var(--blush);flex:0 0 auto;border-radius:4px}
  .pcard-id{flex:1;min-width:0}
  .pcard-id h3{font-size:19px;line-height:1.15}
  .pcard-id .en{font-size:12px;color:var(--muted);margin-top:1px}
  .pcard-id .cat{display:inline-block;font-size:11px;letter-spacing:.04em;padding:2px 9px;border-radius:999px;background:var(--blush);color:var(--ink2);margin-top:7px}
  .pcard-tot{text-align:right;flex:0 0 auto}
  .pcard-tot .num{font-family:var(--serif);font-size:26px;line-height:1}
  .pcard-tot .lab{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;margin-top:6px}
  .badge.ok{background:var(--green-bg);color:var(--green)}
  .badge.low{background:var(--amber-bg);color:var(--amber)}
  .badge.out{background:var(--red-bg);color:var(--red)}

  /* size rows */
  .sizes{padding:4px 18px 6px}
  .srow{display:grid;grid-template-columns:54px 1fr auto;align-items:center;gap:12px;padding:9px 0;border-top:1px solid var(--line)}
  .srow .sz{font-weight:600;font-size:14px}
  .srow .sz small{display:block;font-size:10.5px;color:var(--muted);font-weight:400;letter-spacing:.04em}
  .sbar-wrap{display:flex;align-items:center;gap:10px;min-width:0}
  .sbar{flex:1;height:7px;border-radius:999px;background:var(--line);overflow:hidden;min-width:60px}
  .sbar i{display:block;height:100%;border-radius:999px;background:var(--green);transition:width .25s}
  .sbar.low i{background:var(--amber)}
  .sbar.out i{background:var(--red)}
  .sbar-tag{font-size:11px;color:var(--muted);white-space:nowrap}
  .sbar-tag.low{color:var(--amber);font-weight:600}
  .sbar-tag.out{color:var(--red);font-weight:600}

  .stepper{display:inline-flex;align-items:center;border:1px solid var(--line2);border-radius:7px;overflow:hidden;background:var(--white)}
  .stepper button{width:30px;height:32px;font-size:17px;line-height:1;color:var(--wine);display:flex;align-items:center;justify-content:center;transition:.15s}
  .stepper button:hover{background:var(--blush)}
  .stepper button:active{background:var(--pink)}
  .stepper input{width:46px;height:32px;text-align:center;border:none;border-left:1px solid var(--line2);border-right:1px solid var(--line2);outline:none;-moz-appearance:textfield}
  .stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .stepper input:focus{background:var(--cream)}
  .srow.out-row .stepper input{color:var(--red);font-weight:600}
  .srow.low-row{background:linear-gradient(90deg,var(--amber-bg) -40%,transparent 60%)}
  .srow.out-row{background:linear-gradient(90deg,var(--red-bg) -40%,transparent 60%)}

  /* card footer controls */
  .pcard-foot{margin-top:auto;border-top:1px solid var(--line);padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--cream2)}
  .tog{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink2);cursor:pointer;user-select:none}
  .switch{position:relative;width:36px;height:20px;border-radius:999px;background:var(--line2);transition:.2s;flex:0 0 auto}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .tog.on .switch{background:var(--wine)}
  .tog.on .switch::after{transform:translateX(16px)}
  .thresh{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink2)}
  .thresh input{width:42px;height:28px;text-align:center;border:1px solid var(--line2);border-radius:5px;outline:none}
  .thresh input:focus{border-color:var(--wine)}
  .pcard-foot .restock{margin-left:auto}

  .saved{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--cream);
    padding:11px 20px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:.3s;z-index:50;box-shadow:0 6px 20px rgba(0,0,0,.18)}
  .saved.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .demo-flag{display:inline-block;font-size:11px;letter-spacing:.04em;padding:3px 10px;border-radius:999px;background:var(--blush);color:var(--wine);border:1px solid var(--pink)}
  .noresults{display:none;text-align:center;color:var(--muted);padding:50px 0;grid-column:1/-1}

  @media(max-width:960px){ .grid{grid-template-columns:1fr} }
  @media(max-width:860px){
    .shell{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;border-right:none;border-bottom:1px solid var(--line)}
    .side .brand{padding:16px 18px;font-size:20px}
    .nav{flex-direction:row;flex-wrap:wrap;flex:1}
    .nav button{padding:8px 11px}
    .nav button span{display:none}
    .side-foot{margin:0;border-top:none;padding:10px 16px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .topbar,.view{padding-left:18px;padding-right:18px}
    .topbar h1{font-size:24px}
  }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="brand">Code Official <sup>✿</sup></div>
    <nav class="nav">
      <button><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>概览</span></button>
      <button><svg viewBox="0 0 24 24"><path d="M21 8l-9-5-9 5 9 5 9-5zM3 8v8l9 5 9-5V8"/></svg><span>商品</span></button>
      <button class="on"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4M3 7v10l9 4 9-4V7M3 7l9 4 9-4M12 11v10"/></svg><span>库存</span></button>
      <button><svg viewBox="0 0 24 24"><path d="M6 7h12l-1 13H7L6 7zM9 7a3 3 0 0 1 6 0"/></svg><span>订单</span></button>
      <button><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-5.5 7-5.5s7 1.9 7 5.5"/></svg><span>顾客</span></button>
      <button><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg><span>设置</span></button>
    </nav>
    <div class="side-foot"><a href="#">↗ 查看店面</a><a href="#">退出登录</a></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <h1>库存管理</h1>
        <div class="sub">Inventory · 卡片式视图</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <span class="demo-flag">演示数据 · Demo</span>
        <button class="btn" id="restockAll">一键补货低库存</button>
      </div>
    </div>

    <div class="view">
      <!-- summary stats -->
      <div class="stats">
        <div class="stat"><div class="n" id="statUnits">0</div><div class="l">总库存件数<small>Total units</small></div></div>
        <div class="stat amber"><div class="n" id="statLow">0</div><div class="l">低库存<small>Low stock SKUs</small></div></div>
        <div class="stat red"><div class="n" id="statOut">0</div><div class="l">缺货<small>Out of stock</small></div></div>
        <div class="stat blue"><div class="n" id="statSku">0</div><div class="l">SKU 数<small>Total variants</small></div></div>
      </div>

      <!-- low stock highlight strip -->
      <div class="lowstrip" id="lowstrip">
        <div class="lowstrip-head">
          <div class="t"><span class="dot"></span><b>低库存提醒 / 缺货</b><span class="muted" style="font-size:13px">Needs restock</span></div>
          <button class="btn btn--ghost btn--sm" id="lowToggle">收起</button>
        </div>
        <div class="lowstrip-body" id="lowBody"></div>
      </div>

      <!-- toolbar -->
      <div class="toolbar">
        <div class="search">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="search" placeholder="搜索商品名称 / SKU…  Search products">
        </div>
        <div class="seg" id="filters">
          <button data-f="all" class="on">全部 <span class="cnt" id="cntAll">0</span></button>
          <button data-f="low">低库存 <span class="cnt" id="cntLow">0</span></button>
          <button data-f="out">缺货 <span class="cnt" id="cntOut">0</span></button>
        </div>
      </div>

      <!-- product cards -->
      <div class="grid" id="grid"></div>
      <div class="noresults" id="noResults">没有符合条件的商品。<br>No products match your search / filter.</div>
    </div>
  </main>
</div>

<div class="saved" id="toast">已保存</div>

<script>
(function(){
  // ---------- mock data ----------
  var SIZE_LABEL={XS:'X-Small',S:'Small',M:'Medium',L:'Large',XL:'X-Large','One Size':'均码'};
  var products=[
    {id:'p1', name:'羊毛混纺大衣', en:'Wool-Blend Overcoat', cat:'Outerwear',
      thumb:'https://images.unsplash.com/photo-1539533018447-63fcce2678e3?w=200&q=70',
      track:true, oversell:false, threshold:5,
      sizes:[{s:'XS',q:8},{s:'S',q:4},{s:'M',q:0},{s:'L',q:11},{s:'XL',q:3}]},
    {id:'p2', name:'羊绒圆领毛衣', en:'Cashmere Crewneck', cat:'Knitwear',
      thumb:'https://images.unsplash.com/photo-1576566588028-4147f3842f27?w=200&q=70',
      track:true, oversell:false, threshold:5,
      sizes:[{s:'XS',q:2},{s:'S',q:14},{s:'M',q:18},{s:'L',q:5},{s:'XL',q:9}]},
    {id:'p3', name:'真丝吊带连衣裙', en:'Silk Slip Dress', cat:'Dresses',
      thumb:'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=200&q=70',
      track:true, oversell:true, threshold:6,
      sizes:[{s:'XS',q:0},{s:'S',q:0},{s:'M',q:2},{s:'L',q:1},{s:'XL',q:0}]},
    {id:'p4', name:'有机棉T恤', en:'Organic Cotton Tee', cat:'Tops',
      thumb:'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=200&q=70',
      track:true, oversell:false, threshold:8,
      sizes:[{s:'XS',q:22},{s:'S',q:31},{s:'M',q:40},{s:'L',q:27},{s:'XL',q:6}]},
    {id:'p5', name:'高腰阔腿西裤', en:'High-Waist Wide Trousers', cat:'Trousers',
      thumb:'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=200&q=70',
      track:true, oversell:false, threshold:5,
      sizes:[{s:'XS',q:4},{s:'S',q:7},{s:'M',q:3},{s:'L',q:0},{s:'XL',q:12}]},
    {id:'p6', name:'亚麻衬衫', en:'Linen Button Shirt', cat:'Shirts',
      thumb:'https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?w=200&q=70',
      track:true, oversell:false, threshold:5,
      sizes:[{s:'XS',q:9},{s:'S',q:5},{s:'M',q:13},{s:'L',q:16},{s:'XL',q:2}]},
    {id:'p7', name:'真皮托特包', en:'Leather Tote Bag', cat:'Accessories',
      thumb:'https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=200&q=70',
      track:false, oversell:false, threshold:3,
      sizes:[{s:'One Size',q:14}]},
    {id:'p8', name:'罗纹针织半身裙', en:'Ribbed Knit Midi Skirt', cat:'Knitwear',
      thumb:'https://images.unsplash.com/photo-1583496661160-fb5886a0aaaa?w=200&q=70',
      track:true, oversell:false, threshold:5,
      sizes:[{s:'XS',q:1},{s:'S',q:0},{s:'M',q:4},{s:'L',q:0},{s:'XL',q:0}]}
  ];

  var grid=document.getElementById('grid');
  var state={filter:'all', q:''};

  function statusOf(q,th){ if(q<=0) return 'out'; if(q<=th) return 'low'; return 'ok'; }
  function maxQ(p){ return Math.max(10, p.threshold*4, Math.max.apply(null,p.sizes.map(function(x){return x.q;}))); }

  // ---------- render one card ----------
  function cardHTML(p){
    var total=p.sizes.reduce(function(a,x){return a+x.q;},0);
    var nOut=p.sizes.filter(function(x){return x.q<=0;}).length;
    var nLow=p.sizes.filter(function(x){return x.q>0 && x.q<=p.threshold;}).length;
    var badge = nOut>0 ? '<span class="badge out">● 有缺货 '+nOut+'</span>'
              : nLow>0 ? '<span class="badge low">● 低库存 '+nLow+'</span>'
              : '<span class="badge ok">● 库存充足</span>';
    var mx=maxQ(p);
    var rows=p.sizes.map(function(x){
      var st=statusOf(x.q,p.threshold);
      var pct=Math.max(3,Math.min(100,Math.round(x.q/mx*100)));
      var tag = st==='out' ? '<span class="sbar-tag out">缺货</span>'
              : st==='low' ? '<span class="sbar-tag low">仅剩 '+x.q+'</span>'
              : '<span class="sbar-tag">'+x.q+' 件</span>';
      return '<div class="srow '+(st==='out'?'out-row':st==='low'?'low-row':'')+'" data-sz="'+x.s+'">'+
        '<div class="sz">'+x.s+'<small>'+(SIZE_LABEL[x.s]||'')+'</small></div>'+
        '<div class="sbar-wrap"><div class="sbar '+st+'"><i style="width:'+pct+'%"></i></div>'+tag+'</div>'+
        '<div class="stepper">'+
          '<button data-act="dec" aria-label="减少">−</button>'+
          '<input type="number" min="0" value="'+x.q+'" data-input>'+
          '<button data-act="inc" aria-label="增加">+</button>'+
        '</div>'+
      '</div>';
    }).join('');

    return '<div class="pcard" data-id="'+p.id+'">'+
      '<div class="pcard-top">'+
        '<img class="pcard-thumb" src="'+p.thumb+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">'+
        '<div class="pcard-id">'+
          '<h3>'+p.name+'</h3>'+
          '<div class="en">'+p.en+'</div>'+
          '<span class="cat">'+p.cat+'</span>'+
        '</div>'+
        '<div class="pcard-tot">'+
          '<div class="num" data-total>'+total+'</div>'+
          '<div class="lab">件 在库</div>'+
          '<div data-badge>'+badge+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="sizes">'+rows+'</div>'+
      '<div class="pcard-foot">'+
        '<label class="tog '+(p.track?'on':'')+'" data-tog="track"><span class="switch"></span>追踪库存</label>'+
        '<label class="tog '+(p.oversell?'on':'')+'" data-tog="oversell"><span class="switch"></span>售罄后仍可购买</label>'+
        '<div class="thresh">低库存阈值 ≤<input type="number" min="0" value="'+p.threshold+'" data-thresh></div>'+
        '<button class="btn btn--ghost btn--sm restock" data-restock>+5 全尺寸补货</button>'+
      '</div>'+
    '</div>';
  }

  function renderAll(){
    grid.innerHTML=products.map(cardHTML).join('');
    applyFilter();
    updateSummary();
    renderLowStrip();
  }

  // ---------- summary ----------
  function updateSummary(){
    var units=0,low=0,out=0,sku=0;
    products.forEach(function(p){
      p.sizes.forEach(function(x){
        sku++; units+=x.q;
        if(x.q<=0) out++; else if(x.q<=p.threshold) low++;
      });
    });
    document.getElementById('statUnits').textContent=units;
    document.getElementById('statLow').textContent=low;
    document.getElementById('statOut').textContent=out;
    document.getElementById('statSku').textContent=sku;

    var cAll=products.length, cLow=0, cOut=0;
    products.forEach(function(p){
      var hasOut=p.sizes.some(function(x){return x.q<=0;});
      var hasLow=p.sizes.some(function(x){return x.q>0&&x.q<=p.threshold;});
      if(hasOut) cOut++;
      if(hasLow||hasOut) cLow++; // "需关注" loosely
    });
    document.getElementById('cntAll').textContent=cAll;
    document.getElementById('cntLow').textContent=cLow;
    document.getElementById('cntOut').textContent=cOut;
  }

  // ---------- low stock strip ----------
  function renderLowStrip(){
    var body=document.getElementById('lowBody');
    var items=[];
    products.forEach(function(p){
      p.sizes.forEach(function(x){
        var st=statusOf(x.q,p.threshold);
        if(st==='out') items.push({p:p,x:x,st:'out',sort:0});
        else if(st==='low') items.push({p:p,x:x,st:'low',sort:1});
      });
    });
    items.sort(function(a,b){return a.sort-b.sort || a.x.q-b.x.q;});
    if(!items.length){
      body.innerHTML='<div class="lowstrip-empty">✓ 太棒了，目前没有需要补货的尺寸。Everything is well stocked.</div>';
      return;
    }
    body.innerHTML=items.map(function(it){
      var meta = it.st==='out'
        ? '<div class="lc-meta"><b>缺货 · '+it.x.s+'</b></div>'
        : '<div class="lc-meta">尺码 '+it.x.s+' · <b>仅剩 '+it.x.q+' 件</b></div>';
      return '<div class="lowcard '+(it.st==='out'?'out':'')+'">'+
        '<img class="lc-thumb" src="'+it.p.thumb+'" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">'+
        '<div><div class="lc-name">'+it.p.name+'</div>'+meta+'</div>'+
        '<button class="btn btn--sm lc-go" data-low="'+it.p.id+'" data-lowsz="'+it.x.s+'">补货</button>'+
      '</div>';
    }).join('');
  }

  // ---------- filtering ----------
  function applyFilter(){
    var any=false;
    Array.prototype.forEach.call(grid.children,function(card){
      var p=byId(card.getAttribute('data-id'));
      var matchQ = !state.q ||
        (p.name.toLowerCase().indexOf(state.q)>=0) ||
        (p.en.toLowerCase().indexOf(state.q)>=0) ||
        (p.cat.toLowerCase().indexOf(state.q)>=0);
      var hasOut=p.sizes.some(function(x){return x.q<=0;});
      var hasLow=p.sizes.some(function(x){return x.q>0&&x.q<=p.threshold;});
      var matchF = state.filter==='all' ||
        (state.filter==='low' && (hasLow||hasOut)) ||
        (state.filter==='out' && hasOut);
      var show=matchQ&&matchF;
      card.classList.toggle('hide',!show);
      if(show) any=true;
    });
    document.getElementById('noResults').style.display=any?'none':'block';
  }

  function byId(id){ return products.filter(function(p){return p.id===id;})[0]; }

  // ---------- update one size's UI without full rerender ----------
  function refreshCard(card,p){
    var total=p.sizes.reduce(function(a,x){return a+x.q;},0);
    card.querySelector('[data-total]').textContent=total;
    var nOut=p.sizes.filter(function(x){return x.q<=0;}).length;
    var nLow=p.sizes.filter(function(x){return x.q>0 && x.q<=p.threshold;}).length;
    var badge = nOut>0 ? '<span class="badge out">● 有缺货 '+nOut+'</span>'
              : nLow>0 ? '<span class="badge low">● 低库存 '+nLow+'</span>'
              : '<span class="badge ok">● 库存充足</span>';
    card.querySelector('[data-badge]').innerHTML=badge;

    var mx=maxQ(p);
    Array.prototype.forEach.call(card.querySelectorAll('.srow'),function(row){
      var sz=row.getAttribute('data-sz');
      var x=p.sizes.filter(function(s){return s.s===sz;})[0];
      var st=statusOf(x.q,p.threshold);
      var pct=Math.max(3,Math.min(100,Math.round(x.q/mx*100)));
      row.className='srow '+(st==='out'?'out-row':st==='low'?'low-row':'');
      row.setAttribute('data-sz',sz);
      var bar=row.querySelector('.sbar'); bar.className='sbar '+st;
      bar.querySelector('i').style.width=pct+'%';
      var tag=row.querySelector('.sbar-tag');
      tag.className='sbar-tag '+(st==='out'?'out':st==='low'?'low':'');
      tag.textContent = st==='out'?'缺货' : st==='low'?('仅剩 '+x.q):(x.q+' 件');
      var inp=row.querySelector('[data-input]');
      if(document.activeElement!==inp) inp.value=x.q;
    });
  }

  // ---------- toast ----------
  var toastT;
  function toast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg||'已保存';
    t.classList.add('show');
    clearTimeout(toastT);
    toastT=setTimeout(function(){t.classList.remove('show');},1400);
  }

  function setSize(p,card,sz,val){
    val=Math.max(0,Math.round(val||0));
    var x=p.sizes.filter(function(s){return s.s===sz;})[0];
    x.q=val;
    refreshCard(card,p);
    updateSummary();
    renderLowStrip();
    // re-evaluate filter only if filtering active (avoid card disappearing mid-edit unexpectedly)
    if(state.filter!=='all' || state.q) applyFilter();
  }

  // ---------- events (delegated) ----------
  grid.addEventListener('click',function(e){
    var card=e.target.closest('.pcard'); if(!card) return;
    var p=byId(card.getAttribute('data-id'));

    // stepper +/-
    var stepBtn=e.target.closest('.stepper button');
    if(stepBtn){
      var row=stepBtn.closest('.srow');
      var sz=row.getAttribute('data-sz');
      var x=p.sizes.filter(function(s){return s.s===sz;})[0];
      var nv=x.q + (stepBtn.getAttribute('data-act')==='inc'?1:-1);
      setSize(p,card,sz,nv);
      toast(p.name+' · '+sz+' → '+Math.max(0,nv)+' 件');
      return;
    }
    // toggles
    var tog=e.target.closest('[data-tog]');
    if(tog){
      var key=tog.getAttribute('data-tog');
      p[key]=!p[key];
      tog.classList.toggle('on',p[key]);
      toast((key==='track'?'追踪库存':'售罄后仍可购买')+'：'+(p[key]?'开':'关'));
      return;
    }
    // per-card restock +5 all sizes
    if(e.target.closest('[data-restock]')){
      p.sizes.forEach(function(x){x.q+=5;});
      refreshCard(card,p); updateSummary(); renderLowStrip();
      if(state.filter!=='all'||state.q) applyFilter();
      toast(p.name+'：全尺寸 +5 已补货');
      return;
    }
  });

  // number input typing
  grid.addEventListener('input',function(e){
    if(e.target.matches('[data-input]')){
      var card=e.target.closest('.pcard'), p=byId(card.getAttribute('data-id'));
      var sz=e.target.closest('.srow').getAttribute('data-sz');
      setSize(p,card,sz,parseInt(e.target.value,10)||0);
    }
    if(e.target.matches('[data-thresh]')){
      var card2=e.target.closest('.pcard'), p2=byId(card2.getAttribute('data-id'));
      p2.threshold=Math.max(0,parseInt(e.target.value,10)||0);
      refreshCard(card2,p2); updateSummary(); renderLowStrip();
      if(state.filter!=='all'||state.q) applyFilter();
    }
  });
  grid.addEventListener('change',function(e){
    if(e.target.matches('[data-input]')){
      var card=e.target.closest('.pcard'), p=byId(card.getAttribute('data-id'));
      var sz=e.target.closest('.srow').getAttribute('data-sz');
      toast(p.name+' · '+sz+' 已更新');
    }
  });

  // search
  document.getElementById('search').addEventListener('input',function(e){
    state.q=e.target.value.trim().toLowerCase(); applyFilter();
  });
  // filter seg
  document.getElementById('filters').addEventListener('click',function(e){
    var b=e.target.closest('button[data-f]'); if(!b) return;
    state.filter=b.getAttribute('data-f');
    Array.prototype.forEach.call(this.children,function(c){c.classList.toggle('on',c===b);});
    applyFilter();
  });

  // low strip "补货" -> jump + bump that size to threshold+5
  document.getElementById('lowBody').addEventListener('click',function(e){
    var b=e.target.closest('[data-low]'); if(!b) return;
    var pid=b.getAttribute('data-low'), sz=b.getAttribute('data-lowsz');
    var p=byId(pid), card=grid.querySelector('.pcard[data-id="'+pid+'"]');
    var x=p.sizes.filter(function(s){return s.s===sz;})[0];
    setSize(p,card,sz,p.threshold+5);
    card.scrollIntoView({behavior:'smooth',block:'center'});
    var row=card.querySelector('.srow[data-sz="'+sz+'"]');
    if(row){ row.style.transition='background .3s'; var old=row.style.boxShadow;
      row.style.boxShadow='inset 0 0 0 2px var(--wine)';
      setTimeout(function(){row.style.boxShadow=old;},900); }
    toast(p.name+' · '+sz+' 已补货至 '+(p.threshold+5)+' 件');
  });

  // collapse low strip
  document.getElementById('lowToggle').addEventListener('click',function(){
    var s=document.getElementById('lowstrip');
    s.classList.toggle('collapsed');
    this.textContent=s.classList.contains('collapsed')?'展开':'收起';
  });

  // global restock all low/out -> set every low/out size to threshold+5
  document.getElementById('restockAll').addEventListener('click',function(){
    var n=0;
    products.forEach(function(p){
      p.sizes.forEach(function(x){
        if(x.q<=p.threshold){ x.q=p.threshold+5; n++; }
      });
    });
    renderAll();
    toast(n>0?('已为 '+n+' 个尺寸补货至安全库存'):'目前无需补货');
  });

  renderAll();
})();
</script>
</body>
</html>
